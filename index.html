/* --------------------------------------------------------------- SAVE DATA */
const SAVE_KEY = 'poppuMailRoom.v3';
const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); };
function defaultSave(){
  return {
    stamps: 0,
    totalDelivered: 0,
    stickers: [],
    levelStars: new Array(LEVELS.length).fill(0),
    maxLevel: 1,
    currentScene: 0,
    day: todayStr(), deliveredToday: 0, streak: 0, lastPlayDay: null, goldenHat:false,
    upgrades: { speedBelt:false, bigBoxes:false, autoSorter:false, scanner:false, doubleStamps:false },
    owned: {},
    equipped: { hat:null, mailbox:null, conveyor:null, decor:null },
  };
}
let SAVE = loadSave();
function loadSave(){
  try{
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!s || typeof s!=='object') return defaultSave();
    const base = defaultSave();
    for(const k in base) if(!(k in s)) s[k]=base[k];
    for(const k in base.upgrades) if(!(k in s.upgrades)) s.upgrades[k]=base.upgrades[k];
    for(const k in base.equipped) if(!(k in s.equipped)) s.equipped[k]=base.equipped[k];
    if(!Array.isArray(s.levelStars) || s.levelStars.length!==LEVELS.length)
      s.levelStars = new Array(LEVELS.length).fill(0);
    if(s.day !== todayStr()){
      const yd=new Date(); yd.setDate(yd.getDate()-1);
      const ydStr=yd.getFullYear()+'-'+(yd.getMonth()+1)+'-'+yd.getDate();
      if(s.lastPlayDay !== ydStr && s.lastPlayDay !== todayStr()) s.streak=0;
      s.day=todayStr(); s.deliveredToday=0;
    }
    return s;
  }catch(e){ return defaultSave(); }
}
function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(SAVE)); }catch(e){} }

function levelUnlocked(n){ return n <= (SAVE.maxLevel||1); }
function sceneUnlocked(i){ return (SAVE.maxLevel||1) >= SCENES[i].unlockLevel; }
function owns(id){ return !!SAVE.owned[id]; }
function equipped(cat){ return SAVE.equipped[cat]; }
function hasUp(id){ return !!SAVE.upgrades[id]; }

/* --------------------------------------------------------------- CANVAS/DPR */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let scale=1, offX=0, offY=0, DPR=1;
function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  DPR=Math.min(window.devicePixelRatio||1, 2.5);
  canvas.width=Math.floor(vw*DPR); canvas.height=Math.floor(vh*DPR);
  canvas.style.width=vw+'px'; canvas.style.height=vh+'px';
  scale=Math.min(vw/W, vh/H);
  offX=(vw-W*scale)/2; offY=(vh-H*scale)/2;
}
window.addEventListener('resize', resize); resize();
function toStage(cx,cy){ return { x:(cx-offX)/scale, y:(cy-offY)/scale }; }

/* -------------------------------------------------------------------- AUDIO */
const Audio_ = (()=>{
  let ac=null, master=null, hum=null, humGain=null, musicOn=true, started=false;
  function ensure(){
    if(ac) return;
    try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=ac.createGain(); master.gain.value=0.9; master.connect(ac.destination);
  }
  function resume(){ ensure(); if(ac&&ac.state==='suspended') ac.resume(); if(!started){ started=true; startHum(); startMusic(); } }
  function now(){ return ac?ac.currentTime:0; }
  function tone(freq,t0,dur,type='sine',vol=0.3,glideTo=null){
    if(!ac) return;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.03);
  }
  function noise(t0,dur,vol=0.15,freq=1200,q=1){
    if(!ac) return;
    const n=ac.createBufferSource(), len=Math.floor(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    n.buffer=buf; const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q;
    const g=ac.createGain(); g.gain.value=vol;
    n.connect(f); f.connect(g); g.connect(master); n.start(t0);
  }
  function startHum(){
    if(!ac||hum) return;
    hum=ac.createOscillator(); humGain=ac.createGain();
    const filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=220;
    hum.type='triangle'; hum.frequency.value=70; humGain.gain.value=0.0;
    hum.connect(filt); filt.connect(humGain); humGain.connect(master); hum.start();
  }
  const PENTA=[523.25,587.33,659.25,783.99,880.00];
  let musicTimer=null, musicRoot=0;
  const semi=n=>Math.pow(2,n/12);
  function kalimbaNote(freq,t0,vol){
    if(!ac) return;
    const o=ac.createOscillator(), g=ac.createGain(), o2=ac.createOscillator();
    o.type='sine'; o2.type='sine'; o.frequency.value=freq; o2.frequency.value=freq*2.01;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol,t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+1.1);
    const g2=ac.createGain(); g2.gain.value=0.25;
    o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
    o.start(t0); o2.start(t0); o.stop(t0+1.2); o2.stop(t0+1.2);
  }
  function startMusic(){
    if(!ac||musicTimer) return;
    let step=0; const beat=60/110*2;
    const schedule=()=>{
      if(!musicOn){ musicTimer=setTimeout(schedule,beat*1000); return; }
      const t0=now()+0.05, tr=semi(musicRoot);
      kalimbaNote(PENTA[Math.floor(Math.random()*PENTA.length)]*tr,t0,0.10);
      if(step%2===0) kalimbaNote(PENTA[Math.floor(Math.random()*3)]*tr/2,t0,0.06);
      step++; musicTimer=setTimeout(schedule,beat*1000);
    };
    schedule();
  }
  function celebrate(){
    if(!ac) return; const t=now();
    [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>{ tone(f,t+i*0.10,0.6,'sine',0.26); tone(f*2,t+i*0.10,0.35,'triangle',0.10); });
    noise(t+0.05,0.5,0.05,2400); noise(t+0.28,0.45,0.04,3200);
  }
  return {
    resume,
    setMusic(v){ musicOn=v; }, isMusic(){ return musicOn; },
    setMusicRoot(n){ musicRoot=n||0; },
    setHum(on){ if(humGain&&ac) humGain.gain.linearRampToValueAtTime(on?0.05:0.0, now()+0.4); },
    celebrate,
    pop(){ tone(660,now(),0.09,'sine',0.28,880); },
    slide(){ noise(now(),0.10,0.05,900); },
    plop(){ const t=now(); tone(523.25,t,0.12,'sine',0.3); tone(659.25,t+0.09,0.12,'sine',0.3); tone(783.99,t+0.18,0.22,'sine',0.34); noise(t,0.06,0.06,500); },
    boop(){ const t=now(); tone(300,t,0.16,'triangle',0.22,180); },
    stamp(){ const t=now(); noise(t,0.05,0.14,320,3); tone(180,t,0.10,'square',0.18,120); tone(720,t+0.02,0.08,'sine',0.14); },
    seal(){ const t=now(); noise(t,0.22,0.10,1600,0.8); tone(880,t+0.05,0.14,'sine',0.16,1400); },
    rattle(){ const t=now(); for(let i=0;i<3;i++) noise(t+i*0.03,0.05,0.09,600+Math.random()*800,2); },
    greet(idx){ const t=now(); const base=[523,587,659,698,784,880][idx%6]; tone(base,t,0.10,'sine',0.26); tone(base*1.5,t+0.08,0.14,'sine',0.24); tone(base*2,t+0.16,0.18,'triangle',0.18); },
    golden(){ const t=now(); [659,784,988,1319].forEach((f,i)=>{ tone(f,t+i*0.07,0.5,'sine',0.28); tone(f*2,t+i*0.07,0.3,'triangle',0.12); }); },
    levelWin(){ const t=now(); [523.25,659.25,783.99,1046.5,1318.5,1568].forEach((f,i)=>{ tone(f,t+i*0.11,0.5,'sine',0.28); tone(f*2,t+i*0.11,0.28,'triangle',0.10); }); noise(t+0.1,0.5,0.05,2600); },
    buy(){ const t=now(); tone(784,t,0.10,'sine',0.24); tone(1046,t+0.08,0.14,'sine',0.22); noise(t,0.05,0.05,1800); },
  };
})();

/* ------------------------------------------------------------- ASSET LOADER */
const ASSET_SRC = {
  bg:'assets/bg-mailroom.jpg', bg_forest:'assets/bg-forest.jpg', bg_space:'assets/bg-space.jpg',
  poppu_postal:'assets/poppu-postal.png', poppu_wave:'assets/poppu-wave.png', poppu_celebrate:'assets/poppu-celebrate.png',
  conveyor:'assets/conveyor-belt.png', ui_play:'assets/ui-play-btn.png', ui_sticker:'assets/ui-sticker-frame.png',
};
TYPES.forEach(t=>{
  ASSET_SRC['pkg_'+t.id]='assets/pkg-'+t.id+'.png';
  ASSET_SRC['mailbox_'+t.id]='assets/mailbox-'+t.id+'.png';
  ASSET_SRC['face_'+t.id]='assets/face-'+t.id+'.png';
});
const IMG={}; let loadedCount=0, totalToLoad=Object.keys(ASSET_SRC).length, loadDone=false;
function beginLoad(){
  for(const k in ASSET_SRC){
    const im=new Image(); IMG[k]={img:im,ok:false};
    im.onload=()=>{ IMG[k].ok=(im.naturalWidth>0); tick(); };
    im.onerror=()=>{ IMG[k].ok=false; tick(); };
    im.src=ASSET_SRC[k];
  }
  setTimeout(()=>{ if(!loadDone) loadDone=true; }, 2500);
}
function tick(){ loadedCount++; if(loadedCount>=totalToLoad) loadDone=true; }
function has(k){ return IMG[k]&&IMG[k].ok; }
beginLoad();

/* --------------------------------------------------------- DRAW HELPERS */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shadow(blur,c,ox,oy){ ctx.shadowBlur=blur; ctx.shadowColor=c; ctx.shadowOffsetX=ox||0; ctx.shadowOffsetY=oy||0; }
function noShadow(){ ctx.shadowBlur=0; ctx.shadowColor='transparent'; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; }
function dist(a,b,c,d){ return Math.hypot(a-c,b-d); }
function inRect(px,py,r){ return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h; }
function easeOutBack(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

function drawIcon(kind,cx,cy,s,fill,stroke){
  ctx.save(); ctx.translate(cx,cy); ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.fillStyle=fill; ctx.strokeStyle=stroke||'#5a3d24'; ctx.lineWidth=s*0.11;
  if(kind==='star'){ ctx.beginPath(); for(let i=0;i<5;i++){ const a=-Math.PI/2+i*2*Math.PI/5, a2=a+Math.PI/5;
      ctx.lineTo(Math.cos(a)*s*0.5,Math.sin(a)*s*0.5); ctx.lineTo(Math.cos(a2)*s*0.22,Math.sin(a2)*s*0.22);} ctx.closePath(); ctx.fill(); ctx.stroke(); }
  else if(kind==='gear'){ const teeth=8,ro=s*0.5,ri=s*0.36; ctx.beginPath();
      for(let i=0;i<teeth*2;i++){ const r=i%2?ri:ro, a=i*Math.PI/teeth; ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);} ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,s*0.16,0,7); ctx.fillStyle=stroke||'#5a3d24'; ctx.fill(); }
  else if(kind==='moon'){ ctx.beginPath(); ctx.arc(0,0,s*0.46,0,7); ctx.fill(); ctx.stroke();
      ctx.globalCompositeOperation='destination-out'; ctx.beginPath(); ctx.arc(s*0.2,-s*0.12,s*0.42,0,7); ctx.fill(); ctx.globalCompositeOperation='source-over'; }
  else if(kind==='heart'){ const u=s*0.5; ctx.beginPath(); ctx.moveTo(0,u*0.35);
      ctx.bezierCurveTo(-u*1.1,-u*0.55,-u*0.5,-u*1.0,0,-u*0.35);
      ctx.bezierCurveTo(u*0.5,-u*1.0,u*1.1,-u*0.55,0,u*0.35); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  else if(kind==='drop'){ const u=s*0.5; ctx.beginPath(); ctx.moveTo(0,-u); ctx.bezierCurveTo(u*0.9,-u*0.1,u*0.7,u*0.9,0,u*0.9);
      ctx.bezierCurveTo(-u*0.7,u*0.9,-u*0.9,-u*0.1,0,-u); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  else if(kind==='cloud'){ ctx.beginPath(); ctx.arc(-s*0.22,s*0.05,s*0.24,0,7); ctx.arc(0,-s*0.1,s*0.3,0,7); ctx.arc(s*0.26,s*0.05,s*0.22,0,7);
      rr(-s*0.46,s*0.02,s*0.92,s*0.28,s*0.14); ctx.fill(); ctx.stroke(); }
  else if(kind==='bolt'){ ctx.beginPath(); ctx.moveTo(s*0.1,-s*0.5); ctx.lineTo(-s*0.28,s*0.06); ctx.lineTo(0,s*0.06); ctx.lineTo(-s*0.1,s*0.5); ctx.lineTo(s*0.3,-s*0.08); ctx.lineTo(0,-s*0.08); ctx.closePath(); ctx.fill(); ctx.stroke(); }
  else if(kind==='box'){ rr(-s*0.4,-s*0.4,s*0.8,s*0.8,s*0.12); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,-s*0.4); ctx.lineTo(0,s*0.4); ctx.stroke(); }
  else if(kind==='arrow'){ ctx.beginPath(); ctx.moveTo(-s*0.4,0); ctx.lineTo(s*0.2,0); ctx.stroke(); ctx.beginPath(); ctx.moveTo(s*0.0,-s*0.24); ctx.lineTo(s*0.36,0); ctx.lineTo(s*0.0,s*0.24); ctx.stroke(); }
  else if(kind==='eye'){ ctx.beginPath(); ctx.ellipse(0,0,s*0.44,s*0.28,0,0,7); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,s*0.16,0,7); ctx.fillStyle=stroke||'#5a3d24'; ctx.fill(); }
  ctx.restore();
}
function drawText(txt,x,y,size,fill,stroke,align='center',weight='800',sw){
  ctx.save(); ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.font=weight+' '+size+'px "Baloo 2","Arial Rounded MT Bold",system-ui,sans-serif';
  if(stroke){ ctx.lineJoin='round'; ctx.lineWidth=sw||size*0.16; ctx.strokeStyle=stroke; ctx.strokeText(txt,x,y); }

function boxScale(){ return hasUp('bigBoxes')?1.25:1; }
function activeBoxes(){
  const n=curLevel().boxes;
  const ids=[]; for(let i=0;i<n;i++) ids.push(i);
  let cols,rows,bw;
  if(n<=3){ cols=[1600]; rows=[262,545,828]; bw=290; }
  else if(n<=4){ cols=[1445,1735]; rows=[372,712]; bw=252; }
  else { cols=[1445,1735]; rows=[248,560,872]; bw=228; }
  bw=Math.round(bw*boxScale());
  const ncol=cols.length;
  return ids.map((ti,k)=>{
    let bx=cols[k%ncol], by=rows[Math.floor(k/ncol)];
    if(shuffleActive){ bx+=Math.sin(time*0.7+k)*10; by+=Math.cos(time*0.6+k*1.3)*8; }
    return { typeIdx:ti, type:TYPES[ti], x:bx, y:by, w:bw, h:bw };
  });
}
function boxAt(sx,sy){ for(const b of activeBoxes()){ if(Math.abs(sx-b.x)<b.w*0.55&&Math.abs(sy-b.y)<b.h*0.55) return b; } return null; }
function levelTypes(){ const n=curLevel().boxes; return TYPES.slice(0,n); }
function randType(){ const t=levelTypes(); return t[Math.floor(Math.random()*t.length)]; }

/* ------------------------------------------------------ PACKAGE / TASK FLOW */
function newBeltPkg(x,type,golden){
  return { type, golden, x, y:BELT.y-20, state:'belt', scale:1, wob:Math.random()*6, born:time };
}
function spawnBeltPackage(x){
  const g=curLevel().mech.golden ? true : (Math.random()<GOLDEN_CHANCE);
  packages.push(newBeltPkg(x!=null?x:BELT.x1-40, randType(), g));
  spawnedThisLevel++;
}
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function beginNextTask(){
  taskNo++;
  const m=curLevel().mech, remaining=curLevel().pkgs-spawnedThisLevel;
  let kind='drag';
  if(m.shake && taskNo%8===0 && remaining>=3) kind='shake';
  else if(m.stamp && taskNo%5===0) kind='stamp';
  else if(m.seal && taskNo%3===0) kind='seal';
  if(kind==='drag'){ spawnBeltPackage(); return; }
  const golden=m.golden?true:(Math.random()<GOLDEN_CHANCE);
  if(kind==='seal'){ activeTask={ kind:'seal', type:randType(), golden, prog:0, done:false, t:0 }; }
  else if(kind==='stamp'){
    const opts=['star','heart','moon']; const want=opts[Math.floor(Math.random()*opts.length)];
    activeTask={ kind:'stamp', type:randType(), golden, want, opts:shuffleArr(opts.slice()), stamped:false, t:0, flash:0 };
  } else if(kind==='shake'){
    const items=[]; for(let i=0;i<3;i++) items.push({ type:randType(), golden:m.golden||Math.random()<GOLDEN_CHANCE,
      ox:(Math.random()-0.5)*70, oy:(Math.random()-0.5)*50, rot:(Math.random()-0.5)*0.6 });
    activeTask={ kind:'shake', items, taps:0, sorted:false, t:0 };
  }
}

function resolveSeal(){
  if(!activeTask||activeTask.kind!=='seal'||activeTask.done) return;
  activeTask.done=true; Audio_.seal(); burst(STATION.x,STATION.y,'#fff3c4',18,7);
  packages.push(newBeltPkg(BELT.x1-40, activeTask.type, activeTask.golden)); spawnedThisLevel++;
  setTimeout(()=>{ if(activeTask&&activeTask.kind==='seal') activeTask=null; }, 260);
}
function resolveStamp(){
  if(!activeTask||activeTask.kind!=='stamp'||activeTask.stamped) return;
  activeTask.stamped=true; Audio_.stamp(); burst(STATION.x,STATION.y,'#E3A93E',16,6);
  packages.push(newBeltPkg(BELT.x1-40, activeTask.type, activeTask.golden)); spawnedThisLevel++;
  setTimeout(()=>{ if(activeTask&&activeTask.kind==='stamp') activeTask=null; }, 300);
}
function resolveShake(){
  if(!activeTask||activeTask.kind!=='shake'||activeTask.sorted) return;
  activeTask.sorted=true; Audio_.rattle(); Audio_.pop(); burst(STATION.x,STATION.y,'#98D7B4',22,8);
  const items=activeTask.items;
  for(let i=0;i<items.length;i++){ packages.push(newBeltPkg(BELT.x1-40-i*140, items[i].type, items[i].golden)); spawnedThisLevel++; }
  setTimeout(()=>{ if(activeTask&&activeTask.kind==='shake') activeTask=null; }, 320);
}

/* -------------------------------------------------------------- DELIVERY */
function addStamps(n){ SAVE.stamps=(SAVE.stamps||0)+n; }
function deliver(pkg, box){
  const bp={x:box.x,y:box.y}, ti=box.typeIdx;
  pkg.state='delivering'; pkg.tState=0; pkg.dtx=bp.x; pkg.dty=bp.y;
  Audio_.plop(); Audio_.greet(ti);
  burst(bp.x,bp.y-40,pkg.type.deep,24,9);
  boxBounce[ti]=1; poppuCelebrateT=0.9;
  popups.push({ type:pkg.type, x:bp.x, y:bp.y-box.h*0.55, t:0, boxTop:bp.y-box.h*0.55 });
  floatTexts.push({ x:bp.x, y:bp.y-box.h*0.9, text:CATCH[pkg.type.id]||'thank you!', t:0, color:pkg.type.deep });

  // ---- Star Stamps economy ----
  const speedy=(time-(pkg.born||time))<4.0;
  let earn = pkg.golden?15:(speedy?5:3);
  if(hasUp('doubleStamps')) earn*=2;
  addStamps(earn);
  floatTexts.push({ x:bp.x, y:bp.y-box.h*1.15, text:'+'+earn+'⭐', t:0, color:'#E3A93E' });

  // meta progress
  SAVE.deliveredToday+=1; SAVE.totalDelivered+=1;
  deliveredThisLevel+=1;
  const before=Math.floor((SAVE.totalDelivered-1)/STICKER_EVERY), after=Math.floor(SAVE.totalDelivered/STICKER_EVERY);
  for(let k=before;k<after;k++){ SAVE.stickers.push(TYPES[k%TYPES.length].id);
    floatTexts.push({x:bp.x,y:bp.y-box.h*1.35,text:'★ sticker!',t:0,color:'#E3A93E'}); }
  if(pkg.golden){ Audio_.golden(); confetti(bp.x,bp.y-40); }

  persist();
  setTimeout(()=>{ packages=packages.filter(p=>p!==pkg); }, 620);

  if(!levelDone && deliveredThisLevel>=curLevel().pkgs) finishLevel();
}

/* ------------------------------------------------------------- LEVEL FLOW */
function startLevel(n){
  currentLevel=Math.max(1,Math.min(LEVELS.length,n));
  state='PLAYING';
  packages=[]; particles=[]; popups=[]; floatTexts=[]; dragging=null; hoverType=null; sealSwipe=null;
  activeTask=null; taskNo=0; spawnedThisLevel=0; deliveredThisLevel=0; mistakesThisLevel=0;
  levelDone=false; spawnTimer=0.4; levelStartT=time; shuffleActive=false;
  Audio_.resume(); Audio_.setHum(true); Audio_.setMusicRoot(SCENES[currentScene].music.root);
}
function finishLevel(){
  levelDone=true; Audio_.setHum(false); Audio_.levelWin(); Audio_.celebrate();
  confetti(W/2,H/2);
  const L=curLevel(), t=time-levelStartT;
  let stars=3;
  if(mistakesThisLevel>4) stars=1; else if(mistakesThisLevel>1) stars=2;
  const parTime=L.pkgs*3.2;
  if(t>parTime*1.8 && stars>1) stars-=1;
  stars=Math.max(1,Math.min(3,stars));
  const bonus=[0,10,20,30][stars];
  addStamps(bonus);
  SAVE.lastPlayDay=todayStr();
  if(stars>(SAVE.levelStars[currentLevel-1]||0)) SAVE.levelStars[currentLevel-1]=stars;
  if(currentLevel>=SAVE.maxLevel && currentLevel<LEVELS.length) SAVE.maxLevel=currentLevel+1;
  persist();
  doneScreen={ stars, stamps:bonus, level:currentLevel };
  setTimeout(()=>{ state='LEVELDONE'; }, 900);
}

/* ------------------------------------------------------------- INPUT */
function pickPackage(sx,sy){
  for(let i=packages.length-1;i>=0;i--){ const p=packages[i]; if(p.state==='delivering'||p.state==='sentoff') continue;
    if(Math.abs(sx-p.x)<PKG_S*0.62&&Math.abs(sy-p.y)<PKG_S*0.62) return p; }
  return null;
}

/* screen button geometries */
const PLAYBTN={x:W/2,y:560,r:112};
const START_BTNS=()=>{ const y=742,w=300,h=98,gap=34,total=3*w+2*gap,x0=W/2-total/2;
  return [{id:'levels',x:x0,y,w,h},{id:'shop',x:x0+w+gap,y,w,h},{id:'stickers',x:x0+2*(w+gap),y,w,h}]; };
const SCENE_BTNS=()=>{ const y=H-172,w=250,h=132,gap=28,total=3*w+2*gap,x0=W/2-total/2;
  return SCENES.map((S,i)=>({S,x:x0+i*(w+gap),y,w,h})); };
const STAMP_CHIP={x:W-40,y:56};
const HOMEBTN={x:90,y:90,r:56};
const BACKBTN={x:150,y:H-120,r:70};

function levelNodes(){
  const nodes=[]; const cols=5, cw=300, ch=300, gx=(W-cols*cw)/2+cw/2, gy=360;
  for(let i=0;i<LEVELS.length;i++){ const r=Math.floor(i/cols), c=i%cols;
    const cc=(r%2===0)?c:(cols-1-c);
    nodes.push({ n:i+1, x:gx+cc*cw, y:gy+r*ch, rad:96 }); }
  return nodes;
}
function shopTabRects(){ const w=300,h=84,y=150,gap=24,x0=W/2-(2*w+gap)/2;
  return [{id:'upgrade',x:x0,y,w,h},{id:'cosmetic',x:x0+w+gap,y,w,h}]; }
function shopCatRects(){ const w=250,h=64,y=262,gap=18,total=4*w+3*gap,x0=W/2-total/2;
  return COS_CATS.map((c,i)=>({c,x:x0+i*(w+gap),y,w,h})); }
function upgradeCards(){ const cw=340,ch=300,gap=30,cols=5,total=cols*cw+(cols-1)*gap,x0=W/2-total/2,y=360;
  return UPGRADES.map((u,i)=>({u,x:x0+i*(cw+gap),y,w:cw,h:ch})); }
function cosmeticCards(){ const list=COSMETICS.filter(c=>c.cat===shopCat);
  const cw=300,ch=320,gap=30,cols=Math.min(4,list.length),total=cols*cw+(cols-1)*gap,x0=W/2-total/2,y=380;
  return list.map((c,i)=>({c,x:x0+i*(cw+gap),y,w:cw,h:ch})); }
function doneBtns(){ const y=760,w=280,h=110,gap=40,total=3*w+2*gap,x0=W/2-total/2;
  return [{id:'replay',x:x0,y,w,h},{id:'next',x:x0+w+gap,y,w,h},{id:'home',x:x0+2*(w+gap),y,w,h}]; }
function stampTray(){ const y=602,r=86,gap=230, cx=STATION.x;
  return [ {x:cx-gap,y,r}, {x:cx,y,r}, {x:cx+gap,y,r} ]; }

function onDown(cx,cy){
  Audio_.resume();
  const p=toStage(cx,cy);
  if(state==='START'){
    if(dist(p.x,p.y,PLAYBTN.x,PLAYBTN.y)<PLAYBTN.r){ startLevel(Math.min(SAVE.maxLevel,LEVELS.length)); return; }
    for(const b of START_BTNS()) if(inRect(p.x,p.y,b)){
      if(b.id==='levels'){ state='LEVELMAP'; Audio_.pop(); }
      else if(b.id==='shop'){ state='SHOP'; shopTab='upgrade'; Audio_.pop(); }
      else if(b.id==='stickers'){ state='STICKER'; Audio_.pop(); } return; }
    for(const r of SCENE_BTNS()) if(inRect(p.x,p.y,r)){ if(sceneUnlocked(r.S.id)){ setScene(r.S.id); Audio_.pop(); } else Audio_.boop(); return; }
    return;
  }
  if(state==='LEVELMAP'){
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ state='START'; return; }
    for(const nd of levelNodes()) if(dist(p.x,p.y,nd.x,nd.y)<nd.rad){
      if(levelUnlocked(nd.n)) startLevel(nd.n); else Audio_.boop(); return; }
    return;
  }
  if(state==='SHOP'){
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ state='START'; return; }
    for(const t of shopTabRects()) if(inRect(p.x,p.y,t)){ shopTab=t.id; Audio_.pop(); return; }
    if(shopTab==='upgrade'){ for(const c of upgradeCards()) if(inRect(p.x,p.y,c)){ buyUpgrade(c.u); return; } }
    else { for(const r of shopCatRects()) if(inRect(p.x,p.y,r)){ shopCat=r.c; Audio_.pop(); return; }
      for(const c of cosmeticCards()) if(inRect(p.x,p.y,c)){ buyOrEquip(c.c); return; } }
    return;
  }
  if(state==='STICKER'){ if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r) state='START'; return; }
  if(state==='LEVELDONE'){
    for(const b of doneBtns()) if(inRect(p.x,p.y,b)){
      if(b.id==='replay') startLevel(currentLevel);
      else if(b.id==='next') startLevel(Math.min(LEVELS.length,currentLevel+1));
      else state='START'; return; }
    return;
  }
  if(state==='PLAYING'){
    if(dist(p.x,p.y,HOMEBTN.x,HOMEBTN.y)<HOMEBTN.r){ state='START'; Audio_.setHum(false); return; }
    if(activeTask){
      if(activeTask.kind==='seal' && !activeTask.done){
        if(Math.abs(p.x-STATION.x)<190 && Math.abs(p.y-STATION.y)<130){ sealSwipe={x0:p.x, dx:0}; return; }
      } else if(activeTask.kind==='stamp' && !activeTask.stamped){
        const tray=stampTray();
        for(let i=0;i<3;i++){ if(dist(p.x,p.y,tray[i].x,tray[i].y)<tray[i].r){
          if(activeTask.opts[i]===activeTask.want) resolveStamp();
          else { Audio_.boop(); activeTask.flash=0.4; } return; } }
      } else if(activeTask.kind==='shake' && !activeTask.sorted){
        if(Math.abs(p.x-STATION.x)<230 && Math.abs(p.y-STATION.y)<170){
          activeTask.taps++; Audio_.rattle(); for(const it of activeTask.items){ it.ox+=(Math.random()-0.5)*30; it.oy+=(Math.random()-0.5)*20; }
          if(activeTask.taps>=3) resolveShake(); return; }
      }
    }
    const pk=pickPackage(p.x,p.y);
    if(pk){ dragging=pk; pk.state='dragging'; dragDX=p.x-pk.x; dragDY=p.y-pk.y; pk.scale=1.14; Audio_.pop(); }
  }
}
function onMove(cx,cy){
  const p=toStage(cx,cy);
  if(sealSwipe && activeTask && activeTask.kind==='seal' && !activeTask.done){
    sealSwipe.dx=p.x-sealSwipe.x0; activeTask.prog=Math.max(0,Math.min(1,sealSwipe.dx/220));
    if(sealSwipe.dx>200){ resolveSeal(); sealSwipe=null; }
    return;
  }
  if(!dragging) return;
  dragging.x=p.x-dragDX; dragging.y=p.y-dragDY;
  const b=boxAt(dragging.x,dragging.y); const id=b?b.type.id:null;
  if(id!==hoverType){ hoverType=id; if(b) Audio_.slide(); }
}
function onUp(cx,cy){
  if(sealSwipe){ sealSwipe=null; if(activeTask&&activeTask.kind==='seal') activeTask.prog=0; }
  if(!dragging) return;
  const b=boxAt(dragging.x,dragging.y);
  if(b && b.type.id===dragging.type.id){ deliver(dragging,b); }
  else { dragging.state='returning'; mistakesThisLevel++;
    if(hasUp('autoSorter')) Audio_.slide(); else Audio_.boop();
    burst(dragging.x,dragging.y,'#cbb',8,4); }
  dragging.scale=1; dragging=null; hoverType=null;
}

/* buy handlers */
function buyUpgrade(u){
  if(hasUp(u.id)){ Audio_.boop(); return; }
  if((SAVE.stamps||0)>=u.cost){ SAVE.stamps-=u.cost; SAVE.upgrades[u.id]=true; Audio_.buy(); persist();
    floatTexts.push({x:W/2,y:660,text:u.name+'!',t:0,color:'#5FB985',big:true}); }
  else Audio_.boop();
}
function buyOrEquip(c){
  if(owns(c.id)){ SAVE.equipped[c.cat]=(SAVE.equipped[c.cat]===c.id)?null:c.id; Audio_.pop(); persist(); return; }
  if((SAVE.stamps||0)>=c.cost){ SAVE.stamps-=c.cost; SAVE.owned[c.id]=true; SAVE.equipped[c.cat]=c.id; Audio_.buy(); persist();
    floatTexts.push({x:W/2,y:660,text:'Got '+c.name+'!',t:0,color:'#B79BEA',big:true}); }
  else Audio_.boop();
}

canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); try{canvas.setPointerCapture(e.pointerId);}catch(_){} onDown(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointermove',e=>{ e.preventDefault(); onMove(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointerup',e=>{ e.preventDefault(); onUp(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointercancel',e=>{ if(dragging){ dragging.state='returning'; dragging.scale=1; dragging=null; hoverType=null; } sealSwipe=null; });
window.addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});
let lastShake=0;
window.addEventListener('devicemotion',e=>{
  if(state!=='PLAYING'||!activeTask||activeTask.kind!=='shake'||activeTask.sorted) return;
  const a=e.accelerationIncludingGravity; if(!a) return;
  const mag=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0);
  if(mag>32 && time-lastShake>0.25){ lastShake=time; activeTask.taps++; Audio_.rattle();
    for(const it of activeTask.items){ it.ox+=(Math.random()-0.5)*40; it.oy+=(Math.random()-0.5)*24; }
    if(activeTask.taps>=3) resolveShake(); }
});

/* ------------------------------------------------------------- UPDATE */
function update(dt){
  time+=dt;
  if(poppuCelebrateT>0) poppuCelebrateT=Math.max(0,poppuCelebrateT-dt);
  for(let i=0;i<6;i++) if(boxBounce[i]>0) boxBounce[i]=Math.max(0,boxBounce[i]-dt*2.4);
  if(activeTask){ activeTask.t+=dt; if(activeTask.flash>0) activeTask.flash=Math.max(0,activeTask.flash-dt); }
  for(const a of ambient){ a.x+=a.vx*dt; a.y+=a.vy*dt; a.ph+=dt;
    if(a.kind==='leaf'){ a.x+=Math.sin(a.ph*1.4)*18*dt; if(a.y>H+20){ a.y=-20; a.x=Math.random()*W; } }
    else { if(a.x<-20)a.x=W+20; if(a.x>W+20)a.x=-20; if(a.y<-20)a.y=H+20; if(a.y>H+20)a.y=-20; } }

  if(state==='PLAYING' && !levelDone){
    shuffleActive = !!curLevel().mech.shuffle;
    const beltSpeed=curLevel().speed * (hasUp('speedBelt')?1.2:1);
    spawnTimer-=dt;
    for(const p of packages){
      if(p.state==='belt'){ p.x+=beltSpeed*dt; p.y=BELT.y-20+Math.sin(time*2+p.wob)*4;
        if(p.x>BELT.x2+150){ p.state='sentoff'; p.offT=0; burst(p.x,p.y,'#e8dcc4',6,3); } }
      else if(p.state==='sentoff'){ p.offT=(p.offT||0)+dt; p.x+=beltSpeed*dt*1.4; p.scale=Math.max(0,1-p.offT*3); }
      else if(p.state==='returning'){ const ty=BELT.y-20; p.y+=(ty-p.y)*Math.min(1,dt*8);
        const tx=Math.max(BELT.x1,Math.min(BELT.x2,p.x)); p.x+=(tx-p.x)*Math.min(1,dt*8);
        if(Math.abs(p.y-ty)<3) p.state='belt'; }
      else if(p.state==='delivering'){ p.tState=(p.tState||0)+dt;
        p.x+=(p.dtx-p.x)*Math.min(1,dt*12); p.y+=(p.dty-24-p.y)*Math.min(1,dt*12); p.scale=Math.max(0,1-p.tState*2.2); }
    }
    packages=packages.filter(p=>!(p.state==='sentoff'&&p.scale<=0.02));
    const beltCap=curLevel().mech.multi?3:2;
    const beltActive=packages.filter(p=>p.state==='belt'||p.state==='returning'||p.state==='dragging').length;
    if(!activeTask && spawnedThisLevel<curLevel().pkgs && beltActive<beltCap && spawnTimer<=0){
      beginNextTask(); spawnTimer=curLevel().mech.multi?0.6:0.9;
    }
    // "party" levels: gentle decorative confetti drifting down — purely festive, never blocks play
    if(curLevel().mech.distract && Math.random()<dt*3){
      const cols=['#FF9DB6','#8ECFEC','#FFD15C','#B79BEA','#98D7B4'];
      particles.push({x:Math.random()*W, y:-20, vx:(Math.random()-0.5)*2, vy:1.5+Math.random()*1.5,
        life:2.2, color:cols[(Math.random()*cols.length)|0], size:9+Math.random()*7,
        rot:Math.random()*7, vr:(Math.random()-0.5)*0.3, shape:'rect', grav:0.05});
    }
  }
  for(const pt of particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=(pt.grav||0.4); pt.vx*=0.99; pt.rot+=pt.vr; pt.life-=dt*(pt.shape==='rect'?0.6:1.4); }
  particles=particles.filter(p=>p.life>0);
  for(const pu of popups) pu.t+=dt; popups=popups.filter(p=>p.t<1.7);
  for(const ft of floatTexts) ft.t+=dt; floatTexts=floatTexts.filter(f=>f.t<1.4);
}

function drawBackground(){
  const sc=SCENES[currentScene];
  if(has(sc.bg)) ctx.drawImage(IMG[sc.bg].img,0,0,W,H);
  else if(has('bg')) ctx.drawImage(IMG.bg.img,0,0,W,H);
  else ph_background();
  if(sc.tint){ ctx.save(); ctx.fillStyle=sc.tint; ctx.fillRect(0,0,W,H); ctx.restore(); }
}
function drawAmbient(){
  for(const a of ambient){ ctx.save(); ctx.translate(a.x,a.y);
    if(a.kind==='star'){ const tw=0.5+0.5*Math.abs(Math.sin(a.ph*2)); ctx.globalAlpha=tw*0.9;
      ctx.fillStyle=a.col; ctx.beginPath(); ctx.arc(0,0,a.sz*(0.6+tw*0.5),0,7); ctx.fill(); }
    else if(a.kind==='leaf'){ ctx.rotate(a.ph); ctx.globalAlpha=0.85; ctx.fillStyle=a.col;
      ctx.beginPath(); ctx.ellipse(0,0,a.sz*0.5,a.sz*0.28,0,0,7); ctx.fill(); }
    else { ctx.globalAlpha=0.25+0.2*Math.sin(a.ph*2); ctx.fillStyle=a.col; ctx.beginPath(); ctx.arc(0,0,a.sz*0.28,0,7); ctx.fill(); }
    ctx.restore(); }
}
function drawParticles(){
  for(const p of particles){ ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,p.life)); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color;
    if(p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*0.66);
    else if(p.shape==='star') drawIcon('star',0,0,p.size*1.6,p.color,p.color);
    else { ctx.beginPath(); ctx.arc(0,0,p.size*0.5,0,7); ctx.fill(); }
    ctx.restore(); }
}
function drawFloatTexts(){

/* ------------------------------------------------------------- RENDER: PLAY */
function drawMailboxes(){
  const hint=curLevel().hint, mbSkin=equipped('mailbox'), scan=hasUp('scanner');
  for(const b of activeBoxes()){ const type=b.type, i=b.typeIdx;
    const hovered=hoverType===type.id;
    let glow=0;
    if(dragging && hovered && dragging.type.id===type.id) glow=1+Math.sin(time*10)*0.3;
    else if(dragging && dragging.type.id===type.id) glow=0.4+Math.sin(time*6)*0.18;
    if(scan && dragging && dragging.type.id===type.id) glow=Math.max(glow,0.7+Math.sin(time*8)*0.2);
    const bn=boxBounce[i], pop=bn>0?Math.sin((1-bn)*Math.PI)*0.14:0;
    const sx=1+pop*0.4, sy=1-pop*0.4;
    ctx.save(); ctx.globalAlpha=0.55; ctx.fillStyle=type.light; ctx.beginPath(); ctx.arc(b.x,b.y+b.h*0.02,b.w*0.52,0,7); ctx.fill(); ctx.restore();
    mailboxSkinRing(b, mbSkin);
    ctx.save(); ctx.translate(b.x,b.y+(glow>0.6?-6:0)); ctx.scale(sx,sy);
    if(glow>0) shadow(46*glow,type.deep);
    const s=b.w*(1+(hovered&&glow>0.6?0.05:0));
    if(has('mailbox_'+type.id)) ctx.drawImage(IMG['mailbox_'+type.id].img,-s/2,-s/2,s,s);
    else ph_mailbox(type,0,0,b.w*0.9,glow);
    noShadow(); ctx.restore();
    drawBoxTag(b,hint);
  }
}
function drawBoxTag(b,hint){
  const tx=b.x, ty=b.y-b.h*0.52, r=b.w*0.17, type=b.type;
  ctx.save(); shadow(10,'rgba(0,0,0,0.14)',0,4); ctx.fillStyle='#fffdf6'; ctx.beginPath(); ctx.arc(tx,ty,r,0,7); ctx.fill(); noShadow();
  ctx.lineWidth=r*0.16; ctx.strokeStyle=type.deep; ctx.stroke();
  if(hint==='color'){ const cg=ctx.createLinearGradient(tx,ty-r,tx,ty+r); cg.addColorStop(0,type.light); cg.addColorStop(1,type.deep);

  drawText('My Sticker Book',W/2,110,80,'#7a5a34','#fff','center','800',12);
  drawText(SAVE.stickers.length+' stickers · '+SAVE.totalDelivered+' delivered',W/2,190,36,'#a88a5c',null,'center','700');
  const cols=8, rows=4, total=cols*rows, cw=180, ch=180, gx=(W-cols*cw)/2, gy=260;
  for(let i=0;i<total;i++){ const cx=gx+(i%cols)*cw+cw/2, cy=gy+Math.floor(i/cols)*ch+ch/2, earned=i<SAVE.stickers.length;
    ctx.save();
    if(has('ui_sticker')){ ctx.save(); if(!earned) ctx.globalAlpha=0.4; ctx.drawImage(IMG.ui_sticker.img,cx-80,cy-80,160,160); ctx.restore(); }
    else { ctx.fillStyle='rgba(0,0,0,0.05)'; ctx.strokeStyle='#d9c3a0'; ctx.lineWidth=4; ctx.setLineDash([12,10]); rr(cx-70,cy-70,140,140,20); ctx.fill(); ctx.stroke(); ctx.setLineDash([]); }
    if(earned){ const type=T[SAVE.stickers[i]]||TYPES[i%6], bob=Math.sin(time*2+i)*3;
      if(has('pkg_'+type.id)) ctx.drawImage(IMG['pkg_'+type.id].img,cx-58,cy-58+bob,116,116); else ph_face(type,cx,cy,110); }
    ctx.restore();
  }
  backButton();
}
function drawLoading(){
  ph_background(); ctx.fillStyle='rgba(255,248,235,0.7)'; ctx.fillRect(0,0,W,H);
  ph_poppu('wave',W/2,H/2-40,200);
  drawText('Loading...',W/2,H/2+220,48,'#7a5a34',null,'center','700');
}

/* ------------------------------------------------------------- MAIN LOOP */
currentScene=Math.min(SCENES.length-1,Math.max(0,SAVE.currentScene||0));
if(!sceneUnlocked(currentScene)) currentScene=0;
buildAmbient(SCENES[currentScene].amb);
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt);
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#e2d0b2'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(scale*DPR,0,0,scale*DPR,offX*DPR,offY*DPR);
  if(state==='LOADING'){ if(loadDone) state='START'; drawLoading(); }
  else if(state==='START') drawStart();
  else if(state==='LEVELMAP') drawLevelMap();
  else if(state==='SHOP') drawShop();
  else if(state==='PLAYING') drawPlaying();
  else if(state==='LEVELDONE') drawLevelDone();
  else if(state==='STICKER') drawSticker();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
['pointerdown','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,()=>Audio_.resume(),{once:false}));

/* __TESTHOOK__ */
window.__t = {
  get state(){ return state; }, set state(v){ state=v; },
  get save(){ return SAVE; },
  startLevel(n){ startLevel(n); },
  setScene(i){ setScene(i); },
  addStamps(n){ addStamps(n); persist(); },
  unlockAll(){ SAVE.maxLevel=LEVELS.length; persist(); },
  task(){ return activeTask; },
  forceTask(kind){ activeTask=null; taskNo=(kind==='shake'?7:kind==='stamp'?4:2); beginNextTask(); return activeTask; },
  resolveTask(){ if(!activeTask) return false; if(activeTask.kind==='seal') resolveSeal(); else if(activeTask.kind==='stamp') resolveStamp(); else resolveShake(); return true; },
  deliverOne(){ const p=packages.find(p=>p.state==='belt'||p.state==='returning'); if(!p) return false;
    const b=activeBoxes().find(b=>b.type.id===p.type.id); if(!b) return false; deliver(p,b); return true; },
  realDrag(){ const p=packages.find(p=>p.state==='belt'); if(!p) return false;
    const b=activeBoxes().find(b=>b.type.id===p.type.id); if(!b) return false;
    const cl=(sx,sy)=>({x:sx*scale+offX,y:sy*scale+offY});
    const a=cl(p.x,p.y); onDown(a.x,a.y);
    const c=cl(b.x,b.y); onMove(c.x,c.y); onUp(c.x,c.y); return true; },
  levelInfo(){ return { level:currentLevel, delivered:deliveredThisLevel, target:curLevel().pkgs, spawned:spawnedThisLevel, done:levelDone }; }
};
