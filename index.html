function drawTruck(){
  const D=drive; if(!D) return;
  const cx=roadCenterX(D.scrollY), off=Math.abs(D.truck.x-cx);
  let renderX=D.truck.x; if(off>350 && !D.arriving) renderX+=Math.sin(time*28)*6;
  // continuous "driving" life so the truck reads as MOVING, not parked in a corridor (player/creative/
  // gameplay note): a gentle bumpy-road bob + a soft body sway, plus little puffs kicked up behind it.
  const driving=!D.arriving;
  const bob = driving ? Math.sin(time*9)*3 + Math.sin(time*13.7)*1.4 : 0;
  const sway = driving ? Math.sin(time*4.7)*0.02 : 0;
  if(driving){
    const surf=(D.biome&&D.biome.roadSurface)||'dirt';
    // lighter, warmer dust so it pops off the same-tone road at a glance (player note); globalAlpha
    // below does the fading, so keep the colour near-opaque here.
    const dcol = surf==='cloud' ? 'rgb(255,255,255)' : 'rgb(233,216,180)';
    ctx.save();
    // big poofy dust: opacity PEAKS mid-life (sin bell) so the LARGEST puffs stay visible (not faded
    // out just as they grow) — a frozen frame now clearly reads 'vroom, bumpy dirt road'.
    for(let i=0;i<5;i++){ const ph=((time*1.7+i*0.45)%1);
      ctx.globalAlpha=Math.sin(ph*Math.PI)*0.55; ctx.fillStyle=dcol;
      const px=renderX-8+(i-2)*22, py=888+ph*40, pr=16+ph*30;
      ctx.beginPath(); ctx.ellipse(px,py,pr,pr*0.6,0,0,7); ctx.fill(); }
    // soft persistent dust cushion at the wheels so even a still frame shows kicked-up dust
    ctx.globalAlpha=0.32; ctx.fillStyle=dcol;
    ctx.beginPath(); ctx.ellipse(renderX-4,892,56,20,0,0,7); ctx.fill();
    ctx.restore();
  }
  // flat contact shadow OUTSIDE the rotate block — stays flush on the road, never tilts with the truck
  bakedContactShadow(renderX,890,100,24,0.36);
  ctx.save(); ctx.translate(renderX,820+bob); ctx.rotate(D.truck.rot+sway);
  // FIX 4: a soft drop-shadow rim so the van separates from the pale sky/riverside backdrops (it was
  // blending into the near-white cloud road). Biome-aware tone; subtle on the darker dirt biomes.
  const cloudy=(D.biome&&D.biome.roadSurface)==='cloud', pale=cloudy||(D.biome&&D.biome.name==='riverside');
  if(has('mail_truck')){
    if(pale){ shadow(16,cloudy?'rgba(40,64,110,0.5)':'rgba(30,90,130,0.42)',0,3); }
    ctx.drawImage(IMG.mail_truck.img,-100,-80,200,160); noShadow();
  } else ph_truck();
  ctx.restore();
}
/* The chosen friend (rotates — see startDrive) runs in from over the road and lands beside Poppu
   (by the parked truck), close enough that their sprites visually overlap into a hug — not a
   disconnected sky-drop + separate popup. Position/timing is friend-agnostic; only the sprite differs. */
const DRIVE_FRIEND_LAND={ x:1090, y:762 }, DRIVE_POPPU_POS={ x:955, y:722 };
function drawDriveArrival(){
  const D=drive; if(!D||!D.arriving) return; const t=D.arriveT;
  const friendType=D.friendType||T.gear, friendKey=fullBodyKey(friendType);
  // 1. radial welcome glow — fades in first so the tableau doesn't pop into an empty peak
  const glowA=Math.min(1,t/0.5)*0.55;
  if(glowA>0.005){
    const g=ctx.createRadialGradient(1000,800,0,1000,800,560);
    g.addColorStop(0,'rgba(255,248,225,'+glowA+')'); g.addColorStop(1,'rgba(255,248,225,0)');
    ctx.save(); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(1000,800,560,0,7); ctx.fill(); ctx.restore();
  }
  // 2. flattened arrival mat — cream-to-peach with an inner white ring, grounds the whole tableau
  const matA=Math.min(1,t/0.3);
  ctx.save(); ctx.globalAlpha=matA; ctx.translate(1000,930); ctx.scale(1,90/360);
  const mg=ctx.createRadialGradient(0,0,20,0,0,360); mg.addColorStop(0,'#FFCFA0'); mg.addColorStop(1,'#E39B6E');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(0,0,360,0,7); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=14; ctx.beginPath(); ctx.arc(0,0,280,0,7); ctx.stroke();
  ctx.restore();
  // 3. contact shadows for both characters — appear first, like a landing-spot preview
  bakedContactShadow(DRIVE_POPPU_POS.x,890,155,32,0.32);
  bakedContactShadow(DRIVE_FRIEND_LAND.x,912,125,28,0.30);
  // 4. the chosen friend drops in and leans in close, overlapping into a real embrace (not
  //    side-by-side arms-up) — a bigger close-in pull + an inward lean sells "wrapped together".
  //    Every knob below (drop timing/ease/lean/squeeze/pull) comes from DRIVE_FLAIR so each friend's
  //    arrival carries its own personality instead of one shared generic pose.
  const DF=DRIVE_FLAIR[friendType.id]||DRIVE_FLAIR.gear;
  let hugP=0;
  if(t>=DF.dropStart){
    const p=Math.max(0,Math.min(1,(t-DF.dropStart)/DF.dropDur));
    const e=DF.ease==='quad'?(1-(1-p)*(1-p)):easeOutBack(p);
    const y=-220+(DRIVE_FRIEND_LAND.y-(-220))*e;
    hugP=Math.max(0,Math.min(1,(t-0.9)/0.4));                   // final close-in step, right into the hug
    const x=DRIVE_FRIEND_LAND.x-DF.pullX*hugP;                  // pulls in tight — real overlap, not a gap
    const hugSquash=1+Math.sin(Math.min(1,hugP)*Math.PI)*DF.squeeze;   // per-friend squeeze bounce
    // Peeky's proud little stumble-wobble on the way down — settles out as he lands
    const stumble=friendType.id==='gear'?Math.sin(p*16)*0.06*(1-p):0;
    // Orby drifts in a slow dreamy sway rather than a hard lean, even once hugged in
    const sway=friendType.id==='moon'?Math.sin(t*1.1)*0.05:0;
    ctx.save(); ctx.translate(x,y); ctx.rotate(DF.lean*hugP+stumble+sway); ctx.scale(hugSquash,1/hugSquash);
    if(has(friendKey)) sprite(friendKey,0,0,360,360); else ph_face(friendType,0,0,190);
    ctx.restore();
    drawDriveFriendAccent(friendType.id,t,hugP);
  }
  // 5. Poppu leans in to meet the friend too — both close the gap so they read as wrapped together,
  //    overlapping. Puffy gets the longest, laziest lingering hug (hold denom stretched 0.5->0.8).
  if(t>=0.9){
    const holdDenom=friendType.id==='cloud'?0.8:0.5;
    const hp=Math.min(1,(t-0.9)/holdDenom), squash=1+Math.sin(hp*Math.PI*3)*0.07*(1-hp);
    const closeIn=Math.min(1,hp*1.6);
    const px=DRIVE_POPPU_POS.x+30*closeIn;
    ctx.save(); ctx.translate(px,DRIVE_POPPU_POS.y); ctx.rotate(0.10*closeIn); ctx.scale(squash,1/squash);
    if(has('poppu_celebrate')) sprite('poppu_celebrate',0,0,470,470); else ph_poppu('celebrate',0,-40,270);
    ctx.restore();
  }
}
/* per-friend arrival-hug accent flourishes — layered on top of the shared drop/hug beat above so each
   friend's embrace reads distinctly: Orby's staged twinkles, Zaza's drifting heart-puffs, Wavey's
   second rebound ripple+splash, Puffy's soft drifting puffs. Purely decorative overlays, cheap fills. */
function drawDriveFriendAccent(id,t,hugP){
  if(id==='moon'){
    for(let i=0;i<3;i++){ const ph=t-1.1-i*0.32; if(ph>0&&ph<0.6){ const e=easeOutBack(Math.min(1,ph/0.3)), fade=Math.max(0,1-ph/0.6);
      ctx.save(); ctx.globalAlpha=fade; drawIcon('star',1010+(i-1)*60,380-i*20,26*Math.max(0,e),'#FFF3C4','#E6DBFF'); ctx.restore(); } }
  } else if(id==='heart'){
    for(let i=0;i<3;i++){ const ph=t-1.0-i*0.24; if(ph>0&&ph<0.7){ const rise=ph/0.7;
      ctx.save(); ctx.globalAlpha=Math.max(0,1-rise); drawIcon('heart',1010+(i-1)*34,420-rise*80,22,'#FF9DB6','#F06A8E'); ctx.restore(); } }
  } else if(id==='drop'){
    if(hugP>=1){ const rp=Math.min(1,Math.max(0,(t-1.3)/0.4));
      if(rp>0&&rp<1){ const rebHop=Math.sin(rp*Math.PI)*10;
        ctx.save(); ctx.globalAlpha=1-rp; ctx.translate(0,-rebHop); ctx.strokeStyle='#8ECFEC'; ctx.lineWidth=5;
        ctx.beginPath(); ctx.ellipse(DRIVE_FRIEND_LAND.x,912,20+rp*140,(20+rp*140)*0.3,0,0,7); ctx.stroke(); ctx.restore(); } }
  } else if(id==='cloud'){
    for(let i=0;i<2;i++){ const ph=t-1.0-i*0.3; if(ph>0){ const fade=Math.max(0,1-ph*1.2);
      ctx.save(); ctx.globalAlpha=fade*0.7; drawIcon('cloud',1010+(i?60:-60),400-ph*50,36,'#fff','#C4E9D4'); ctx.restore(); } }
  }
}
/* word-free hug payoff — a heart pop (every arrival) or a bigger heart+star pop on a full/near-full
   catch run (see updateDrive's fullRun flourish) — replaces the old "Yay!" floatText entirely so the
   payoff reads with zero reading dependency, per the 3-5 no-reading rule. */
function drawDriveArrivalPop(){
  const D=drive; if(!D||!D.arrivalPop) return;
  const t=D.arrivalPop.t, dur=1.3; if(t>dur) return;
  const p=Math.min(1,t/0.32), e=easeOutBack(p), fade=t<0.85?1:Math.max(0,1-(t-0.85)/(dur-0.85));
  const cx=1010, cy=445;   // clear of both characters' heads — reads as a floating payoff pop, not a hat sticker
  ctx.save(); ctx.globalAlpha=Math.max(0,fade);
  if(D.arrivalPop.full){
    glyphIcon('heart',cx-64,cy,68*Math.max(0,e),'#FF9DB6','#F06A8E');
    glyphIcon('star', cx+64,cy,68*Math.max(0,e),'#FFD54A','#E3A93E');
  } else {
    glyphIcon('heart',cx,cy,74*Math.max(0,e),'#FF9DB6','#F06A8E');
  }
  ctx.restore();
}
/* cream cross-fade so the cut into LEVELDONE's results card never reads as a stark white popup */
function drawDriveFade(){
  const D=drive; if(!D||!D.done) return;
  const fa=Math.max(0,Math.min(1,(D.arriveT-1.6)/DRIVE_FADE_DUR))*0.94;
  if(fa<=0) return;
  ctx.save(); ctx.globalAlpha=fa; ctx.fillStyle='#FFF8E8'; ctx.fillRect(0,0,W,H); ctx.restore();
}
function drawDriveProgressDots(){
  const progress=driveProgress(), filled=Math.floor(progress*9);
  for(let i=0;i<9;i++){ const y=140+i*70, on=i>=(9-filled);
    ctx.save(); ctx.fillStyle=on?'#FFD15C':'#fffdf6'; ctx.strokeStyle=on?'#E3A93E':'#E3C9A0'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(80,y,12,0,7); ctx.fill(); ctx.stroke(); ctx.restore(); }
}
/* growing "getting closer" face-circle in the corner — now shows whichever friend this run is
   actually visiting (was hardcoded to Peeky/gear). */
function drawDriveFriendGrowth(){
  const D=drive, type=(D&&D.friendType)||T.gear;
  const r=40+driveProgress()*90;
  ctx.save(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(1820,140,r+16,0,7); ctx.fill(); ctx.restore();
  drawFaceCircle(type,1820,140,r);
}
function drawDrive(){
  drawDriveBackground(); drawDriveAmbient(); drawRoad(); drawRoadShoulderFoliage(); drawDriveDepthVignette();
  drawRoadsideProps(); drawDriveCritter(); drawDriveItems(); drawTruck(); drawDriveFloaters(); drawBasketFx(); drawDriveArrival(); drawDriveArrivalPop();
  drawParticles(); drawDriveProgressDots(); drawDriveFriendGrowth(); drawDriveCollectionCorner(); drawFloatTexts();
  drawDriveFade();
  homeButton(); stampChip(STAMP_CHIP.x,STAMP_CHIP.y,'right');
}

/* ------------------------------------------------------------- MAIN LOOP */
currentScene=Math.min(SCENES.length-1,Math.max(0,SAVE.currentScene||0));
if(!sceneUnlocked(currentScene)) currentScene=0;
buildAmbient(SCENES[currentScene].amb);
SAVE.sessions=(SAVE.sessions||0)+1; persist();       // count this play session (parent dashboard)
Audio_.setVolume(SAVE.volume!=null?SAVE.volume:2);   // restore saved volume preference
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(!window.__freeze) update(dt);   // QA-only: hold a frame for controlled rendered evidence (no gameplay effect in normal play)
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#e2d0b2'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(scale*DPR,0,0,scale*DPR,offX*DPR,offY*DPR);
  if(state==='LOADING'){ if(loadDone && performance.now()-loadStart>=1500) state='START'; drawLoading(); }
  else if(state==='START') drawStart();
  else if(state==='LEVELMAP') drawLevelMap();
  else if(state==='SHOP') drawShop();
  else if(state==='PLAYING') drawPlaying();
  else if(state==='LEVELDONE') drawLevelDone();
  else if(state==='STICKER') drawSticker();
  else if(state==='TOWN') drawTown();
  else if(state==='WRAP') drawWrap();
  else if(state==='FRIEND') drawFriend();
  else if(state==='DRIVE') drawDrive();
  if(parentOpen) drawParentDashboard();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
['pointerdown','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,()=>Audio_.resume(),{once:false}));

/* __TESTHOOK__ */
window.__t = {
  get state(){ return state; }, set state(v){ state=v; },
  get save(){ return SAVE; },
  startLevel(n){ startLevel(n); },
  setScene(i){ setScene(i); },
  addStamps(n){ addStamps(n); persist(); },
  unlockAll(){ SAVE.maxLevel=LEVELS.length; persist(); },
  task(){ return activeTask; },
  forceTask(kind){ activeTask=null; taskNo=(kind==='shake'?7:kind==='stamp'?4:2); beginNextTask(); return activeTask; },
  resolveTask(){ if(!activeTask) return false; if(activeTask.kind==='seal') resolveSeal(); else if(activeTask.kind==='stamp') resolveStamp(); else resolveShake(); return true; },
  deliverOne(){ const p=packages.find(p=>p.state==='belt'||p.state==='returning'); if(!p) return false;
    const b=activeBoxes().find(b=>b.type.id===p.type.id); if(!b) return false; deliver(p,b); return true; },
  realDrag(){ const p=packages.find(p=>p.state==='belt'); if(!p) return false;
    const b=activeBoxes().find(b=>b.type.id===p.type.id); if(!b) return false;
    const cl=(sx,sy)=>({x:sx*scale+offX,y:sy*scale+offY});
    const a=cl(p.x,p.y); onDown(a.x,a.y);
    const c=cl(b.x,b.y); onMove(c.x,c.y); onUp(c.x,c.y); return true; },
  levelInfo(){ return { level:currentLevel, delivered:deliveredThisLevel, target:curLevel().pkgs, spawned:spawnedThisLevel, done:levelDone }; },

  /* ---- Poppu's Post Town (Phase 0) ---- */
  openTown(){ enterTown(); },
  tapBuilding(id){
    const b=TOWN_BUILDINGS[id]; if(!b) return false;
    if(state!=='TOWN') enterTown();
    const cl=(sx,sy)=>({x:sx*scale+offX,y:sy*scale+offY});
    const hr=buildingHitRect(b); const c=cl(hr.x+hr.w/2, hr.y+hr.h/2);
    onDown(c.x,c.y); onUp(c.x,c.y); return true;
  },
  unlockPeeky(){ SAVE.unlocks.peekyHouse=true; persist(); },
  setGearDeliveries(n){ SAVE.charDeliveries.gear=Math.max(0,n|0); persist(); },
  get townBuildings(){ return TOWN_BUILDINGS; },
  get unlocks(){ return SAVE.unlocks; },
  get newBadge(){ return SAVE.newBadge; },
  /* ---- generalized unlock ladder helpers (Phase 1) ---- */
  get friendUnlockTable(){ return FRIEND_UNLOCK; },
  /* force-unlocks building `id`'s friend house by setting its charDeliveries threshold, then runs the
     same check the real game uses (checkTownUnlocks) — so newBadge/unlocks flip exactly as in play. */
  unlockFriendHouse(id){
    const info=FRIEND_UNLOCK[id]; if(!info) return false;
    SAVE.charDeliveries[info.type]=info.need; checkTownUnlocks(); return true;
  },
  setCharDeliveries(typeId,n){ SAVE.charDeliveries[typeId]=Math.max(0,n|0); persist(); checkTownUnlocks(); },

  /* ---- Wrap Shop (Phase 1) ---- */
  enterWrap(){ enterWrap(); },
  get wrapBox(){ return wrapBox; },
  get wrapQueue(){ return SAVE.wrapQueue||0; },
  wrapCycleColor(){ if(state!=='WRAP') enterWrap(); cycleWrapColor(); },
  wrapDoRibbon(){ if(state!=='WRAP') enterWrap(); applyWrapRibbon(); },
  wrapDoSticker(icon){ if(state!=='WRAP') enterWrap(); applyWrapSticker(icon||'star'); },
  wrapShip(){ if(state!=='WRAP') return false; if(!wrapBox||!wrapBox.acted) return false; startWrapShip(); return true; },

  /* ---- Friend House (Phase 1) ---- */
  enterFriend(id){ enterFriend(id||'peeky'); },
  get friendScene(){ return friendScene; },
  get friendHearts(){ return friendScene?friendHearts(friendScene.type.id):0; },
  friendFeed(icon){ feedFriend(icon||'star'); },
  friendPet(){ petFriend(); },
  friendDress(hatId){ dressFriend(hatId||'hat_chef'); },

  /* ---- Delivery Drive (Phase 0/1) ---- */
  startDrive(){ startDrive(); },
  /* force the next Drive to visit friend typeId ('gear'|'heart'|'moon'|'drop'|'cloud') — unlocks
     whatever's needed for that friend to be in rotation first, then starts the drive. */
  startDriveAs(typeId){
    const chain=['gear','heart','moon','drop','cloud']; const target=chain.indexOf(typeId);
    if(target<0) return null;
    for(let i=0;i<=target;i++){ this.unlockFriendHouse(chain[i]==='gear'?'peeky':chain[i]); }
    const ids=unlockedDriveFriendIds(); const idx=ids.indexOf(typeId);
    SAVE.driveVisits=idx>=0?idx:0; startDrive(); return drive?drive.friendType.id:null;
  },
  get driveFriend(){ return drive?drive.friendType.id:null; },
  get driveBiome(){ return drive?drive.biome.name:null; },
  driveStep(px){ if(!drive) return false; if(px!=null) drive.dragActiveX=px; updateDrive(1/60); return true; },
  steer(x){ if(drive) drive.dragActiveX=x; },
  collectAll(){ if(!drive) return false; for(const it of drive.items) if(!it.collected) collectDriveItem(it); return true; },
  driveArrive(){ if(!drive) return false; drive.scrollY=DRIVE_LENGTH; if(!drive.arriving) startArrival(); return true; },
  get driveInfo(){ if(!drive) return null;
    const caught=drive.items.filter(i=>i.collected).length, total=drive.items.length;
    return { progress:driveProgress(), truckX:drive.truck.x, scrollY:drive.scrollY, arriving:drive.arriving,
      itemsLeft:total-caught, itemsTotal:total, caught, total,
      fullRun:drive.fullRun!=null?drive.fullRun:(total>0 && caught>=Math.max(1,Math.ceil(total*0.9))) }; },
  /* ---- per-biome DRIVE verb (9-10 lever) verification hooks ---- */
  get driveVerb(){ return drive&&drive.biome&&drive.biome.interact?(drive.biome.interact.mode||'catch'):null; },
  get driveFloaters(){ if(!drive) return null;
    return { mode:this.driveVerb, key:drive.biome&&drive.biome.interact?drive.biome.interact.key:null,
      caught:drive.floatersCaught||0, jarCount:drive.jarCount||0, jarFull:drive.jarFull||0,
      hopNext:drive.hop?drive.hop.next:null, hopPads:drive.hop?drive.hop.pads.length:null,
      live:drive.floaters.filter(f=>!f.caught&&!f.flit&&!f.popped).length,
      gates:drive.floaters.filter(f=>f.gate&&!f.resolved).length }; },
  /* fire the current biome's verb once, exactly as a finger would — returns true if it rewarded */
  driveVerbOnce(){ if(!drive||drive.arriving) return false; const mode=this.driveVerb;   // mirror the real tap guard (hands off during the hug)
    if(mode==='hop'){ const H=drive.hop; if(!H||H.done) return false; const p=H.pads[H.next]; if(!p) return false;
      return tryHopTap(drive, roadCenterX(p.d)+p.off, 820-(p.d-drive.scrollY)+Math.sin(p.phase)*6); }
    if(mode==='gap'){ const g=drive.floaters.find(f=>f.gate&&!f.resolved); if(!g) return false;
      drive.truck.x=g.gapX; g.y=735; g.resolved=true; resolveGate(drive,g); return true; }
    if(mode==='bloom'){ const f=drive.floaters.find(f=>f.bloom&&!f.popped); if(!f) return false;
      return tryCatchFloaterAt(roadCenterX(f.d)+f.side, 820-(f.d-drive.scrollY)); }
    const f=drive.floaters.find(f=>!f.caught&&!f.flit); if(!f) return false;
    return tryCatchFloaterAt(f.x, f.fall?f.y:f.y+Math.sin(f.phase)*f.bobAmp); },
  tapFloater(){ return this.driveVerbOnce(); },   // back-comat alias
  /* one of: 'none' | 'decel' | 'peekyRun' | 'hug' | 'fadeOut' — for QA to assert the in-scene arrival beat actually plays */
  get arrivalPhase(){
    if(!drive || !drive.arriving) return 'none';
    const t=drive.arriveT;
    if(t<0.4) return 'decel';
    if(t<0.9) return 'peekyRun';
    if(!drive.done) return 'hug';
    return 'fadeOut';
  },
  get gearDeliveries(){ return (SAVE.charDeliveries&&SAVE.charDeliveries.gear)||0; },
  /* scene-bleed check: current floatText labels + count, so QA can assert nothing stale carried over */
  get floatTexts(){ return floatTexts.map(f=>f.text); },
  get lockedPulse(){ return lockedPulse; },

  /* ---- Tutorial / LEVELDONE / stamp-task QA hooks ---- */
  get tutorial(){ return tutorial; },
  forceTutorial(){ SAVE.tutorialDone=false; startLevel(1); return tutorial; },
  get doneScreen(){ return doneScreen; },
  get stampTaskWant(){ return (activeTask&&activeTask.kind==='stamp')?activeTask.want:null; },
  get cosmeticSpriteKeys(){ return COSMETICS.map(c=>'cos-'+c.id.replace(/_/g,'-')); },
};
