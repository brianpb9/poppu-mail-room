<script>
"use strict";
/* ============================================================================
   POPPU'S MAIL ROOM  —  "Sort. Deliver. Smile!"   v3.0 "Full Depth"
   Toddler (2-5) mail sorting with real depth:
     · 4 interaction mechanics (drag · swipe-seal · tap-stamp · shake-sort)
     · 10-level progression with star ratings
     · Star Stamps economy  ·  Upgrade shop  ·  Cosmetic shop
     · Full Web-Audio synthesis  ·  3 themed scenes
   Zero deps, single file. Canvas 2D, 1920x1080 logical, letterboxed.
   Real illustrated assets via ctx.drawImage; procedural fallbacks keep the
   game fully playable before/after asset integration. Cosmetics + juice are
   procedural by design (decorative overlays on top of the real art).
   ========================================================================= */

/* ------------------------------------------------------------------ CONFIG */
const W = 1920, H = 1080;
const TYPES = [
  { id:'star',  name:'Rory',  light:'#FF9A8F', mid:'#EE3B2E', deep:'#B71C1C', icon:'star'  },
  { id:'gear',  name:'Peeky', light:'#FFE79A', mid:'#FFD15C', deep:'#E9A32E', icon:'gear'  },
  { id:'moon',  name:'Orby',  light:'#D8C8F4', mid:'#B79BEA', deep:'#8E6FD6', icon:'moon'  },
  { id:'heart', name:'Zaza',  light:'#FFE3EE', mid:'#FFC1DA', deep:'#FF93BE', icon:'heart' },
  { id:'drop',  name:'Wavey', light:'#9FD8F5', mid:'#3AA4E6', deep:'#1477BE', icon:'drop'  },
  { id:'cloud', name:'Puffy', light:'#A0E3B8', mid:'#45BE76', deep:'#2A9455', icon:'cloud' },
];
const T = {}; TYPES.forEach((t,i)=>{ t.index=i; T[t.id]=t; });

const GOLDEN_CHANCE = 0.10;
const STICKER_EVERY = 5;

/* ------------------------------------------------------ 10-LEVEL PROGRESSION */
/* Each level: package target, belt speed, active mailbox count, match hint,
   and which mechanics are live. Mechanics escalate; nothing ever fails.       */
const LEVELS = [
  { n:1,  pkgs:5,  speed:34, boxes:3, hint:'color', label:'Colors',
    mech:{seal:0,stamp:0,shake:0,multi:0,shuffle:0,distract:0,golden:0}, tag:'Tutorial' },
  { n:2,  pkgs:8,  speed:37, boxes:3, hint:'color', label:'Colors',
    mech:{seal:1,stamp:0,shake:0,multi:0,shuffle:0,distract:0,golden:0}, tag:'Seal!' },
  { n:3,  pkgs:10, speed:44, boxes:4, hint:'shape', label:'Shapes',
    mech:{seal:0,stamp:1,shake:0,multi:0,shuffle:0,distract:0,golden:0}, tag:'Stamp!' },
  { n:4,  pkgs:10, speed:47, boxes:4, hint:'shape', label:'Shapes',
    mech:{seal:1,stamp:1,shake:0,multi:0,shuffle:0,distract:0,golden:0}, tag:'Seal + Stamp' },
  { n:5,  pkgs:12, speed:49, boxes:4, hint:'shape', label:'Shapes',
    mech:{seal:1,stamp:1,shake:0,multi:1,shuffle:0,distract:0,golden:0}, tag:'Two at once' },
  { n:6,  pkgs:12, speed:58, boxes:6, hint:'char',  label:'Friends',
    mech:{seal:1,stamp:1,shake:1,multi:1,shuffle:0,distract:0,golden:0}, tag:'Shake!' },
  { n:7,  pkgs:15, speed:61, boxes:6, hint:'char',  label:'Friends',
    mech:{seal:1,stamp:1,shake:1,multi:1,shuffle:0,distract:0,golden:0}, tag:'Speedy' },
  { n:8,  pkgs:15, speed:63, boxes:6, hint:'char',  label:'Friends',
    mech:{seal:1,stamp:1,shake:1,multi:1,shuffle:1,distract:0,golden:0}, tag:'Shuffle' },
  { n:9,  pkgs:18, speed:66, boxes:6, hint:'char',  label:'Friends',
    mech:{seal:1,stamp:1,shake:1,multi:1,shuffle:1,distract:1,golden:0}, tag:'Party' },
  { n:10, pkgs:20, speed:76, boxes:6, hint:'char',  label:'Boss',
    mech:{seal:1,stamp:1,shake:1,multi:1,shuffle:1,distract:1,golden:1}, tag:'Golden Boss' },
];
function curLevel(){ return LEVELS[Math.max(0,Math.min(LEVELS.length-1,currentLevel-1))]; }
/* wordless level-map badge (A3): the level's newest/highest-tier active mechanic, cascading so every
   node still reads a clear "what's new here" icon without a single numeral or English word — position
   along the path already communicates ORDER, this only communicates WHAT. */
function levelIcon(L){
  const m=L.mech;
  if(m.golden) return 'crown';
  if(m.shake) return 'bolt';
  if(m.stamp) return 'stamp';
  if(m.seal) return 'seal';
  return 'star';
}

/* three themed scenes — unlock as levels are cleared */
const SCENES = [
  { id:0, key:'mailroom', name:'Mail Room', bg:'bg',        unlockLevel:1,
    tint:null,                     music:{root:0},  amb:'dust' },
  { id:1, key:'forest',   name:'Forest',    bg:'bg_forest', unlockLevel:3,
    tint:'rgba(120,180,120,0.05)', music:{root:2},  amb:'leaf' },
  { id:2, key:'space',    name:'Space',     bg:'bg_space',  unlockLevel:6,
    tint:'rgba(150,130,220,0.07)', music:{root:-3}, amb:'star' },
];

/* ------------------------------------------------------------- UPGRADE SHOP */
const UPGRADES = [
  // sprScale normalizes each prop's VISUAL footprint on the tag (bold gold key/coins fill their canvas and
  // read large; the muted sack / horizontal spyglass read small) so the row reads as one uniform size.
  { id:'speedBelt',   name:'Speed Belt',     cost:10, icon:'bolt',  spr:'up_speed',    sprScale:0.84, desc:'Belt runs faster' },
  { id:'bigBoxes',    name:'Big Mailboxes',  cost:15, icon:'box',   spr:'up_capacity', sprScale:1.02, desc:'Bigger, comfy boxes' },
  { id:'autoSorter',  name:'Auto-Sorter',    cost:25, icon:'replay', spr:'up_sorter',  sprScale:1.02, desc:'Wrong drops return' },
  { id:'scanner',     name:'Golden Scanner', cost:40, icon:'eye',   spr:'up_scanner',  sprScale:1.10, desc:'Glows the right box' },
  { id:'doubleStamps',name:'Double Stamps',  cost:50, icon:'x2',    spr:'up_x2',       sprScale:1.06, desc:'Twice the stamps' },
];

/* ---------------------------------------------------------- COSMETIC SHOP */
const COSMETICS = [
  { id:'hat_chef',   cat:'hat',      name:'Chef',    cost:150 },
  { id:'hat_cowboy', cat:'hat',      name:'Cowboy',  cost:180 },
  { id:'hat_pirate', cat:'hat',      name:'Pirate',  cost:220 },
  { id:'hat_crown',  cat:'hat',      name:'Crown',   cost:500 },
  { id:'mb_pastel',  cat:'mailbox',  name:'Pastel',  cost:50 },
  { id:'mb_rainbow', cat:'mailbox',  name:'Rainbow', cost:120 },
  { id:'mb_galaxy',  cat:'mailbox',  name:'Galaxy',  cost:160 },
  { id:'mb_gold',    cat:'mailbox',  name:'Gold',    cost:200 },
  { id:'cv_neon',    cat:'conveyor', name:'Neon',    cost:75 },
  { id:'cv_candy',   cat:'conveyor', name:'Candy',   cost:150 },
  { id:'cv_cloud',   cat:'conveyor', name:'Cloud',   cost:300 },
  { id:'dec_plant',  cat:'decor',    name:'Plant',   cost:50 },
  { id:'dec_poster', cat:'decor',    name:'Poster',  cost:60 },
  { id:'dec_rug',    cat:'decor',    name:'Rug',     cost:80 },
];
const COS_CATS = ['hat','mailbox','conveyor','decor'];
const COS_CAT_NAME = { hat:'Poppu Hats', mailbox:'Mailbox Skins', conveyor:'Conveyor', decor:'Decorations' };

/* --------------------------------------------------------------- SAVE DATA */
const SAVE_KEY = 'poppuMailRoom.v3';
const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); };
function defaultSave(){
  return {
    stamps: 0,
    totalDelivered: 0,
    stickers: [],
    levelStars: new Array(LEVELS.length).fill(0),
    maxLevel: 1,
    purchased: false,   // one-time "Unlock Full Post Town" IAP entitlement — set ONLY by the
                        // native wrapper's verified StoreKit/Play Billing bridge (see MONETIZATION.md)
    currentScene: 0,
    day: todayStr(), deliveredToday: 0, dailyGoalDone:false, streak: 0, lastPlayDay: null, goldenHat:false,
    upgrades: { speedBelt:false, bigBoxes:false, autoSorter:false, scanner:false, doubleStamps:false },
    owned: {},
    equipped: { hat:null, mailbox:null, conveyor:null, decor:null },
    /* ------ Poppu's Post Town (Phase 1) ------
       postOffice is always open. wrapShop unlocks once Level 1 is cleared and is now
       fully functional (Wrap Shop). Friend houses unlock as charDeliveries for their
       type crosses a threshold (see FRIEND_UNLOCK) — each shows a picture-meter while
       locked, and opens into the Friend scene once unlocked. */
    unlocks: { postOffice:true, wrapShop:false, peekyHouse:false, zazaHouse:false, orbyHouse:false, waveyHouse:false, puffyHouse:false },
    newBadge: {},   // { buildingId:true } — cleared the first time that building is tapped
    volume: 2, tutorialDone: false, sessions: 0, charDeliveries: {},
    /* ------ Wrap Shop / Friend houses (Phase 1) ------ */
    wrapQueue: 0,       // finished wrapped packages waiting — consumed (celebrated) at the next level start
    wrappedCount: 0,    // lifetime total wrapped, for parent-dashboard/future stats
    driveVisits: 0,     // rotates which unlocked friend the Delivery Drive visits next
    friendHats: {},      // { buildingId: cosmeticHatId } — purely-for-fun dress-up, session-persistent
    /* ------ Between-run growth (P2 9->9.5 lever) ------
       driveCollection: LIFETIME per-friend nature-gift tally (acorns/butterflies/fireflies/lilypads/
       cloud-puffs caught across ALL Delivery Drive runs, keyed by friend TYPE id) — NEVER resets per
       trip, unlike drive.jarCount etc. driveCollectionTier: the highest milestone tier already paid
       out per friend (guards the one-time bonus so re-crossing the same tier boundary never re-fires).
       friendGiftGiven: one-time "best friends" (5-heart) celebration+reward, fired exactly once per
       friend and kept forever. */
    driveCollection: {}, driveCollectionTier: {}, friendGiftGiven: {},
  };
}
let SAVE = loadSave();
function loadSave(){
  try{
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!s || typeof s!=='object' || Array.isArray(s)) return defaultSave();
    const base = defaultSave();
    for(const k in base) if(!(k in s)) s[k]=base[k];
    if(!s.upgrades||typeof s.upgrades!=='object'||Array.isArray(s.upgrades)) s.upgrades={...base.upgrades};
    if(!s.equipped||typeof s.equipped!=='object'||Array.isArray(s.equipped)) s.equipped={...base.equipped};
    for(const k in base.upgrades) if(!(k in s.upgrades)) s.upgrades[k]=base.upgrades[k];
    for(const k in base.equipped) if(!(k in s.equipped)) s.equipped[k]=base.equipped[k];
    if(!s.unlocks || typeof s.unlocks!=='object' || Array.isArray(s.unlocks)) s.unlocks={};
    for(const k in base.unlocks) if(!(k in s.unlocks)) s.unlocks[k]=base.unlocks[k];
    if(!s.newBadge || typeof s.newBadge!=='object' || Array.isArray(s.newBadge)) s.newBadge={};
    if(!s.friendHats || typeof s.friendHats!=='object' || Array.isArray(s.friendHats)) s.friendHats={};
    if(!s.driveCollection || typeof s.driveCollection!=='object' || Array.isArray(s.driveCollection)) s.driveCollection={};
    if(!s.driveCollectionTier || typeof s.driveCollectionTier!=='object' || Array.isArray(s.driveCollectionTier)) s.driveCollectionTier={};
    if(!s.friendGiftGiven || typeof s.friendGiftGiven!=='object' || Array.isArray(s.friendGiftGiven)) s.friendGiftGiven={};
    if(typeof s.stamps!=='number' || !isFinite(s.stamps) || s.stamps<0) s.stamps=0;
    if(typeof s.wrapQueue!=='number' || s.wrapQueue<0) s.wrapQueue=0;
    if(typeof s.wrappedCount!=='number' || s.wrappedCount<0) s.wrappedCount=0;
    if(typeof s.driveVisits!=='number' || s.driveVisits<0) s.driveVisits=0;
    if(!Array.isArray(s.levelStars) || s.levelStars.length!==LEVELS.length)
      s.levelStars = new Array(LEVELS.length).fill(0);
    if(s.day !== todayStr()){
      const yd=new Date(); yd.setDate(yd.getDate()-1);
      const ydStr=yd.getFullYear()+'-'+(yd.getMonth()+1)+'-'+yd.getDate();
      if(s.lastPlayDay !== ydStr && s.lastPlayDay !== todayStr()) s.streak=0;
      s.day=todayStr(); s.deliveredToday=0; s.dailyGoalDone=false;
    }
    return s;
  }catch(e){ return defaultSave(); }
}
function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(SAVE)); }catch(e){} }

function levelUnlocked(n){ return n <= (SAVE.maxLevel||1); }
function sceneUnlocked(i){ return (SAVE.maxLevel||1) >= SCENES[i].unlockLevel; }

/* ============================ MONETIZATION ============================
   Model: free-with-one-time-unlock (Toca Boca / Sago Mini). Levels 1-FREE_LEVELS
   are free forever; the rest are in a single permanent "Unlock Full Post Town"
   purchase. Star Stamps are NEVER buyable; no ads; no timers. Full spec + the
   parent-gate + Restore flow + wrapper contract live in MONETIZATION.md.

   IAP_ENABLED stays false in the web/PWA build (a web page cannot take real
   App Store / Play money), so the game is 100% free here and nothing is gated.
   The native wrapper (Capacitor/TWA) sets window.PoppuBilling and flips this on;
   Billing.* below is the exact bridge contract it implements. */
const IAP_ENABLED = false;      // ← the native wrapper build sets this true
const FREE_LEVELS = 3;          // Levels 1-3 free; 4-10 in the one-time unlock
function isPremium(){ return !!SAVE.purchased; }
function contentLocked(n){ return IAP_ENABLED && !isPremium() && n > FREE_LEVELS; }
const Billing = {
  available(){ return IAP_ENABLED && !!window.PoppuBilling; },
  // Called only AFTER the parent math-gate passes. The wrapper shows the OS
  // purchase sheet (its own biometric/password confirm), verifies the receipt,
  // then reports back; we flip the local entitlement only on a verified success.
  purchase(done){
    if(this.available()){ window.PoppuBilling.buy('poppu_full_unlock', ok=>{ if(ok){ SAVE.purchased=true; persist(); } done&&done(!!ok); }); }
    else { done&&done(false); }   // web build: no real charge possible
  },
  restore(done){
    if(this.available()){ window.PoppuBilling.restore(ok=>{ if(ok){ SAVE.purchased=true; persist(); } done&&done(!!ok); }); }
    else { done&&done(false); }
  },
};
function owns(id){ return !!SAVE.owned[id]; }
function equipped(cat){ return SAVE.equipped[cat]; }
function hasUp(id){ return !!SAVE.upgrades[id]; }
const DAILY_GOALS=[5,10,15,20];
function dailyGoal(){ return DAILY_GOALS[Math.min(SAVE.streak||0, DAILY_GOALS.length-1)]; }

/* --------------------------------------------------------- TOWN UNLOCKS */
/* Friend houses: building id -> { type: TYPES id, need: charDeliveries threshold, unlockKey: SAVE.unlocks flag }.
   'peeky' is the original (Phase 0) building id, tied to the 'gear' type — kept as-is for save
   compatibility. New friend houses are keyed by their TYPE id directly. */
const FRIEND_UNLOCK = {
  peeky: { type:'gear',  need:5,  unlockKey:'peekyHouse' },
  heart: { type:'heart', need:5,  unlockKey:'zazaHouse'  },
  moon:  { type:'moon',  need:8,  unlockKey:'orbyHouse'  },
  drop:  { type:'drop',  need:8,  unlockKey:'waveyHouse' },
  cloud: { type:'cloud', need:10, unlockKey:'puffyHouse' },
};
function buildingUnlocked(id){
  if(id==='post') return true;                          // Post Office is always open
  if(id==='wrap') return !!SAVE.unlocks.wrapShop;        // unlocked after Level 1 clears
  const info=FRIEND_UNLOCK[id]; if(info) return !!SAVE.unlocks[info.unlockKey];
  return false;
}
/* Phase 1: every building does something real once unlocked — Post Office starts a Sort
   level, Wrap Shop opens the Wrap flow, and each friend house opens the Friend scene. */
function buildingFunctional(id){ return true; }
/* 3-star preview meter toward a locked friend house's unlock — icon-first "getting closer" cue. */
function houseMeterStars(id){
  const info=FRIEND_UNLOCK[id]; if(!info) return 0;
  return Math.min(3, Math.floor((SAVE.charDeliveries[info.type]||0)/Math.max(1,Math.round(info.need/3))));
}
function peekyMeterStars(){ return houseMeterStars('peeky'); }   // kept for backward-compat
/* called after any charDeliveries change (Sort delivery, Drive hug, Friend feed/pet) — flips a
   friend house's unlock flag + arms its "new!" badge the moment its threshold is crossed. */
function checkTownUnlocks(){
  let changed=false;
  for(const id in FRIEND_UNLOCK){
    const info=FRIEND_UNLOCK[id];
    if(!SAVE.unlocks[info.unlockKey] && (SAVE.charDeliveries[info.type]||0)>=info.need){
      SAVE.unlocks[info.unlockKey]=true; SAVE.newBadge[id]=true; changed=true;
    }
  }
  if(changed) persist();
}
/* Delivery Drive friend rotation: 'gear' (Peeky) is always available; each further friend joins
   the rotation only once their house has unlocked — so the Drive itself is what builds up the
   charDeliveries that unlock the NEXT friend's house (a natural progression ladder). */
function unlockedDriveFriendIds(){
  // Each friend joins the Drive rotation when THEIR OWN house unlocks in Town —
  // gate by the matching house key (heart=Zaza, moon=Orby, drop=Wavey, cloud=Puffy),
  // not the previous friend's, so an out-of-order unlock never permanently skips a friend.
  const ids=['gear'];
  if(SAVE.unlocks.zazaHouse)  ids.push('heart');
  if(SAVE.unlocks.orbyHouse)  ids.push('moon');
  if(SAVE.unlocks.waveyHouse) ids.push('drop');
  if(SAVE.unlocks.puffyHouse) ids.push('cloud');
  return ids;
}
/* gear's house art predates the type-id naming convention (house_peeky, not house_gear) — every
   other friend's house key follows 'house_'+typeId directly. */
function houseKeyForType(typeId){ return typeId==='gear' ? 'house_peeky' : 'house_'+typeId; }

/* --------------------------------------------------------------- CANVAS/DPR */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
let scale=1, offX=0, offY=0, DPR=1;
function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  DPR=Math.min(window.devicePixelRatio||1, 2.5);
  canvas.width=Math.floor(vw*DPR); canvas.height=Math.floor(vh*DPR);
  canvas.style.width=vw+'px'; canvas.style.height=vh+'px';
  scale=Math.min(vw/W, vh/H);
  offX=(vw-W*scale)/2; offY=(vh-H*scale)/2;
  // resizing canvas.width/height resets 2D context state (incl. image smoothing) — reapply every time
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
}
window.addEventListener('resize', resize); resize();
function toStage(cx,cy){ return { x:(cx-offX)/scale, y:(cy-offY)/scale }; }

/* -------------------------------------------------------------------- AUDIO */
const Audio_ = (()=>{
  let ac=null, master=null, hum=null, humGain=null, musicOn=true, started=false;
  const VOL_LEVELS=[0.0, 0.4, 0.9];   // mute · quiet · normal
  let masterTarget=0.9;
  function ensure(){
    if(ac) return;
    try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=ac.createGain(); master.gain.value=masterTarget; master.connect(ac.destination);
  }
  function resume(){ ensure(); if(ac&&ac.state==='suspended') ac.resume(); if(!started){ started=true; startHum(); startMusic(); } }
  function now(){ return ac?ac.currentTime:0; }
  function tone(freq,t0,dur,type='sine',vol=0.3,glideTo=null){
    if(!ac) return;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.03);
  }
  function noise(t0,dur,vol=0.15,freq=1200,q=1){
    if(!ac) return;
    const n=ac.createBufferSource(), len=Math.floor(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    n.buffer=buf; const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q;
    const g=ac.createGain(); g.gain.value=vol;
    n.connect(f); f.connect(g); g.connect(master); n.start(t0);
  }
  /* filtered noise whose bandpass center SWEEPS f0->f1 over the sound — used for silky/swishy
     gestures (e.g. a ribbon dragged across a box) where a static noise() would sound like static hiss. */
  function noiseSweep(t0,dur,vol,f0,f1,q){
    if(!ac) return;
    const len=Math.floor(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const n=ac.createBufferSource(); n.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=q||1;
    f.frequency.setValueAtTime(f0,t0); f.frequency.exponentialRampToValueAtTime(f1,t0+dur);

const IMG={}; let loadedCount=0, totalToLoad=Object.keys(ASSET_SRC).length, loadDone=false, loadStart=0;
function beginLoad(){

    const im=new Image(); IMG[k]={img:im,ok:false,tried:false};
    im.onload=()=>{ IMG[k].ok=(im.naturalWidth>0); tick(); };
    im.onerror=()=>{
      if(ASSET_FALLBACK[k] && !IMG[k].tried){ IMG[k].tried=true; im.src=bust(ASSET_FALLBACK[k]); return; }
      IMG[k].ok=false; tick();

function tick(){ loadedCount++; if(loadedCount>=totalToLoad) loadDone=true; }

function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shadow(blur,c,ox,oy){ ctx.shadowBlur=blur; ctx.shadowColor=c; ctx.shadowOffsetX=ox||0; ctx.shadowOffsetY=oy||0; }
function noShadow(){ ctx.shadowBlur=0; ctx.shadowColor='transparent'; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; }
function dist(a,b,c,d){ return Math.hypot(a-c,b-d); }
function inRect(px,py,r){ return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h; }
function easeOutBack(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
/* soft flattened contact shadow — grounds any sprite at a FIXED ground line (draw BEFORE the sprite,
   ignore idle bob so the object hovers a hair above its own shadow, never swims with it). Radial
   gradient scaled onto an ellipse; cheap enough for every-frame use (no shadowBlur). */
function groundShadow(cx,cy,rw,rh,alpha,soft){
  soft=(soft==null)?0.4:soft;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,rh/rw);
  const g=ctx.createRadialGradient(0,0,0,0,0,rw);
  g.addColorStop(0,'rgba(58,42,26,'+alpha+')'); g.addColorStop(1-soft,'rgba(58,42,26,'+alpha+')'); g.addColorStop(1,'rgba(58,42,26,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,rw,0,7); ctx.fill(); ctx.restore();
}
/* TWO-STOP baked contact shadow — replaces the old single flat oval. A tight, DARKER core hugs the
   sprite's own footprint (real contact occlusion, where wall/foot actually meets ground) and a wider,
   much softer warm-brown falloff spreads outward to ground the whole silhouette. This is what actually
   removes the "floating cutout" read (grass tufts used to paper over that seam; this fixes the cause).
   Two cheap radial-gradient fills, no shadowBlur — safe every frame. */
function bakedContactShadow(cx,cy,rw,rh,coreAlpha){
  groundShadow(cx,cy,rw*1.65,rh*1.65,coreAlpha*0.42,0.62);   // wide soft ambient falloff
  groundShadow(cx,cy,rw,rh,coreAlpha,0.20);                  // tight dark core at the contact line
}
/* deterministic pseudo-random in [0,1) from a seed — used for sun dapples / roadside foliage so the
   town and drive scenery are stable frame-to-frame (no re-rolled jitter) yet still look organic */
function seededRand(seed){ const x=Math.sin(seed*12.9898)*43758.5453; return x-Math.floor(x); }

/* Raster glyph helper (production art pack) — draws the real ic_<name> PNG centered at (cx,cy) at
   size s (square). Returns true if it drew something; call sites fall back to the procedural
   drawIcon() when it returns false (asset still loading / missing), so a frame never breaks. */
function uiIcon(name,cx,cy,s){ const k='ic_'+name; if(has(k)){ ctx.drawImage(IMG[k].img,cx-s/2,cy-s/2,s,s); return true; } return false; }
/* drop-in raster-first replacement for drawIcon() at UI/reward call sites — SAME signature, so every
   converted call site is a plain rename. Maps the few procedural kind names that don't match their
   ic_ filename 1:1 (bolt->speed, box->capacity, eye->reveal), tries the raster, and falls back to the
   original procedural drawIcon() untouched when the PNG isn't loaded yet — never breaks a frame. */
const GLYPH_ICON_MAP={ bolt:'speed', box:'capacity', eye:'reveal' };
function glyphIcon(kind,cx,cy,s,fill,stroke){
  if(uiIcon(GLYPH_ICON_MAP[kind]||kind,cx,cy,s)) return true;
  drawIcon(kind,cx,cy,s,fill,stroke); return false;
}
function drawText(txt,x,y,size,fill,stroke,align='center',weight='800',sw){
  ctx.save(); ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.font=weight+' '+size+'px "Baloo 2","Arial Rounded MT Bold",system-ui,sans-serif';
  if(stroke){ ctx.lineJoin='round'; ctx.lineWidth=sw||size*0.16; ctx.strokeStyle=stroke; ctx.strokeText(txt,x,y); }
  ctx.fillStyle=fill; ctx.fillText(txt,x,y); ctx.restore();
}

function ph_background(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#f3dfc0'); g.addColorStop(1,'#e6c79b');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(150,110,70,0.25)'; ctx.lineWidth=3;
  for(let y=120;y<H;y+=150){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.save(); shadow(40,'rgba(255,240,200,0.9)');
  ctx.fillStyle='#bfe4f2'; ctx.beginPath(); ctx.arc(340,250,150,0,7); ctx.fill(); noShadow();
  ctx.strokeStyle='#8a6a44'; ctx.lineWidth=16; ctx.stroke(); ctx.restore();
  ctx.fillStyle='#d8a86e'; ctx.fillRect(0,H-160,W,160);
}
function ph_conveyor(x,y,w,h){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#6b4a30'; rr(-w/2,-h/2,w,h,h*0.35); ctx.fill();
  ctx.strokeStyle='#4a3320'; ctx.lineWidth=6; ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=8;
  const off=(time*120)%60;
  for(let i=-w/2;i<w/2;i+=60){ ctx.beginPath(); ctx.moveTo(i+off,-h/2+8); ctx.lineTo(i+off,h/2-8); ctx.stroke(); }
  for(const sx of[-1,1]){ ctx.fillStyle='#8a6a44'; ctx.beginPath(); ctx.arc(sx*(w/2),0,h*0.55,0,7); ctx.fill();
    ctx.strokeStyle='#4a3320'; ctx.lineWidth=6; ctx.stroke(); }
  ctx.restore();
}
function ph_package(type,x,y,s,golden){

  ctx.fillStyle=mid; ctx.strokeStyle='#5a3d24'; ctx.lineWidth=s*0.06;
  rr(-s*0.5,-s*0.5,s,s,s*0.14); ctx.fill(); ctx.stroke();
  ctx.fillStyle=light; rr(-s*0.5,-s*0.5,s,s*0.32,s*0.14); ctx.fill();
  ctx.fillStyle=deep; ctx.fillRect(-s*0.09,-s*0.5,s*0.18,s);

/* draws an image FIT (preserve aspect, no crop) inside a maxW x maxH box, centered at (cx,cy) —
   used for building/scene thumbnails whose source art isn't square, so pill/nav icons never stretch. */
function fitImage(key,cx,cy,maxW,maxH){
  if(!has(key)) return false;
  const im=IMG[key].img, iw=im.naturalWidth||1, ih=im.naturalHeight||1;
  const s=Math.min(maxW/iw,maxH/ih), w=iw*s, h=ih*s;
  ctx.drawImage(im,cx-w/2,cy-h/2,w,h); return true;
}
/* draws an image CROPPED-TO-FILL a wxh box (CSS "background-size:cover" equivalent) — used for very
   wide/flat source strips (e.g. the conveyor belt art) where fitImage() would letterbox down to an
   unreadably thin sliver inside a roughly-square chip; this instead samples a centered square-ish
   crop at full box coverage so the category thumbnail actually reads at a glance. */
function coverImage(key,cx,cy,w,h){
  if(!has(key)) return false;
  const im=IMG[key].img, iw=im.naturalWidth||1, ih=im.naturalHeight||1;
  const s=Math.max(w/iw,h/ih), sw=w/s, sh=h/s, sx=(iw-sw)/2, sy=(ih-sh)/2;
  ctx.drawImage(im,sx,sy,sw,sh,cx-w/2,cy-h/2,w,h); return true;
}

/* subtle "alive" idle: breathing (2s sine, 1.0→1.02) + a blink squash every ~3.4s */
function poppuIdle(){
  const breath = 1.01 + Math.sin(time*Math.PI)*0.01;   // 2s cycle
  const bt = time % 3.4; let blink = 0;
  if(bt < 0.15) blink = Math.sin((bt/0.15)*Math.PI);     // 0→1→0 over 150ms
  return { sx: breath*(1+blink*0.03), sy: breath*(1-blink*0.07) };
}

    ctx.translate(x,py); ctx.scale(q.sx,q.sy); ctx.translate(-x,-py); }
  ctx.drawImage(IMG[key].img,x-size/2,y-size/2,size,size);

const TOWN_GROUND_PAD = {};
function drawTownGroundPad(id){
  const P=TOWN_GROUND_PAD[id]; if(!P) return;
  ctx.save();
  // soft grassy knoll (blurred edge so it melts into the map, not a stuck-on disc)
  shadow(26,'rgba(120,160,86,0.55)',0,0);
  ctx.fillStyle='#93C06E'; ctx.beginPath(); ctx.ellipse(P.cx,P.cy,P.rw,P.rh,0,0,7); ctx.fill();
  noShadow();
  ctx.fillStyle='#9FC97A'; ctx.beginPath(); ctx.ellipse(P.cx,P.cy-P.rh*0.12,P.rw*0.9,P.rh*0.82,0,0,7); ctx.fill();

  const g=ctx.createRadialGradient(P.cx,P.cy-P.rh*0.2,P.rw*0.1,P.cx,P.cy,P.rw*0.62);
  g.addColorStop(0,'#D9C6A0'); g.addColorStop(1,'#CBB588');
  ctx.globalAlpha=0.9; ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(P.cx,P.cy,P.rw*0.5,P.rh*0.46,0,0,7); ctx.fill();
  ctx.restore();
}

function buildDriveAmbientParticles(biome){
  const n=10, kind=biome.particleKind, cols=biome.particleCol, arr=[];
  for(let i=0;i<n;i++){
    arr.push({ x:Math.random()*W, y:Math.random()*H*0.6,

      vy:(kind==='petal'?14:kind==='bubble'?-16:(Math.random()-0.5)*8),

function updateDriveAmbient(dt){
  const D=drive; if(!D||!D.amb) return;
  for(const a of D.amb){ a.x+=a.vx*dt; a.y+=a.vy*dt; a.ph+=dt;
    if(a.y>H+20){ a.y=-20; a.x=Math.random()*W; } if(a.y<-20){ a.y=H+20; a.x=Math.random()*W; }
    if(a.x<-20) a.x=W+20; if(a.x>W+20) a.x=-20; }
}
function drawDriveAmbient(){
  const D=drive; if(!D||!D.amb||!D.biome) return; const kind=D.biome.particleKind;
  for(const a of D.amb){ ctx.save(); ctx.translate(a.x,a.y); ctx.globalAlpha=0.5+0.3*Math.sin(a.ph*2); ctx.fillStyle=a.col;

function boxScale(){ return hasUp('bigBoxes')?1.25:1; }
function activeBoxes(){
  const n=curLevel().boxes;
  const ids=[]; for(let i=0;i<n;i++) ids.push(i);
  let cols,rows,bw;
  if(n<=3){ cols=[1600]; rows=[262,545,828]; bw=290; }
  else if(n<=4){ cols=[1445,1735]; rows=[372,712]; bw=252; }
  else { cols=[1445,1735]; rows=[248,560,872]; bw=228; }
  bw=Math.round(bw*boxScale());
  const ncol=cols.length;
  return ids.map((ti,k)=>{
    let bx=cols[k%ncol], by=rows[Math.floor(k/ncol)];
    if(shuffleActive){ bx+=Math.sin(time*0.7+k)*10; by+=Math.cos(time*0.6+k*1.3)*8; }
    return { typeIdx:ti, type:TYPES[ti], x:bx, y:by, w:bw, h:bw };
  });
}
function boxAt(sx,sy){ for(const b of activeBoxes()){ if(Math.abs(sx-b.x)<b.w*0.55&&Math.abs(sy-b.y)<b.h*0.55) return b; } return null; }

function newBeltPkg(x,type,golden){
  return { type, golden, x, y:BELT.y-20, state:'belt', scale:1, wob:Math.random()*6, born:time };
}
function spawnBeltPackage(x){
  const g=curLevel().mech.golden ? true : (Math.random()<GOLDEN_CHANCE);
  packages.push(newBeltPkg(x!=null?x:BELT.x1-40, randType(), g));
  spawnedThisLevel++;
}
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function beginNextTask(){
  taskNo++;
  const m=curLevel().mech, remaining=curLevel().pkgs-spawnedThisLevel;
  let kind='drag';
  if(m.shake && taskNo%8===0 && remaining>=3) kind='shake';
  else if(m.stamp && taskNo%5===0) kind='stamp';
  else if(m.seal && taskNo%3===0) kind='seal';
  if(kind==='drag'){ spawnBeltPackage(); return; }
  const golden=m.golden?true:(Math.random()<GOLDEN_CHANCE);
  if(kind==='seal'){ activeTask={ kind:'seal', type:randType(), golden, prog:0, done:false, t:0 }; }
  else if(kind==='stamp'){
    // FIX (C4): the correct stamp is now the PACKAGE'S OWN icon — solvable by matching, not a
    // guess. opts always include that icon + 2 random distractors; drawStationTask gives the
    // matching stamp a gentle pre-tap glow/pulse so a toddler can find it without failing first.
    const pkgType=randType(), correctIcon=pkgType.icon;
    const distractors=shuffleArr(TYPES.map(t=>t.icon).filter(ic=>ic!==correctIcon)).slice(0,2);
    const opts=shuffleArr([correctIcon,...distractors]);
    activeTask={ kind:'stamp', type:pkgType, golden, want:correctIcon, opts, stamped:false, t:0, flash:0 };
  } else if(kind==='shake'){
    const items=[]; for(let i=0;i<3;i++) items.push({ type:randType(), golden:m.golden||Math.random()<GOLDEN_CHANCE,
      ox:(Math.random()-0.5)*70, oy:(Math.random()-0.5)*50, rot:(Math.random()-0.5)*0.6 });
    activeTask={ kind:'shake', items, taps:0, sorted:false, t:0 };
  }
}

function resolveSeal(){
  if(!activeTask||activeTask.kind!=='seal'||activeTask.done) return;
  activeTask.done=true; Audio_.seal(); burst(STATION.x,STATION.y,'#fff3c4',18,7);
  packages.push(newBeltPkg(BELT.x1-40, activeTask.type, activeTask.golden)); spawnedThisLevel++;
  setTimeout(()=>{ if(activeTask&&activeTask.kind==='seal') activeTask=null; }, 260);
}
function resolveStamp(){
  if(!activeTask||activeTask.kind!=='stamp'||activeTask.stamped) return;
  activeTask.stamped=true; Audio_.stamp(); burst(STATION.x,STATION.y,'#E3A93E',16,6);
  packages.push(newBeltPkg(BELT.x1-40, activeTask.type, activeTask.golden)); spawnedThisLevel++;
  setTimeout(()=>{ if(activeTask&&activeTask.kind==='stamp') activeTask=null; }, 300);
}
function resolveShake(){
  if(!activeTask||activeTask.kind!=='shake'||activeTask.sorted) return;
  activeTask.sorted=true; Audio_.rattle(); Audio_.pop(); burst(STATION.x,STATION.y,'#98D7B4',22,8);
  const items=activeTask.items;
  for(let i=0;i<items.length;i++){ packages.push(newBeltPkg(BELT.x1-40-i*140, items[i].type, items[i].golden)); spawnedThisLevel++; }
  setTimeout(()=>{ if(activeTask&&activeTask.kind==='shake') activeTask=null; }, 320);
}

/* ------------------------------------------------------------ PARTICLES */
function burst(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=Math.random()*7, s=spd*(0.4+Math.random());
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,color,size:6+Math.random()*10,rot:Math.random()*7,vr:(Math.random()-0.5)*0.4,shape:Math.random()<0.5?'star':'circ'}); } }
function confetti(x,y){ const cols=['#FF9DB6','#8ECFEC','#FFD15C','#B79BEA','#98D7B4','#FF6B6B'];
  for(let i=0;i<70;i++){ particles.push({x:x+(Math.random()-0.5)*380,y:y-Math.random()*80,vx:(Math.random()-0.5)*8,vy:-6-Math.random()*8,
    life:1.8,color:cols[i%cols.length],size:8+Math.random()*8,rot:Math.random()*7,vr:(Math.random()-0.5)*0.5,shape:'rect',grav:0.28}); } }

const CATCH={ star:'Yay!', gear:'Thanks!', moon:'Wow!', heart:'Love it!', drop:'Splash!', cloud:'Yippee!' };
/* simple English pluralizer for the (few) parent-facing count labels in the game — e.g. "1 sticker" vs "3 stickers" */

/* -------------------------------------------------------------- DELIVERY */
function addStamps(n){ SAVE.stamps=(SAVE.stamps||0)+n; }
function deliver(pkg, box){

  popups.push({ type:pkg.type, x:bp.x, boxCy:bp.y, boxH:box.h, t:0 });
  floatTexts.push({ x:bp.x-box.w*0.34, y:bp.y-box.h*0.72, text:CATCH[pkg.type.id]||'thank you!', t:0, color:pkg.type.deep });

  // ---- Star Stamps economy ----

    Audio_.levelWin();
  }

  for(let k=before;k<after;k++){ SAVE.stickers.push(TYPES[k%TYPES.length].id);
    floatTexts.push({x:bp.x,y:bp.y-box.h*1.35,text:'★ sticker!',t:0,color:'#E3A93E'}); }
  // ---- Golden package: 3x stickers (independent bonus, on top of the every-5 sticker above) + confetti ----
  if(pkg.golden){
    Audio_.golden(); confetti(bp.x,bp.y-40);

    for(let k=0;k<GOLD_STICKERS;k++) SAVE.stickers.push(pkg.type.id);
    floatTexts.push({x:bp.x,y:bp.y-box.h*1.75,text:'★×'+GOLD_STICKERS+' stickers!',t:0,color:'#E3A93E',big:true});
  }

  if(tutorial && !tutorial.fading){ tutorial.fading=true; SAVE.tutorialDone=true; }

  persist();
  setTimeout(()=>{ packages=packages.filter(p=>p!==pkg); }, 620);

  if(!levelDone && deliveredThisLevel>=curLevel().pkgs) finishLevel();
}

/* ------------------------------------------------------------- LEVEL FLOW */
function startLevel(n){
  currentLevel=Math.max(1,Math.min(LEVELS.length,n));
  // FIX6: request iOS motion permission right here — startLevel() is always called synchronously
  // from within a real user-gesture handler (tap a level node / building / Next / Replay), which is
  // exactly what iOS requires for DeviceMotionEvent.requestPermission() to work at all.
  if(LEVELS[currentLevel-1].mech.shake) ensureMotionPermission();
  state='PLAYING';
  packages=[]; particles=[]; popups=[]; floatTexts=[]; dragging=null; hoverType=null; sealSwipe=null;
  activeTask=null; taskNo=0; spawnedThisLevel=0; deliveredThisLevel=0; mistakesThisLevel=0;
  levelDone=false; spawnTimer=0.4; levelStartT=time; shuffleActive=false;
  tutorial = (!SAVE.tutorialDone && currentLevel===1) ? {fading:false, ft:0} : null;
  Audio_.resume(); Audio_.setHum(true); Audio_.setMusicRoot(SCENES[currentScene].music.root);
  consumeWrapQueueForLevel();
}
/* Wrap Shop's finished packages get "delivered" into the very next Sort level — a small icon-only
   celebration + bonus stamps, so the queue built up in the Wrap Shop visibly pays off elsewhere
   (minimum bar: it accumulates in Wrap and celebrates here). */
function consumeWrapQueueForLevel(){
  const n=SAVE.wrapQueue||0; if(n<=0) return;
  SAVE.wrapQueue=0; persist();
  burst(BELT.x1,BELT.y,'#FFC2D3',10+Math.min(6,n)*4,5);
  Audio_.collect(); addStamps(n); persist();
}
function finishLevel(){
  levelDone=true; Audio_.setHum(false); Audio_.levelWin(); Audio_.celebrate();
  confetti(W/2,H/2);
  const L=curLevel(), t=time-levelStartT;
  let stars=3;
  if(mistakesThisLevel>4) stars=1; else if(mistakesThisLevel>1) stars=2;
  const parTime=L.pkgs*3.2;
  if(t>parTime*1.8 && stars>1) stars-=1;
  stars=Math.max(1,Math.min(3,stars));
  const bonus=[0,10,20,30][stars];
  addStamps(bonus);
  // ---- daily streak: first level-completion of a new day builds the streak ----
  const _today=todayStr();
  if(SAVE.lastPlayDay!==_today){
    const _yd=new Date(); _yd.setDate(_yd.getDate()-1);
    const _ydStr=_yd.getFullYear()+'-'+(_yd.getMonth()+1)+'-'+_yd.getDate();
    SAVE.streak = (SAVE.lastPlayDay===_ydStr) ? (SAVE.streak||0)+1 : 1;
    if(SAVE.streak>=7 && !SAVE.goldenHat) SAVE.goldenHat=true;
    SAVE.lastPlayDay=_today;
  }
  if(stars>(SAVE.levelStars[currentLevel-1]||0)) SAVE.levelStars[currentLevel-1]=stars;
  if(currentLevel>=SAVE.maxLevel && currentLevel<LEVELS.length) SAVE.maxLevel=currentLevel+1;
  // ---- Post Town: Wrap Shop teases open the first time Level 1 is cleared ----
  // NOTE: newBadge is keyed by TOWN_BUILDINGS id ('wrap'), not the save-slot name ('wrapShop')
  if(currentLevel===1 && !SAVE.unlocks.wrapShop){ SAVE.unlocks.wrapShop=true; SAVE.newBadge.wrap=true; }
  persist();
  doneScreen={ stars, stamps:bonus, level:currentLevel, delivered:deliveredThisLevel };
  // FIX6: play the star-earned tally beat first; the Delivery Drive starts when it finishes (or on a
  // tap-to-skip). Handled in update() so it's cleanly interruptible if the child backs out to Home.
  clearBeatT=0; clearBeatStars=0;
}

/* FIX5: the LEVELDONE results card's OWN big celebration beat — a generous two-origin confetti burst
   + a friend "hug" pop (reusing the same full-body popup the mailbox delivery uses) + a sound sting.
   This is deliberately separate from (and bigger than) the mid-Drive arrival hug earlier in the flow,
   because the results card itself was previously a flat, static screen. One-shot per results card via
   doneCelebrated (reset whenever LEVELDONE is freshly entered, see update()). */
function triggerLevelDoneCelebration(){

}
/* shared "go to the next thing" behavior for LEVELDONE — used by BOTH the explicit Next tap and the
   ~3.5s non-reader auto-advance below, so the two always agree. On the final level this goes straight
   into the Post Town hub (never a dead-end title screen — a non-reader never has to find their way
   back in). */
function advanceFromLevelDone(){

  else startLevel(Math.min(LEVELS.length,currentLevel+1));
}

/* ============================================================ DELIVERY DRIVE
   A short (~19s), lose-proof scenic drive between "level cleared" and the
   results screen. No timer pressure, no obstacles that hurt, no dead-ends —
   purely a cozy breather + a few bonus collectibles + a Peeky greeting.     */
function buildDriveItems(friendId){
  // dense, near-continuous trail (~190px apart, ~0.86s at DRIVE_SPEED — was 300px/~1.36s) so 3-5 are always
  // visible/reachable ahead — no dead beats between pickups. Gentle weave across two lanes + center so
  // catching one naturally lines the truck up to catch the next, right along the road's own curve.
  // LANE THEMING (creative-director veto fix): the streaming lane pickups now carry the DESTINATION
  // FRIEND'S OWN icon (gear/heart/moon/drop/cloud) with an occasional gold Poppu star, so the drivable
  // corridor itself reads as "this friend's world," not a generic heart/star chute in every biome.
  const items=[]; let idx=0;
  const LANES=[-170,0,170,0];
  const fk=(friendId&&T[friendId])?friendId:'heart';
  for(let d=280; d<DRIVE_LENGTH-200; d+=190){
    items.push({ d, lane:LANES[idx%LANES.length], kind:(idx%4===3?'star':fk), collected:false });
    idx++;
  }
  return items;
}
function buildRoadsideProps(){
  // roadside dressing only — never on the drivable lane, never blocks/hurts. A few cozy props (~11 over
  // the whole drive) so the shoulders never read as empty tan expanse while the truck rolls past.
  const KINDS=['flower','flower','mushroom','flower','butterfly','flower','signpost','mushroom','flower'];
  const COLS=['#FF9DB6','#B79BEA','#8ECFEC','#FFD15C'];
  const props=[]; let idx=0;
  for(let d=220; d<DRIVE_LENGTH-120; d+=240){
    props.push({ d, side:idx%2===0?-1:1, kind:KINDS[idx%KINDS.length], jitter:Math.sin(idx*2.1)*36,
      col:COLS[idx%COLS.length], ph:idx*1.7 });
    idx++;
  }
  return props;
}
function startDrive(){
  state='DRIVE';
  floatTexts=[]; popups=[]; particles=[];   // never carry stale TOWN/PLAYING text or particles into the drive
  // ---- Friend rotation + per-destination biome (Phase 1): stop hardcoding Peeky/gear. Rotate
  // through the friends unlocked SO FAR via SAVE.driveVisits % rotation-length — every run visits a
  // different friend, and each friend carries their own body/house/biome. ----
  const rotIds=unlockedDriveFriendIds();
  const chosenId=rotIds[(SAVE.driveVisits||0)%rotIds.length];
  SAVE.driveVisits=(SAVE.driveVisits||0)+1; persist();
  const friendType=T[chosenId], biome=DRIVE_BIOMES[chosenId]||DRIVE_BIOMES.gear;
  drive={
    scrollY:0,
    truck:{ x:roadCenterX(0), rot:0 },
    dragActiveX:null,
    items:buildDriveItems(chosenId),
    props:buildRoadsideProps(),
    arriving:false, arriveT:0, peekyTriggered:false, hugTriggered:false, done:false,
    lastRattle:-999,
    friendType, biome, houseKey:houseKeyForType(chosenId),
    amb:buildDriveAmbientParticles(biome),
    // two reactive mid-drive beats (kills the dead-quiet stretch) — a cozy bunny pops up right beside
    // the driving lane and waves as the truck passes, ~32% and ~68% of the way; purely decorative,
    // drawn close to roadCenterX so it's impossible to miss, never blocks/hurts the truck.
    critters:[
      { d:DRIVE_LENGTH*0.32, side:-1, state:'idle', t:0 },
      { d:DRIVE_LENGTH*0.68, side:1,  state:'idle', t:0 },
    ],
    arrivalPop:null,   // {t,full} — wordless hug payoff, set at the hug beat (see updateDrive)
    // biome finger-toy layer (P1 9-10 lever): each biome plays a DISTINCT verb (see DRIVE_BIOMES modes).
    floaters:[], floaterTimer:0.4, floatersCaught:0,
    jarCount:0, jarPop:0, jarFull:0, rainbowT:0, hop:null,   // per-mode state (jar count-goal / sky rainbow / riverside sequence)
    basketFx:[], pileNudge:0,   // (C) woodland-tumble/twilight-drift decorative fx queue + the corner pile's catch-bounce
  };
  Audio_.startTruck(); Audio_.setMusicRoot(5);
}
function driveProgress(){ return drive?Math.max(0,Math.min(1,drive.scrollY/DRIVE_LENGTH)):0; }
function collectDriveItem(it){
  if(it.collected) return; it.collected=true;
  const x=roadCenterX(it.d)+it.lane, y=820-(it.d-drive.scrollY);
  const color=(T[it.kind]&&T[it.kind].mid)||'#FFD15C';
  burst(x,y,color,16,7); Audio_.collect(); addStamps(1); persist();
}
/* NO-PENALTY "aww, so close!" feedback when the truck rolls past a collectible without catching it —
   never blocks, never costs anything, purely a soft "that mattered" cue so steering feels consequential
   even on a miss. A gentle wiggle + a few dulled sparkles + a soft descending note (Audio_.aww). */
function missDriveItem(it){
  if(it.collected||it.missed) return; it.missed=true; it.missT=0;
  const x=roadCenterX(it.d)+it.lane, y=820-(it.d-drive.scrollY);
  burst(x,y,'#D8C8C0',6,3); Audio_.aww();
}
/* ---- Biome finger-toy (P1 9-10 lever) — renewable single-TAP interaction per biome ------------
   A drifting illustrated creature/prop (acorn/butterfly/firefly/lilypad/cloud-puff) spawns from one
   side and floats across its biome's air/water band. A single tap catches it: sparkle burst + a soft
   distinct per-biome chime + 1 Star Stamp. Always rewarding, never blocks/steers the truck, never a
   fail — a miss just drifts off the far edge with zero penalty. Sprites are has()-gated real PNGs. */
const JAR_POS={ x:140, y:H-140 };
/* ============================================================ BETWEEN-RUN NATURE COLLECTION (P2)
   The Drive's per-run crescendo (jar/hop/etc.) resets every trip by design — good in-the-moment
   pacing, but zero reason to come back tomorrow. This layer sits ALONGSIDE it: a LIFETIME tally per
   friend (SAVE.driveCollection), fed by the same catch payoffs, that visibly piles up across every
   run forever and never resets. Wordless: a growing row of the real illustrated sprite communicates
   "more" without a single digit; a small count is decorative juice only, never required reading. */
const DRIVE_COLLECTION_GOAL=15;                 // pips-per-"basket" — tunable; a full pile pays a bonus, then starts refilling toward the next one
const DRIVE_PILE_CORNER={ x:W-160, y:H-110 };   // shared landing spot for the woodland tumble-fx + the small in-drive pile readout (kept clear of JAR_POS/steer-hint/friend-growth-face/stamp-chip)
function driveCollectionSpriteKey(friendId){
  const B=DRIVE_BIOMES[friendId]; if(!B) return null; const I=B.interact;
  return I.mode==='bloom' ? (I.emit||I.key) : I.key;   // meadow's collectible is the emitted butterfly, not the flower prop
}
/* current tier's fill count (1..GOAL) — a just-completed tier still reads as a full pile for a beat
   (n % GOAL === 0) rather than snapping to an empty one, so the payoff always feels earned, not erased. */
function driveCollectionTierProgress(friendId){
  const n=(SAVE.driveCollection&&SAVE.driveCollection[friendId])||0; if(n<=0) return 0;
  const m=n%DRIVE_COLLECTION_GOAL; return m===0?DRIVE_COLLECTION_GOAL:m;
}
function driveCollectionTier(friendId){ return Math.floor(((SAVE.driveCollection&&SAVE.driveCollection[friendId])||0)/DRIVE_COLLECTION_GOAL); }
/* +1 lifetime gift for `friendId`, called from EVERY biome's catch payoff below (fall/bloom/jar/hop/
   gate) — one call site per verb, so every biome feeds the same persistent pile. Crossing a tier
   boundary pays a one-time bonus (guarded by driveCollectionTier so re-entering the same tier from a
   fresh save/replay never double-pays). Never resets — SAVE-persisted, carries across every future run. */
function bumpDriveCollection(friendId,x,y){
  if(!friendId) return;
  SAVE.driveCollection=SAVE.driveCollection||{}; SAVE.driveCollectionTier=SAVE.driveCollectionTier||{};
  const before=SAVE.driveCollection[friendId]||0, after=before+1;
  SAVE.driveCollection[friendId]=after;
  const tierBefore=Math.floor(before/DRIVE_COLLECTION_GOAL), tierAfter=Math.floor(after/DRIVE_COLLECTION_GOAL);
  if(tierAfter>tierBefore && tierAfter>(SAVE.driveCollectionTier[friendId]||0)){
    SAVE.driveCollectionTier[friendId]=tierAfter;
    grantCollectionMilestone(friendId,x,y);
  }
  persist();
}
/* wordless "you filled it!" payoff — bigger sparkle + confetti + a one-time Star Stamp bonus. Position
   is wherever the triggering catch happened (Drive scene), falling back to stage-center if unset. */
function grantCollectionMilestone(friendId,x,y){
  const cx=x!=null?x:W/2, cy=y!=null?y:H/2;
  addStamps(5);
  burst(cx,cy,'#FFD54A',22,7); burst(cx,cy,'#FFF3C4',12,5); confetti(cx,cy);
  Audio_.golden();
  floatTexts.push({ x:cx, y:cy-90, text:'+5⭐', t:0, color:'#E3A93E' });
}
/* wordless "the pile is growing" readout — a row of the REAL biome sprite (never a procedural stand-
   in shape) filling left-to-right/top-to-bottom, dimmed-alpha for not-yet-earned slots (same pattern
   as drawFriendHeartMeter's dimmed unfilled hearts). Reused by both the Drive corner + the Friend
   House showcase so the same lifetime number reads identically everywhere it's shown. */
/* ONE woven-basket vessel holding `count` gathered gifts (0..GOAL), piled with per-item size + rotation
   variety so they read as individual treasures rather than tally marks (creative note). Real PNGs only
   (the illustrated basket + the biome gift sprite) — no procedural asset shapes; `seed` de-correlates the
   pile jitter between sibling baskets. A basket with 0 gifts still draws the empty vessel = "room to grow". */
function drawGiftBasket(giftKey,cx,cy,basketSz,count,seed){
  const n=Math.max(0,Math.min(DRIVE_COLLECTION_GOAL,count|0));
  const k=basketSz/120;
  if(has('drive_basket')){ ctx.save(); shadow(11*k,'rgba(90,60,30,0.22)',0,7*k);
    ctx.drawImage(IMG.drive_basket.img, cx-basketSz/2, cy-basketSz/2, basketSz, basketSz); noShadow(); ctx.restore(); }
  if(!has(giftKey)) return;
  const img=IMG[giftKey].img, giftSz=basketSz*0.40, mouthY=cy-basketSz*0.12, mouthW=basketSz*0.30;
  // clustered heap inside the basket mouth, rear rows first so nearer gifts overlap in front (brimming look)
  for(let i=0;i<n;i++){
    const row=Math.floor(i/5), col=i%5, perRow=Math.min(5,n-row*5);
    const spread=(perRow>1?(col-(perRow-1)/2):0);
    const r1=Math.sin((i+1)*12.9+seed*7.7), r2=Math.cos((i+1)*7.3+seed*3.1), r3=Math.sin((i+1)*3.3+seed*5.5);
    const gx=cx+spread*(mouthW*0.7)+r1*giftSz*0.14;
    const gy=mouthY-row*giftSz*0.40+r2*giftSz*0.12;
    const gs=giftSz*(0.82+((i*13+seed*3)%10)/10*0.40);   // 0.82..1.22 size variety
    ctx.save(); ctx.translate(gx,gy); ctx.rotate(r3*0.42);
    ctx.drawImage(img,-gs/2,-gs/2,gs,gs); ctx.restore();
  }
}
/* wordless lifetime showcase: a FULL basket per completed collection tier + one still-filling basket, so
   the display VISIBLY gets bigger every 15 gifts (a pre-reader sees "more baskets than yesterday" with
   zero digits) — not a fixed grid that refills in place. `single`=the compact in-Drive corner readout. */
function drawNatureGiftPile(friendId,cx,cy,scale,popScale,single){
  const key=driveCollectionSpriteKey(friendId); if(!key) return;
  const n=(SAVE.driveCollection&&SAVE.driveCollection[friendId])||0;
  const basketSz=120*scale*(popScale||1);
  if(single){ drawGiftBasket(key,cx,cy,basketSz,driveCollectionTierProgress(friendId),0); return; }
  const fullBaskets=Math.floor(n/DRIVE_COLLECTION_GOAL), partial=n%DRIVE_COLLECTION_GOAL;
  const total=Math.max(1, fullBaskets + ((partial>0||fullBaskets===0)?1:0));
  const cols=3, maxShow=6, show=Math.min(total,maxShow), startB=Math.max(0,total-show);
  const gapX=basketSz*0.98, gapY=basketSz*0.56;   // slight overlap + rows grow UP/back so the cluster sits ON the floor line at cy
  // back rows first (smaller, tucked behind); front row overlaps them, and each basket gets its own size +
  // position jitter so the cluster reads as an organic hoard, not xeroxed clones in a row (creative note).
  for(let s=show-1;s>=0;s--){
    const b=startB+s, count=(b<fullBaskets)?DRIVE_COLLECTION_GOAL:partial;
    const col=s%cols, row=Math.floor(s/cols), perRow=Math.min(cols,show-row*cols);
    const h1=Math.sin((b+1)*5.3), h2=Math.cos((b+1)*3.7);
    const depth=1-row*0.13, szMul=(0.9+((b*7)%5)/5*0.30)*depth;   // 0.9..1.20 per-basket size variety
    const bx=cx+(col-(perRow-1)/2)*gapX*depth + h1*basketSz*0.05;
    const by=cy - row*gapY + h2*basketSz*0.045;
    drawGiftBasket(key,bx,by,basketSz*szMul,count,b+1);
  }
}
/* small always-on corner readout during the Drive itself (both driving + arrival) so the lifetime
   pile is visible the moment it grows, not only after the run ends. */
function drawDriveCollectionCorner(){
  const D=drive; if(!D||!D.friendType) return;
  const pop=1+(D.pileNudge||0)*0.16;
  if(D.arriving){
    // ARRIVAL beat (gameplay 9-lever): surface the FULL lifetime basket cluster right beside the reunion,
    // so the "look how much I've gathered for you — bigger than last time" payoff lands IN-FLOW every run,
    // not only if the child later dives into the friend-house menu. Fades in with the tableau.
    const a=Math.max(0,Math.min(1,(D.arriveT-0.35)/0.4)); if(a<=0) return;
    ctx.save(); ctx.globalAlpha=a; drawNatureGiftPile(D.friendType.id, 1560, 905, 0.9, pop); ctx.restore();
    return;
  }
  drawNatureGiftPile(D.friendType.id, DRIVE_PILE_CORNER.x, DRIVE_PILE_CORNER.y-30, 0.62, pop, true);
}
/* ---- (C) reward-grammar variety: physically distinct catch moments for the two flattest verbs ----
   WOODLAND acorn: tumbles in a little arc + spins down into the corner pile (a real "plunk" landing,
   not just fading in place). TWILIGHT firefly: doesn't just burst — it drifts up as a glowing light,
   trailing a soft afterglow, before settling into the jar. Both are DECORATIVE overlays layered on top
   of the existing instant burst/chime/stamp reward in catchFloater — they never gate or delay it. */
function updateBasketFx(dt){
  const D=drive; if(!D) return;
  if(D.pileNudge>0) D.pileNudge=Math.max(0,D.pileNudge-dt*3);
  const fx=D.basketFx; if(!fx||!fx.length) return;
  for(let i=fx.length-1;i>=0;i--){
    const f=fx[i]; f.t+=dt;
    if(f.t>=f.dur){
      D.pileNudge=1;

function spawnFloater(D){

/* SKY gate — resolved as the cloud wall reaches the truck: in the gap = whoosh + rainbow; else a soft puff (no penalty) */

/* RIVERSIDE stepping-stones — a short row of lilypads; tap the glowing next one in sequence, a musical
   plip per step, the whole row lit = happy bonus. Wrong/early taps do nothing (never a fail). */
function spawnHopRow(D){
  // RIVERSIDE: the stepping-stone row gets LONGER as we near the friend (3 → 5 pads) — a rising sequence
  const d=D.scrollY+900+Math.random()*220, nP=Math.min(5,3+Math.round(driveProgress()*2)), pads=[];
  for(let k=0;k<nP;k++) pads.push({ d, off:(k-(nP-1)/2)*175, lit:false, phase:Math.random()*7 });

}
function updateHop(D,dt){
  if(!D.hop){ if(!D.arriving) spawnHopRow(D); return; }
  const H2=D.hop; for(const p of H2.pads) p.phase+=dt*1.6;
  if(H2.done){ H2.doneT+=dt; if(H2.doneT>0.7){ D.hop=null; if(!D.arriving) spawnHopRow(D); } return; }
  const y0=820-(H2.pads[0].d-D.scrollY);
  if(y0>H+150){ D.hop=null; if(!D.arriving) spawnHopRow(D); }
}
function tryHopTap(D,px,py){
  const H2=D.hop; if(!H2||H2.done) return false;
  const p=H2.pads[H2.next]; if(!p) return false;
  const x=roadCenterX(p.d)+p.off, y=820-(p.d-D.scrollY)+Math.sin(p.phase)*6;
  if(Math.hypot(px-x,py-y)<132){
    p.lit=true; burst(x,y,'#8ECFEC',10,5); burst(x,y,'#BFE6F6',6,3);
    if(Audio_.plip) Audio_.plip();
    H2.next++; D.floatersCaught=(D.floatersCaught||0)+1; bumpDriveCollection(D.friendType.id,x,y);
    if(H2.next>=H2.pads.length){ H2.done=true; H2.doneT=0;
      burst(x,y,'#7EC77E',16,6); confetti(x,y); if(Audio_.arrival) Audio_.arrival(); addStamps(2); }
    else addStamps(1);

  }

}
function updateDriveFloaters(dt){
  const D=drive; if(!D||!D.biome||!D.biome.interact) return;
  const I=D.biome.interact, mode=I.mode||'catch';
  if(D.jarPop>0) D.jarPop=Math.max(0,D.jarPop-dt*2.2);
  if(D.rainbowT>0) D.rainbowT=Math.max(0,D.rainbowT-dt*0.7);
  if(mode==='hop'){ updateHop(D,dt); return; }
  // spawn cadence — keep the biome toy populated while driving; stop spawning once arriving
  if(!D.arriving){
    D.floaterTimer-=dt;
    const live=D.floaters.filter(f=>!f.caught&&!f.flit&&!f.popped).length;
    const cap=mode==='gap'?2:3;
    if(D.floaterTimer<=0 && live<cap){ spawnFloater(D);
      D.floaterTimer=((mode==='gap'?1.4:0.85)+Math.random()*0.9)*(1-driveProgress()*0.32); }   // quicker cadence near the friend
  }
  for(let i=D.floaters.length-1;i>=0;i--){ const f=D.floaters[i];
    f.phase+=dt*1.6;
    if(f.flit){ f.life+=dt; f.x+=f.vx*dt; f.y+=f.vy*dt; f.vy+=dt*42;
      if(f.life>f.maxLife) D.floaters.splice(i,1); continue; }
    if(f.caught||f.popped){ f.popT+=dt; if(f.popT>0.28) D.floaters.splice(i,1); continue; }
    if(f.fall){ f.y+=f.vy*dt; f.x+=f.vx*dt; f.spin2=(f.spin2||0)+f.spin*dt;
      if(f.y>H+90) D.floaters.splice(i,1); continue; }
    if(f.bloom){ const y=820-(f.d-D.scrollY); if(y>H+150) D.floaters.splice(i,1); continue; }
    if(f.gate){ f.y+=DRIVE_SPEED*1.15*dt;
      if(!f.resolved && !D.arriving && f.y>=735){ f.resolved=true; resolveGate(D,f); }   // no stray reward over the hug
      if(f.y>H+170) D.floaters.splice(i,1); continue; }
    f.x+=f.vx*dt; f.life+=dt;   // default catch drift
    if(f.x<-140||f.x>W+140||f.life>f.maxLife) D.floaters.splice(i,1);
  }
}
/* tap resolution — generous toddler-friendly hit radius around the drifting sprite; returns true if a
   floater was caught (so the drive tap doesn't also start a steer). */
function tryCatchFloaterAt(px,py){
  const D=drive; if(!D||!D.biome||!D.biome.interact||D.arriving) return false;   // hands off during the arrival hug (QA)
  const mode=D.biome.interact.mode||'catch';
  if(mode==='gap') return false;              // SKY is steer-only — a tap should steer, never "catch"
  if(mode==='hop') return tryHopTap(D,px,py); // RIVERSIDE stepping-stone sequence
  for(const f of D.floaters){ if(f.caught||f.flit) continue;
    if(f.bloom){ if(f.popped) continue;
      const x=roadCenterX(f.d)+f.side, y=820-(f.d-D.scrollY), hit=Math.max(112,f.sz*0.6);
      if(Math.hypot(px-x,py-y)<hit){ popBloom(D,f); return true; } continue; }
    const y=f.fall? f.y : f.y+Math.sin(f.phase)*f.bobAmp, hit=Math.max(96,f.sz*0.62);
    if(Math.hypot(px-f.x,py-y)<hit){ catchFloater(D,f); return true; }
  }
  return false;
}
function startArrival(){
  const D=drive; D.arriving=true; D.arriveT=0; D.peekyTriggered=false; D.hugTriggered=false; D.done=false; D.arrivalPop=null;
  // clear ALL biome toys so none linger "tap-me" through the hug — the arrival is Poppu's moment, not a
  // catch window (QA). Each kind is routed to its own gentle fade-out, none to a hard pop.
  D.hop=null;                                                            // riverside stepping-stones off
  for(const f of D.floaters){
    if(f.flit||f.gate) continue;                                         // butterfly burst finishes; gates fade by descending (guarded from resolving)
    if(f.fall){ f.caught=true; f.popT=0; }                               // acorns settle out via the caught fade
    else if(f.bloom){ f.popped=true; f.popT=0; }                         // flowers close via the popped fade
    else if(!f.caught && f.maxLife) f.maxLife=Math.min(f.maxLife,f.life+0.4);   // catch/jar drift soft-fade
  }
}
function updateDrive(dt){
  const D=drive; if(!D) return;
  updateDriveAmbient(dt);
  updateDriveFloaters(dt);
  updateBasketFx(dt);
  if(!D.arriving){
    D.scrollY+=DRIVE_SPEED*dt;
    if(D.scrollY>=DRIVE_LENGTH){ D.scrollY=DRIVE_LENGTH; startArrival(); }
    const cx=roadCenterX(D.scrollY);
    if(D.dragActiveX!=null){
      const desired=Math.max(cx-DRIVE_DRAG_HALFW,Math.min(cx+DRIVE_DRAG_HALFW,D.dragActiveX));
      D.truck.x+=(desired-D.truck.x)*Math.min(1,dt*10);
      D.truck.rot=Math.max(-12,Math.min(12,(desired-D.truck.x)*0.02))*Math.PI/180;
    } else {
      D.truck.rot*=Math.max(0,1-dt*3);
      D.truck.x+=(cx-D.truck.x)*Math.min(1,dt*3);   // gentle self-centering when the finger lifts
    }
    const off=Math.abs(D.truck.x-cx);
    if(off>DRIVE_RATTLE_OFF && time-D.lastRattle>0.3){ D.lastRattle=time; Audio_.rattle(); }
    for(const it of D.items){
      if(it.collected) continue;
      const itx=roadCenterX(it.d)+it.lane, ddy=it.d-D.scrollY;
      if(Math.hypot(itx-D.truck.x,ddy)<160) collectDriveItem(it);
      else if(!it.missed && ddy<-140) missDriveItem(it);   // truck has rolled past it, uncaught
      if(it.missed) it.missT+=dt;
    }
    // reactive mid-drive beats: wake each critter as the truck gets near it
    for(const c of D.critters){
      if(c.state==='idle' && D.scrollY>=c.d-170){
        c.state='active'; c.t=0; Audio_.greet(c.side<0?1:4);
        burst(roadCenterX(c.d)+c.side*130, 820-(c.d-D.scrollY), '#FFF3C4', 10, 5);
      }
      if(c.state==='active'){ c.t+=dt; if(c.t>2.0) c.state='done'; }
    }
  } else {
    D.arriveT+=dt; const t=D.arriveT;
    if(D.arrivalPop) D.arrivalPop.t+=dt;
    if(t<=0.4){
      const p=t/0.4, e=1-(1-p)*(1-p);   // easeOutQuad decel 220→0
      D.scrollY=Math.min(DRIVE_LENGTH, D.scrollY+DRIVE_SPEED*(1-e)*dt);
      const cx=roadCenterX(D.scrollY);
      D.truck.x+=(cx-D.truck.x)*Math.min(1,dt*6);
      D.truck.rot*=Math.max(0,1-dt*4);
    }
    if(t>=0.4 && !D.peekyTriggered) D.peekyTriggered=true;
    if(t>=0.9 && !D.hugTriggered){
      D.hugTriggered=true;
      // ---- steering payoff: a full/near-full catch run earns an extra wordless flourish + bonus stamps ----
      const caught=D.items.filter(i=>i.collected).length, total=D.items.length;
      const fullRun=total>0 && caught>=Math.max(1,Math.ceil(total*0.9));
      D.caught=caught; D.total=total; D.fullRun=fullRun;
      const DF=DRIVE_FLAIR[D.friendType.id]||DRIVE_FLAIR.gear;
      Audio_.arrival(); confetti(1010,700);
      burst(1010,600,DF.col,fullRun?Math.round(DF.pn*1.7):DF.pn,fullRun?DF.psp+2:DF.psp);   // per-friend landing sparkle
      if(fullRun){ burst(1010,555,'#FFD54A',18,7); Audio_.golden(); addStamps(10); }
      D.arrivalPop={ t:0, full:fullRun };   // word-free heart/star pop — see drawDriveArrivalPop
      SAVE.charDeliveries[D.friendType.id]=(SAVE.charDeliveries[D.friendType.id]||0)+1;
      addStamps(5); persist(); checkTownUnlocks();
      setTimeout(()=>{ Audio_.friendJingle(D.friendType.index); }, 250);
    }
    if(t>=1.6 && !D.done){
      D.done=true; Audio_.stopTruck(); Audio_.setMusicRoot(SCENES[currentScene].music.root);
    }
    // simulation-time (not wall-clock) hand-off — stays correct under fast-forwarded/headless test steps too.
    // Guarded: only leave the drive scene if the child is still on it (didn't already tap Home).
    if(D.done && t>=1.6+DRIVE_FADE_DUR && state==='DRIVE'){ state='LEVELDONE'; }
  }
}

/* ================================================================ TOWN MAP */
function enterTown(){

  floatTexts=[]; popups=[]; particles=[];   // never carry stale text/particles in from another scene
  // wordless "new" reveal: the first time a building with an unclaimed badge is SHOWN this session,
  // it does a one-shot look-at-me wiggle (never replays on later re-entries while still unclaimed)
  for(const id in TOWN_BUILDINGS){ if(SAVE.newBadge[id] && !newBadgeSeen[id]){ newBadgeSeen[id]=true; newBadgeAnimState[id]={t:0}; } }
  Audio_.setTownAmbience(true); Audio_.pop();
}
function leaveTown(){

}
function triggerSqueeze(id){ buildingSqueeze={ id, t:0 }; }
function squeezeScale(t){
  const d=0.26; if(t>=d) return 1;
  const p=t/d;
  if(p<0.5) return 1-0.06*(p/0.5);
  return 0.94+0.06*easeOutBack((p-0.5)/0.5);
}
function triggerPoppuPoint(target){

  // (drawTownBuilding), Poppu's lean/point (drawPoppuTownPointGesture) + the sparkle burst in
  // handleBuildingTap. No "soon" label — non-readers can't read it, so nothing here reads it either.
}
function poppuTownPos(){

    const x=POPPU_TOWN_HOME.x+(420-POPPU_TOWN_HOME.x)*e, y=POPPU_TOWN_HOME.y+(880-POPPU_TOWN_HOME.y)*e;
    const hop=Math.abs(Math.sin(t*Math.PI/0.09))*24*(1-travel);

  }
  if(poppuPoint){
    const t=poppuPoint.t, tgt=poppuPoint.target;

/* ================================================================ FRIEND HOUSE
   A cozy, lose-proof "hang out with a friend" toy: feed them any treat (drag from the tray), pet
   them (tap), or dress them up in a hat (drag from the hat row). Friendship hearts derive from
   SAVE.charDeliveries (same counter the Sort game + Delivery Drive already build up), and feeding
   / petting nudge it too, so the meter visibly fills no matter how the child plays. */
const FRIEND_POS={ x:960, y:640 };
const FRIEND_ITEM_ICONS=['star','heart','cloud'];
/* the "want" bubble must only ever ask for something the item tray actually offers — every want is
   solvable in one tap (A1 bugfix; TYPES ids double as their icon ids so a simple filter is exact). */
const FRIEND_WANT_TYPES=TYPES.filter(t=>FRIEND_ITEM_ICONS.includes(t.icon));
function friendItemTray(){
  const y=940, r=78, gap=230, cx=W/2;   // gap widened 200->230 (A8)
  return FRIEND_ITEM_ICONS.map((icon,i)=>({ icon, x:cx-gap+i*gap, y, r }));
}
function friendHatTray(){
  const list=COSMETICS.filter(c=>c.cat==='hat'); const y=175, r=72, gap=150, total=(list.length-1)*gap, x0=W/2-total/2;   // y 150->175, r 64->72 (A8)
  return list.map((c,i)=>({ id:c.id, x:x0+i*gap, y, r }));
}
function friendHearts(typeId){ return Math.min(5, Math.floor((SAVE.charDeliveries[typeId]||0)/3)); }
/* (B) entry-greeting motion, tiered by CURRENT friendship (captured once at enterFriend as
   F.greetHearts so mid-visit heart gains don't retroactively change the beat already playing):
   0-2 hearts = a quiet single side-sway ("hi again"); 3-4 = a happier double-bounce; 5 ("best
   friends") = a big excited jump, timed to land right as checkFriendGift's gift-pop fires. Purely
   an additive offset layered onto drawFriendBody's existing bob/squash — no new art, no state that
   affects scoring. */
function friendGreetOffset(F){
  if(F.greetT==null) return {by:0,rot:0,sy:1};
  const t=F.greetT, hearts=F.greetHearts||0;
  if(hearts>=5){
    const win=Math.min(1,t/0.9), hop=Math.sin(Math.min(1,t/0.55)*Math.PI)*46*(t<0.55?1:Math.max(0,1-(t-0.55)/0.5));
    const squash=1+Math.sin(win*Math.PI*2)*0.10*Math.max(0,1-win);
    return { by:-hop, rot:0, sy:squash };
  }
  if(hearts>=3){
    const cyc=t%0.5, hop=t<1.0?Math.sin(Math.min(1,cyc/0.5)*Math.PI)*22:0;
    return { by:-hop, rot:0, sy:1 };
  }
  const sway=Math.sin(Math.min(1,t/1.1)*Math.PI)*0.10*Math.max(0,1-t/1.1);
  return { by:0, rot:sway, sy:1 };
}
/* per-friend flair table (animation-director spec) — every knob a Friend-House interaction touches
   (feed/pet timing+ease, idle bob speed, and the accent color used across their particle bursts). */
const FRIEND_FLAIR={
  gear:  { col:'#FFD15C', squish:0.18, petDur:0.42, ease:'back', speed:1.00 },
  moon:  { col:'#B79BEA', squish:0.14, petDur:0.46, ease:'quad', speed:0.72 },
  heart: { col:'#FF9DB6', squish:0.18, petDur:0.42, ease:'back', speed:0.90 },
  drop:  { col:'#8ECFEC', squish:0.20, petDur:0.42, ease:'back', speed:1.10 },
  cloud: { col:'#C4E9D4', squish:0.30, petDur:0.58, ease:'quad', speed:0.60 },

/* calibrated per-character hat seat (was eyeballed to Peeky only — every other friend's head sits at
   a different height/width, so a shared 190/1.0 made hats float or clip on anyone else). */
const HAT_Y={ gear:92, moon:124, heart:120, drop:122, cloud:118 };
const HAT_SCALE={ gear:1.0, moon:1.0, heart:1.0, drop:1.05, cloud:1.08 };
function heartMeterPos(i){ const cx=W/2, y=60, gap=64, total=5*gap, x0=cx-total/2+gap/2; return { x:x0+i*gap, y }; }
function enterFriend(id){
  const info=FRIEND_UNLOCK[id]; if(!info) return;
  const hearts=friendHearts(info.type);
  /* ---- (B) "a friend who remembers you" ---- the entry greeting scales with friendship: a quiet
     wave at low hearts, a happier bounce once you've visited a few times, and an excited jump/hug
     right at "best friends" (5 hearts) — reusing the shared bob/squash rig in drawFriendBody so no
     new art is needed, just a bigger/warmer beat + a friendlier chime the more you've bonded. */
  friendScene={ id, type:T[info.type], petT:0, breathing:true, feedAnim:null, hatDropT:null, hatLandT:null, hatLanded:true,
    greetT:0, greetHearts:hearts,

/* one-time "best friends" celebration + reward — fires the FIRST time a friend house is entered after

   SAVE.friendGiftGiven so it can only ever fire once per friend, and persists forever after. */
function checkFriendGift(){
  const F=friendScene; if(!F||!F.giftPending) return;
  F.giftPending=false;

function bumpFriendship(typeId){

    const pos=heartMeterPos(friendHeartNewIdx);

function feedFriend(icon, fromPos){

function dressFriend(hatId){

function drawFriendHeartMeter(){
  const F=friendScene; if(!F) return;

    }

/* per-friend post-chomp reaction — extra idle-bob offset + a body squishY multiplier, layered on top of
   the shared pet-squish/breathing so Peeky/Orby/Wavey/Puffy each move distinctly once they've eaten.
   Zaza's reaction is carried entirely by the overlay heart-puffs + blush (drawFriendFeedAnim/drawFriendBody
   below) so her body stays soft/still — a deliberate contrast, not a missing case. */
function friendFeedReaction(id,rt){
  if(id==='gear'){ const cyc=rt%0.42, hop=rt<0.86?Math.sin(Math.min(1,cyc/0.42)*Math.PI):0; return { by:-hop*24, sy:1 }; }         // double-hop
  if(id==='moon'){ const p=Math.min(1,rt/1.0); return { by:-p*20, sy:1+Math.sin(p*Math.PI*2)*0.03*(1-p) }; }                        // slow rise+rock
  if(id==='drop'){ const p=Math.min(1,rt/0.5), hop=Math.sin(p*Math.PI); return { by:-hop*36, sy:1+0.08*hop }; }                     // big bounce
  if(id==='cloud'){ const p=Math.min(1,rt/0.9); return { by:0, sy:1-0.22*Math.sin(p*Math.PI) }; }                                   // deep slow squash to ~0.78
  return { by:0, sy:1 };
}
function drawFriendBody(){
  const F=friendScene, t=F.type, flair=FRIEND_FLAIR[t.id];
  const pt=F.petT>0?Math.min(1,F.petT/flair.petDur):0;
  let squishY=F.petT>0 ? 1-flair.squish*Math.sin(pt*Math.PI) : 1;
  let giggle=F.petT>0 ? Math.sin(F.petT*38)*0.04*(1-pt) : 0;
  let extraBob=0;
  if(F.feedAnim){
    const ft=F.feedAnim.t;
    if(ft>=0.32 && ft<0.58){ const eatP=(ft-0.32)/0.26; squishY*=1-0.14*Math.abs(Math.sin(eatP*2*Math.PI)); }        // chomp
    else if(ft>=0.58){ const r=friendFeedReaction(t.id,ft-0.58); squishY*=r.sy; extraBob+=r.by; }

  const greet=friendGreetOffset(F); squishY*=greet.sy; giggle+=greet.rot; extraBob+=greet.by;
  const squishX=squishY!==0?1/squishY:1;   // volume-preserving — never looks like it lost mass
  const breathe=F.breathing?1.02+0.02*Math.sin(time*2*Math.PI/1.2):1;   // A8 entry breathing (cancels on first touch)
  const bob=Math.sin(time*1.6*flair.speed)*10+extraBob, key=fullBodyKey(t);

  // that single integrated image and SKIP the base sprite + floating overlay hat entirely. The baked
  // image is exported at the base sprite's dims so it lands identically here. Falls back otherwise.
  const equippedHat=SAVE.friendHats[F.id];
  const dressKey=equippedHat?('dress-'+t.id+'-'+equippedHat):null;
  const useDress=!!(dressKey&&has(dressKey));
  const bodyKey=useDress?dressKey:key;
  ctx.save(); ctx.translate(FRIEND_POS.x,FRIEND_POS.y+bob);
  ctx.rotate(giggle); ctx.scale(squishX*breathe,squishY*breathe);
  if(has(bodyKey)){ const im=IMG[bodyKey].img, hgt=460, w=hgt*(im.naturalWidth/im.naturalHeight||0.8);
    groundShadow(0,hgt*0.42,w*0.32,hgt*0.05,0.22,0.5);
    ctx.drawImage(im,-w/2,-hgt/2,w,hgt);
  } else { groundShadow(0,190,150,32,0.22,0.5); ph_face(t,0,0,220); }
  // happy closed-eye face during the pet squash — universal, wordless "aww!" cue (no dedicated art rig)
  if(F.petT>0){
    ctx.save(); ctx.globalAlpha=Math.sin(pt*Math.PI);
    ctx.strokeStyle='#5a3d24'; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(-38,-10,20,0.15,Math.PI-0.15); ctx.stroke();
    ctx.beginPath(); ctx.arc(38,-10,20,0.15,Math.PI-0.15); ctx.stroke();
    ctx.fillStyle='#FF9DB6'; ctx.beginPath(); ctx.arc(-52,26,14,0,7); ctx.arc(52,26,14,0,7); ctx.fill();
    ctx.restore();
  }
  // Zaza's feed blush — her feed "reaction" plays entirely as this + the drifting heart-puffs overlay
  if(t.id==='heart' && F.feedAnim && F.feedAnim.t>=0.58){
    const bp=Math.min(1,(F.feedAnim.t-0.58)/0.5);
    ctx.save(); ctx.globalAlpha=Math.sin(bp*Math.PI)*0.8;
    ctx.fillStyle='#FF6B9C'; ctx.beginPath(); ctx.arc(-52,26,15,0,7); ctx.arc(52,26,15,0,7); ctx.fill(); ctx.restore();
  }
  ctx.restore();

    const fall=dp!=null ? -120*(1-easeOutBack(Math.min(1,dp/0.66))) : 0;   // drops in from above, lands with overshoot
    const landSquash=F.hatLandT!=null ? 1-0.12*F.hatLandT : 1;             // quick squash the instant it lands
    const hy=FRIEND_POS.y+bob-HAT_Y[t.id]*squishY+fall;                    // *squishY so the hat rides the head down
    ctx.save(); ctx.translate(FRIEND_POS.x,hy); ctx.scale(HAT_SCALE[t.id]||1,(HAT_SCALE[t.id]||1)*landSquash);
    drawPoppuHat(0,0,170,hatId);

/* the fed item's own arc-flight into the friend's mouth (0-0.32s), then friend-specific overlay
   flourishes during the reaction beat: Orby's staged twinkles, Zaza's drifting heart-puffs, Wavey's
   ripple ring + splash, Puffy's soft drifting puffs. Peeky's spark is a one-shot burst (see update()). */
function drawFriendFeedAnim(){
  const F=friendScene; if(!F||!F.feedAnim) return;
  const A=F.feedAnim, t=A.t, id=F.type.id, mouth={x:FRIEND_POS.x,y:FRIEND_POS.y-40};
  if(t<0.32){
    const p=t/0.32, e=p*p;   // easeIn
    const x=A.from.x+(mouth.x-A.from.x)*e, y=A.from.y+(mouth.y-A.from.y)*e;
    ctx.save(); ctx.translate(x,y); ctx.scale(1-0.3*e,1-0.3*e); glyphIcon(A.icon,0,0,84,'#FFD15C','#E3A93E'); ctx.restore();
  }
  if(id==='drop' && t>=0.32 && t<0.90){
    const rp=(t-0.32)/0.58, r=20+rp*140;
    ctx.save(); ctx.globalAlpha=Math.max(0,1-rp); ctx.strokeStyle=FRIEND_FLAIR.drop.col; ctx.lineWidth=5;
    ctx.beginPath(); ctx.ellipse(FRIEND_POS.x,FRIEND_POS.y+170,r,r*0.35,0,0,7); ctx.stroke(); ctx.restore();
  } else if(id==='moon' && t>=0.72 && t<1.2){
    for(let i=0;i<3;i++){ const ph=t-0.72-i*0.16; if(ph>0&&ph<0.5){ const e=easeOutBack(Math.min(1,ph/0.3)), fade=Math.max(0,1-ph/0.5);
      ctx.save(); ctx.globalAlpha=fade; drawIcon('star',FRIEND_POS.x+(i-1)*70,FRIEND_POS.y-220-i*18,30*Math.max(0,e),'#FFF3C4','#E6DBFF'); ctx.restore(); } }
  } else if(id==='heart' && t>=0.58 && t<1.3){
    for(let i=0;i<3;i++){ const ph=t-0.58-i*0.22; if(ph>0&&ph<0.7){ const rise=ph/0.7;
      ctx.save(); ctx.globalAlpha=Math.max(0,1-rise); drawIcon('heart',FRIEND_POS.x+(i-1)*36,FRIEND_POS.y-140-rise*90,26,FRIEND_FLAIR.heart.col,'#F06A8E'); ctx.restore(); } }
  } else if(id==='cloud' && t>=0.58 && t<1.3){
    const pp=t-0.58;
    for(let i=0;i<2;i++){ const ph=pp-i*0.3; if(ph>0){ const fade=Math.max(0,1-ph*1.4);
      ctx.save(); ctx.globalAlpha=fade*0.7; drawIcon('cloud',FRIEND_POS.x+(i?70:-70),FRIEND_POS.y-160-ph*60,40,'#fff',FRIEND_FLAIR.cloud.col); ctx.restore(); } }
  }
}

function pickPackage(sx,sy){
  for(let i=packages.length-1;i>=0;i--){ const p=packages[i]; if(p.state==='delivering'||p.state==='sentoff') continue;
    if(Math.abs(sx-p.x)<PKG_S*0.62&&Math.abs(sy-p.y)<PKG_S*0.62) return p; }
  return null;
}

const START_BTNS=()=>{ const y=742,w=300,h=98,gap=34,total=3*w+2*gap,x0=W/2-total/2;
  return [{id:'levels',x:x0,y,w,h},{id:'shop',x:x0+w+gap,y,w,h},{id:'stickers',x:x0+2*(w+gap),y,w,h}]; };

function cycleVolume(){ SAVE.volume=(SAVE.volume+2)%3; Audio_.setVolume(SAVE.volume); persist(); Audio_.pop(); }
function startLongPress(px,py){ cancelLongPress(); pressPx=px; pressPy=py; const armedState=state;
  // only open the gate if we're STILL on the same screen the hold began on — prevents an orphaned timer
  // from popping the dashboard mid-play if a quick tap in TOWN (Poppu's hit-box overlaps the Wrap Shop
  // doorway) armed the hold and then immediately changed scene (QA: unprompted parent-dashboard pop).
  longPressTimer=setTimeout(()=>{ longPressTimer=null; if(state===armedState){ parentOpen=true; Audio_.pop(); } }, 3000); }
function cancelLongPress(){ if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer=null; } }
function handleParentTap(px,py){
  if(dist(px,py,PARENT_CLOSE.x,PARENT_CLOSE.y)<PARENT_CLOSE.r+8){ parentOpen=false; Audio_.pop(); return; }
  if(inRect(px,py,PARENT_VOL())){ cycleVolume(); return; }
  if(!inRect(px,py,PARENT_PANEL)){ parentOpen=false; Audio_.pop(); }
}
function favoriteChar(){
  const cd=SAVE.charDeliveries||{}; let best=null, bestN=0;
  for(const t of TYPES){ const n=cd[t.id]||0; if(n>bestN){ bestN=n; best=t; } }
  return best;
}

function levelNodes(){
  const nodes=[]; const cols=5, cw=300, ch=300, gx=(W-cols*cw)/2+cw/2, gy=360;
  for(let i=0;i<LEVELS.length;i++){ const r=Math.floor(i/cols), c=i%cols;
    const cc=(r%2===0)?c:(cols-1-c);
    nodes.push({ n:i+1, x:gx+cc*cw, y:gy+r*ch, rad:96 }); }
  return nodes;
}
function shopTabRects(){ const w=300,h=84,y=150,gap=24,x0=W/2-(2*w+gap)/2;
  return [{id:'upgrade',x:x0,y,w,h},{id:'cosmetic',x:x0+w+gap,y,w,h}]; }
