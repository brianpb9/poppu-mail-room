function doneBtns(){ const y=760,w=280,h=110,gap=40,total=3*w+2*gap,x0=W/2-total/2;
  return [{id:'replay',x:x0,y,w,h},{id:'next',x:x0+w+gap,y,w,h},{id:'home',x:x0+2*(w+gap),y,w,h}]; }
function stampTray(){ const y=602,r=86,gap=230, cx=STATION.x;
  return [ {x:cx-gap,y,r}, {x:cx,y,r}, {x:cx+gap,y,r} ]; }

function onDown(cx,cy){
  Audio_.resume();
  const p=toStage(cx,cy);
  if(parentOpen){ handleParentTap(p.x,p.y); return; }
  if(state==='START'){
    if(poppuHit(p.x,p.y)) startLongPress(p.x,p.y);
    if(dist(p.x,p.y,PLAYBTN.x,PLAYBTN.y)<PLAYBTN.r){ enterTown(); return; }
    for(const b of START_BTNS()) if(inRect(p.x,p.y,b)){
      if(b.id==='levels'){ state='LEVELMAP'; Audio_.pop(); }
      else if(b.id==='shop'){ state='SHOP'; shopTab='upgrade'; Audio_.pop(); }
      else if(b.id==='stickers'){ state='STICKER'; Audio_.pop(); } return; }
    for(const r of SCENE_BTNS()) if(inRect(p.x,p.y,r)){ if(sceneUnlocked(r.S.id)){ setScene(r.S.id); Audio_.pop(); } else Audio_.locked(); return; }
    return;
  }
  if(state==='LEVELMAP'){
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ state='START'; return; }
    for(const nd of levelNodes()) if(dist(p.x,p.y,nd.x,nd.y)<nd.rad){
      if(levelUnlocked(nd.n)) startLevel(nd.n); else Audio_.locked(); return; }
    return;
  }
  if(state==='SHOP'){
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ state='START'; return; }
    for(const t of shopTabRects()) if(inRect(p.x,p.y,t)){ shopTab=t.id; Audio_.pop(); return; }
    if(shopTab==='upgrade'){ for(const c of upgradeCards()) if(inRect(p.x,p.y,c)){ buyUpgrade(c.u); return; } }
    else { for(const r of shopCatRects()) if(inRect(p.x,p.y,r)){ shopCat=r.c; Audio_.pop(); return; }
      for(const c of cosmeticCards()) if(inRect(p.x,p.y,c)){ buyOrEquip(c.c); return; } }
    return;
  }
  if(state==='STICKER'){ if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r) state='START'; return; }
  if(state==='LEVELDONE'){
    for(const b of doneBtns()) if(inRect(p.x,p.y,b)){
      if(b.id==='next'){ advanceFromLevelDone(); return; }
      if(b.id==='replay'){ startLevel(currentLevel); return; }
      state='START'; return; }
    return;
  }
  if(state==='TOWN'){
    if(townTransition) return;   // brief, non-interruptible zoom-push already in flight
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ leaveTown(); return; }
    if(poppuHit(p.x,p.y)) startLongPress(p.x,p.y);   // 3s hold on Poppu -> parent gate (mirrors START/PLAYING; honors the dashboard promise)
    // iterate FRONT-to-back (reverse draw order) so a nearer building wins a tap in any overlap zone
    for(let i=TOWN_ORDER.length-1;i>=0;i--){ const id=TOWN_ORDER[i];
      if(inRect(p.x,p.y,buildingHitRect(TOWN_BUILDINGS[id]))){ handleBuildingTap(id); return; } }
    return;
  }
  if(state==='WRAP'){
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ leaveWrap(); return; }
    if(!wrapBox) return;   // ship-flight in progress (wrapBox is null between startWrapShip and finalizeWrapShip) — graceful no-op
    if(wrapBox.acted && dist(p.x,p.y,WRAP_SHIP_BTN.x,WRAP_SHIP_BTN.y)<WRAP_SHIP_BTN.r){ startWrapShip(); return; }
    { const r=WRAP_RIBBON_STRIP;
      if(Math.abs(p.x-r.x)<r.w/2 && Math.abs(p.y-r.y)<r.h/2){ wrapRibbonSwipe={x0:p.x,dx:0}; return; } }
    for(const st of wrapStickerTray()){ if(dist(p.x,p.y,st.x,st.y)<st.r){ applyWrapSticker(st.icon); return; } }
    if(dist(p.x,p.y,WRAP_BOX_POS.x,WRAP_BOX_POS.y)<170){ cycleWrapColor(); return; }
    return;
  }
  if(state==='FRIEND'){
    if(dist(p.x,p.y,BACKBTN.x,BACKBTN.y)<BACKBTN.r){ leaveFriend(); return; }
    for(const it of friendItemTray()){ if(dist(p.x,p.y,it.x,it.y)<it.r){ friendDragItem={kind:'item',icon:it.icon,x:p.x,y:p.y}; return; } }
    for(const h of friendHatTray()){ if(dist(p.x,p.y,h.x,h.y)<h.r){ friendDragItem={kind:'hat',id:h.id,x:p.x,y:p.y}; return; } }
    if(dist(p.x,p.y,FRIEND_POS.x,FRIEND_POS.y)<230){ petFriend(); return; }
    return;
  }
  if(state==='DRIVE'){
    if(dist(p.x,p.y,HOMEBTN.x,HOMEBTN.y)<HOMEBTN.r){ Audio_.stopTruck(); Audio_.setMusicRoot(SCENES[currentScene].music.root); drive=null; state='START'; floatTexts=[]; popups=[]; return; }
    if(tryCatchFloaterAt(p.x,p.y)) return;   // biome finger-toy tap wins over steer (discrete, air-layer)
    if(drive && !drive.arriving) drive.dragActiveX=p.x;
    return;
  }
  if(state==='PLAYING'){
    // FIX6: tap anywhere during the star-tally beat (after a short grace) to skip straight to the drive
    if(levelDone && clearBeatT>0.4){ clearBeatT=-1; startDrive(); return; }
    if(dist(p.x,p.y,HOMEBTN.x,HOMEBTN.y)<HOMEBTN.r){ state='START'; Audio_.setHum(false); return; }
    if(dist(p.x,p.y,VOLBTN.x,VOLBTN.y)<VOLBTN.r){ cycleVolume(); return; }
    if(poppuHit(p.x,p.y)){ startLongPress(p.x,p.y); return; }
    if(activeTask){
      if(activeTask.kind==='seal' && !activeTask.done){
        if(Math.abs(p.x-STATION.x)<190 && Math.abs(p.y-STATION.y)<130){ sealSwipe={x0:p.x, dx:0}; return; }
      } else if(activeTask.kind==='stamp' && !activeTask.stamped){
        const tray=stampTray();
        for(let i=0;i<3;i++){ if(dist(p.x,p.y,tray[i].x,tray[i].y)<tray[i].r){
          if(activeTask.opts[i]===activeTask.want) resolveStamp();
          else { Audio_.aww(); activeTask.flash=0.4; } return; } }   // no-penalty "aww, try again" — never a boop-fail
      } else if(activeTask.kind==='shake' && !activeTask.sorted){
        if(Math.abs(p.x-STATION.x)<230 && Math.abs(p.y-STATION.y)<170){
          activeTask.taps++; Audio_.rattle(); for(const it of activeTask.items){ it.ox+=(Math.random()-0.5)*30; it.oy+=(Math.random()-0.5)*20; }
          if(activeTask.taps>=3) resolveShake(); return; }
      }
    }
    const pk=pickPackage(p.x,p.y);
    if(pk){ if(dragging && dragging!==pk){ dragging.state='returning'; dragging.scale=1; }
      dragging=pk; pk.state='dragging'; dragDX=p.x-pk.x; dragDY=p.y-pk.y; pk.scale=1.14; Audio_.pop(); }
  }
}
function onMove(cx,cy){
  const p=toStage(cx,cy);
  if(state==='DRIVE'){ if(drive && drive.dragActiveX!=null && !drive.arriving) drive.dragActiveX=p.x; return; }
  if(state==='WRAP'){
    if(wrapRibbonSwipe){ wrapRibbonSwipe.dx=p.x-wrapRibbonSwipe.x0;
      wrapBox.ribbonProg=Math.max(0,Math.min(1,wrapRibbonSwipe.dx/220));
      if(wrapRibbonSwipe.dx>200){ applyWrapRibbon(); wrapRibbonSwipe=null; } }
    return;
  }
  if(state==='FRIEND'){ if(friendDragItem){ friendDragItem.x=p.x; friendDragItem.y=p.y; } return; }
  if(longPressTimer && dist(p.x,p.y,pressPx,pressPy)>28) cancelLongPress();
  if(sealSwipe && activeTask && activeTask.kind==='seal' && !activeTask.done){
    sealSwipe.dx=p.x-sealSwipe.x0; activeTask.prog=Math.max(0,Math.min(1,sealSwipe.dx/220));
    if(sealSwipe.dx>200){ resolveSeal(); sealSwipe=null; }
    return;
  }
  if(!dragging) return;
  dragging.x=p.x-dragDX; dragging.y=p.y-dragDY;
  const b=boxAt(dragging.x,dragging.y); const id=b?b.type.id:null;
  if(id!==hoverType){ hoverType=id; if(b) Audio_.slide(); }
}
function onUp(cx,cy){
  if(state==='DRIVE'){ if(drive) drive.dragActiveX=null; return; }
  if(state==='WRAP'){ if(wrapRibbonSwipe){ wrapRibbonSwipe=null; if(wrapBox) wrapBox.ribbonProg=wrapBox.ribbon?1:0; } return; }
  if(state==='FRIEND'){
    if(friendDragItem){
      const p=toStage(cx,cy);
      if(dist(p.x,p.y,FRIEND_POS.x,FRIEND_POS.y)<260){
        if(friendDragItem.kind==='item') feedFriend(friendDragItem.icon,{x:friendDragItem.x,y:friendDragItem.y}); else dressFriend(friendDragItem.id);
      }
      friendDragItem=null;
    }
    return;
  }
  cancelLongPress();
  if(sealSwipe){ sealSwipe=null; if(activeTask&&activeTask.kind==='seal') activeTask.prog=0; }
  if(!dragging) return;
  const b=boxAt(dragging.x,dragging.y);
  if(b && b.type.id===dragging.type.id){ deliver(dragging,b); }
  else { dragging.state='returning'; mistakesThisLevel++;
    if(hasUp('autoSorter')) Audio_.slide(); else Audio_.boop();
    burst(dragging.x,dragging.y,'#cbb',8,4); }
  dragging.scale=1; dragging=null; hoverType=null;
}

/* buy handlers */
function buyUpgrade(u){
  if(hasUp(u.id)){ Audio_.boop(); return; }
  if((SAVE.stamps||0)>=u.cost){ SAVE.stamps-=u.cost; SAVE.upgrades[u.id]=true; Audio_.buy(); persist();
    floatTexts.push({x:W/2,y:660,text:u.name+'!',t:0,color:'#5FB985',big:true}); }
  else Audio_.boop();
}
function buyOrEquip(c){
  if(owns(c.id)){ SAVE.equipped[c.cat]=(SAVE.equipped[c.cat]===c.id)?null:c.id; Audio_.pop(); persist(); return; }
  if((SAVE.stamps||0)>=c.cost){ SAVE.stamps-=c.cost; SAVE.owned[c.id]=true; SAVE.equipped[c.cat]=c.id; Audio_.buy(); persist();
    floatTexts.push({x:W/2,y:660,text:'Got '+c.name+'!',t:0,color:'#B79BEA',big:true}); }
  else Audio_.boop();
}

/* single-pointer ownership: the FIRST finger down owns the interaction; a second finger touching a
   different package (or anywhere) is ignored until the first lifts — so a 2-finger touch can no longer
   force the first drag to snap back / hand control to the wrong package (QA: pointerId mis-resolve).
   Cleared on up/cancel/blur so it can never wedge. __t hooks call onDown/Move/Up directly, unaffected. */
let activePointerId=null;
canvas.addEventListener('pointerdown',e=>{ e.preventDefault();
  if(activePointerId!==null && e.pointerId!==activePointerId) return;
  activePointerId=e.pointerId; try{canvas.setPointerCapture(e.pointerId);}catch(_){} onDown(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointermove',e=>{ e.preventDefault();
  if(activePointerId!==null && e.pointerId!==activePointerId) return; onMove(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointerup',e=>{ e.preventDefault();
  if(activePointerId!==null && e.pointerId!==activePointerId) return; activePointerId=null; onUp(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointercancel',e=>{ if(e&&e.pointerId===activePointerId) activePointerId=null; if(dragging){ dragging.state='returning'; dragging.scale=1; dragging=null; hoverType=null; } sealSwipe=null; wrapRibbonSwipe=null; friendDragItem=null; if(drive) drive.dragActiveX=null; cancelLongPress(); });
window.addEventListener('blur',()=>{ activePointerId=null; if(dragging){ dragging.state='returning'; dragging.scale=1; dragging=null; hoverType=null; } sealSwipe=null; wrapRibbonSwipe=null; friendDragItem=null; if(drive) drive.dragActiveX=null; cancelLongPress(); });
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ Audio_.suspend();   // swipe-up / background → kill the music+hum+ambience
    if(dragging){ dragging.state='returning'; dragging.scale=1; dragging=null; hoverType=null; } }
  else { Audio_.resume(); }                  // back to foreground → bring audio back
});
window.addEventListener('pagehide',()=>{ Audio_.suspend(); });   // iOS swipe-up-to-home fires pagehide, not always visibilitychange
window.addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});
let lastShake=0;
function onDeviceMotion(e){
  if(state!=='PLAYING'||!activeTask||activeTask.kind!=='shake'||activeTask.sorted) return;
  const a=e.accelerationIncludingGravity; if(!a) return;
  const mag=Math.abs(a.x||0)+Math.abs(a.y||0)+Math.abs(a.z||0);
  if(mag>32 && time-lastShake>0.25){ lastShake=time; activeTask.taps++; Audio_.rattle();
    for(const it of activeTask.items){ it.ox+=(Math.random()-0.5)*40; it.oy+=(Math.random()-0.5)*24; }
    if(activeTask.taps>=3) resolveShake(); }
}
/* FIX6 (parent/functional — iOS 13+): DeviceMotionEvent is gated behind an explicit permission prompt
   that MUST be requested synchronously inside a real user-gesture handler, or Safari silently denies
   it forever. Feature-detected so desktop/Android (which have no such gate) behave exactly as before —
   they just addEventListener immediately, no prompt, no behavior change. Shake-sort ALWAYS has a
   tap-fallback (see onDown's activeTask.kind==='shake' branch) so a denied/skipped prompt never
   breaks the mechanic, it just falls back to tap-only. */
let motionPermissionRequested=false;
function ensureMotionPermission(){
  if(motionPermissionRequested) return;
  motionPermissionRequested=true;
  if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(resp=>{
      if(resp==='granted') window.addEventListener('devicemotion', onDeviceMotion);
    }).catch(()=>{ /* denied/unsupported — tap-fallback still fully sorts the task */ });
  } else {
    window.addEventListener('devicemotion', onDeviceMotion);
  }
}

/* ------------------------------------------------------------- UPDATE */
function update(dt){
  time+=dt;
  // FIX5: LEVELDONE entry detection is state-transition based (not tied to one call site) so it's
  // robust to every path that can land on LEVELDONE — the normal Drive hand-off, a QA hook jumping
  // state directly, or any future entry point — the celebration always fires exactly once and the
  // ~3.5s non-reader auto-advance timer always starts fresh.
  if(state==='LEVELDONE' && prevState!=='LEVELDONE'){ doneScreenT=0; doneCelebrated=false; }
  prevState=state;
  if(state==='LEVELDONE'){
    if(!doneCelebrated) triggerLevelDoneCelebration();
    doneScreenT+=dt;
    if(doneScreenT>=3.5) advanceFromLevelDone();
  }
  // FIX6: drive the level-clear star tally beat, then hand off into the Delivery Drive.
  if(state==='PLAYING' && levelDone && clearBeatT>=0){
    clearBeatT+=dt;
    const sc=doneScreen?doneScreen.stars:0;
    const shown=Math.max(0,Math.min(sc, Math.floor((clearBeatT-0.35)/0.42)+1));
    if(shown>clearBeatStars){ clearBeatStars=shown; Audio_.pop(); }   // a cheerful blip per star as it lands
    if(clearBeatT>=CLEAR_BEAT_DUR){ clearBeatT=-1; if(state==='PLAYING') startDrive(); }
  } else if(state!=='PLAYING' && clearBeatT>=0){ clearBeatT=-1; }   // child left mid-beat — cancel cleanly
  if(poppuCelebrateT>0) poppuCelebrateT=Math.max(0,poppuCelebrateT-dt);
  for(let i=0;i<6;i++) if(boxBounce[i]>0) boxBounce[i]=Math.max(0,boxBounce[i]-dt*2.4);
  if(activeTask){ activeTask.t+=dt; if(activeTask.flash>0) activeTask.flash=Math.max(0,activeTask.flash-dt); }
  if(tutorial && tutorial.fading){ tutorial.ft+=dt; if(tutorial.ft>0.6) tutorial=null; }
  if(wrapQueueBounce>0) wrapQueueBounce=Math.max(0,wrapQueueBounce-dt*2.5);
  if(wrapBoxPopT!=null){ wrapBoxPopT=Math.max(0,wrapBoxPopT-dt*3.3); if(wrapBoxPopT<=0) wrapBoxPopT=null; }
  if(wrapCinchT!=null){ wrapCinchT=Math.max(0,wrapCinchT-dt*2.4); if(wrapCinchT<=0) wrapCinchT=null; }
  if(wrapBowT!=null){ wrapBowT=Math.max(0,wrapBowT-dt*2.4); if(wrapBowT<=0) wrapBowT=null; }
  if(wrapStampT!=null){ wrapStampT=Math.max(0,wrapStampT-dt*2.9); if(wrapStampT<=0) wrapStampT=null; }
  if(wrapSpawnT!=null){ wrapSpawnT+=dt; if(wrapSpawnT>=0.30) wrapSpawnT=null; }
  if(wrapShipBounceT!=null){ wrapShipBounceT+=dt; if(wrapShipBounceT>=0.3) wrapShipBounceT=null; }
  if(wrapBox && !wrapBox.ribbon && !wrapRibbonSwipe && wrapBox.ribbonProg>0) wrapBox.ribbonProg=Math.max(0,wrapBox.ribbonProg-dt*4);   // A5 spring-back
  if(wrapShipAnim){ wrapShipAnim.t+=dt; if(wrapShipAnim.t>=0.90 && !wrapShipAnim.landed){ finalizeWrapShip(); wrapShipAnim=null; } }

  if(friendPetCooldown>0) friendPetCooldown=Math.max(0,friendPetCooldown-dt);
  if(friendHeartFlash>0){ friendHeartFlash=Math.max(0,friendHeartFlash-dt*1.5); if(friendHeartFlash<=0) friendHeartNewIdx=null; }
  if(friendScene){
    const F=friendScene, flair=FRIEND_FLAIR[F.type.id];
    if(F.greetT!=null){
      F.greetT+=dt;
      // guarded by state==='FRIEND' so a toddler mashing "back" within the first ~0.65s can never make
      // the gift-pop/confetti/stamps fire over whatever scene they've already moved on to — it simply
      // stays pending (giftPending is recomputed fresh, safely, on the next enterFriend) and fires then.
      if(F.giftPending && F.greetT>=0.65 && state==='FRIEND') checkFriendGift();
      if(F.greetT>1.3) F.greetT=null;
    }
    if(F.petT>0){ F.petT+=dt; if(F.petT>flair.petDur) F.petT=0; }
    if(F.feedAnim){
      F.feedAnim.t+=dt;
      if(!F.feedAnim.reacted && F.feedAnim.t>=0.58){
        F.feedAnim.reacted=true;
        if(F.type.id==='gear') burst(FRIEND_POS.x,FRIEND_POS.y-260,flair.col,10,5);        // Peeky's spark
        else if(F.type.id==='drop') burst(FRIEND_POS.x,FRIEND_POS.y+130,flair.col,12,6);   // Wavey's splash
      }
      if(F.feedAnim.t>1.6) F.feedAnim=null;
    }
    if(F.hatDropT!=null){
      F.hatDropT=Math.max(0,F.hatDropT-dt*2.2);
      if(F.hatDropT<=0){
        if(!F.hatLanded){ F.hatLanded=true; F.hatLandT=1;
          burst(FRIEND_POS.x,FRIEND_POS.y-(HAT_Y[F.type.id]||200),'#fff3c4',10,4); }
        F.hatDropT=null;
      }
    }
    if(F.hatLandT!=null){ F.hatLandT=Math.max(0,F.hatLandT-dt*4.5); if(F.hatLandT<=0) F.hatLandT=null; }
  }

  if(state==='TOWN'){
    if(buildingSqueeze){ buildingSqueeze.t+=dt; if(buildingSqueeze.t>0.26) buildingSqueeze=null; }
    if(poppuPoint){ poppuPoint.t+=dt; if(poppuPoint.t>0.9) poppuPoint=null; }
    if(lockedPulse){ lockedPulse.t+=dt; if(lockedPulse.t>0.9) lockedPulse=null; }
    if(teasePulse){ teasePulse.t+=dt; if(teasePulse.t>0.7) teasePulse=null; }
    for(const id in newBadgeAnimState){ newBadgeAnimState[id].t+=dt; if(newBadgeAnimState[id].t>0.5) delete newBadgeAnimState[id]; }
    if(townTransition){
      townTransition.t+=dt;
      if(townTransition.t>=0.55 && !townTransition.fired){
        townTransition.fired=true;
        const tgt=townTransition.target; townTransition=null;
        if(tgt==='post') startLevel(Math.min(SAVE.maxLevel,LEVELS.length));
      }
    }
  }
  if(state==='DRIVE') updateDrive(dt);
  for(const a of ambient){ a.x+=a.vx*dt; a.y+=a.vy*dt; a.ph+=dt;
    if(a.kind==='leaf'){ a.x+=Math.sin(a.ph*1.4)*18*dt; if(a.y>H+20){ a.y=-20; a.x=Math.random()*W; } }
    else { if(a.x<-20)a.x=W+20; if(a.x>W+20)a.x=-20; if(a.y<-20)a.y=H+20; if(a.y>H+20)a.y=-20; } }

  if(state==='PLAYING' && !levelDone){
    shuffleActive = !!curLevel().mech.shuffle;
    const beltSpeed=curLevel().speed * (hasUp('speedBelt')?1.2:1);
    spawnTimer-=dt;
    for(const p of packages){
      if(p.state==='belt'){ p.x+=beltSpeed*dt; p.y=BELT.y-20+Math.sin(time*2+p.wob)*4;
        // FIX (P0 soft-lock #1/#2): a no-fail conveyor must NEVER lose a package. It used to be
        // deleted at the belt end while spawnedThisLevel still counted it — stranding the level
        // permanently at e.g. 7/8 or 9/10 whenever the toddler missed even one. Now the package
        // simply loops back to the belt start and keeps coming around until it's delivered, so
        // deliveredThisLevel can always reach the target and the level is ALWAYS completable.
        if(p.x>BELT.x2+150){ p.x=BELT.x1-40; p.wob=Math.random()*7; } }
      else if(p.state==='sentoff'){ p.offT=(p.offT||0)+dt; p.x+=beltSpeed*dt*1.4; p.scale=Math.max(0,1-p.offT*3); }
      else if(p.state==='returning'){ const ty=BELT.y-20; p.y+=(ty-p.y)*Math.min(1,dt*8);
        const tx=Math.max(BELT.x1,Math.min(BELT.x2,p.x)); p.x+=(tx-p.x)*Math.min(1,dt*8);
        if(Math.abs(p.y-ty)<3) p.state='belt'; }
      else if(p.state==='delivering'){ p.tState=(p.tState||0)+dt;
        p.x+=(p.dtx-p.x)*Math.min(1,dt*12); p.y+=(p.dty-24-p.y)*Math.min(1,dt*12); p.scale=Math.max(0,1-p.tState*2.2); }
    }
    // safety: any package orphaned in 'dragging' (multi-touch / lost pointerup) returns to the belt — never deadlock
    for(const p of packages){ if(p.state==='dragging' && p!==dragging){ p.state='returning'; p.scale=1; } }
    packages=packages.filter(p=>!(p.state==='sentoff'&&p.scale<=0.02));
    const beltCap=curLevel().mech.multi?3:2;
    const beltActive=packages.filter(p=>p.state==='belt'||p.state==='returning'||p.state==='dragging').length;
    if(!activeTask && spawnedThisLevel<curLevel().pkgs && beltActive<beltCap && spawnTimer<=0){
      beginNextTask(); spawnTimer=curLevel().mech.multi?0.6:0.9;
    }
    // "party" levels: gentle decorative confetti drifting down — purely festive, never blocks play
    if(curLevel().mech.distract && Math.random()<dt*3){
      const cols=['#FF9DB6','#8ECFEC','#FFD15C','#B79BEA','#98D7B4'];
      particles.push({x:Math.random()*W, y:-20, vx:(Math.random()-0.5)*2, vy:1.5+Math.random()*1.5,
        life:2.2, color:cols[(Math.random()*cols.length)|0], size:9+Math.random()*7,
        rot:Math.random()*7, vr:(Math.random()-0.5)*0.3, shape:'rect', grav:0.05});
    }
  }
  for(const pt of particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=(pt.grav||0.4); pt.vx*=0.99; pt.rot+=pt.vr; pt.life-=dt*(pt.shape==='rect'?0.6:1.4); }
  particles=particles.filter(p=>p.life>0);
  for(const pu of popups) pu.t+=dt; popups=popups.filter(p=>p.t<1.7);
  for(const ft of floatTexts) ft.t+=dt; floatTexts=floatTexts.filter(f=>f.t<1.4);
}

function drawAmbient(){
  for(const a of ambient){ ctx.save(); ctx.translate(a.x,a.y);
    if(a.kind==='star'){ const tw=0.5+0.5*Math.abs(Math.sin(a.ph*2)); ctx.globalAlpha=tw*0.9;
      ctx.fillStyle=a.col; ctx.beginPath(); ctx.arc(0,0,a.sz*(0.6+tw*0.5),0,7); ctx.fill(); }
    else if(a.kind==='leaf'){ ctx.rotate(a.ph); ctx.globalAlpha=0.85; ctx.fillStyle=a.col;
      ctx.beginPath(); ctx.ellipse(0,0,a.sz*0.5,a.sz*0.28,0,0,7); ctx.fill(); }
    else { ctx.globalAlpha=0.25+0.2*Math.sin(a.ph*2); ctx.fillStyle=a.col; ctx.beginPath(); ctx.arc(0,0,a.sz*0.28,0,7); ctx.fill(); }

/* WORDLESS pill chrome (P1) — same rounded-pill fill/border/shadow as before (kept as the pill's
   colored-border "secondary cue" per ui-ux-designer spec), but the content slot is now an ICON
   renderer, not a text label. `content` is a function(cx,cy) that draws whatever glyph/thumbnail
   belongs in this pill, called with the pill's own center — every call site below supplies its own
   icon (glyphIcon/drawCategoryThumb/fitImage/etc.), so hit-rect geometry (r) is completely untouched. */
function pill(r,fill,strokeCol,strokeW,content,labelCol){
  ctx.save(); shadow(12,'rgba(0,0,0,0.14)',0,6); ctx.fillStyle=fill; rr(r.x,r.y,r.w,r.h,r.h/2); ctx.fill(); noShadow();
  // FIX 7b: crafted detail — a soft top gloss + an inner highlight border so the pill reads as a
  // tactile designed button, not a flat empty white capsule.
  ctx.save(); rr(r.x,r.y,r.w,r.h,r.h/2); ctx.clip();
  const gl=ctx.createLinearGradient(0,r.y,0,r.y+r.h*0.62);
  gl.addColorStop(0,'rgba(255,255,255,0.55)'); gl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gl; ctx.fillRect(r.x,r.y,r.w,r.h*0.62); ctx.restore();
  if(strokeW){ ctx.lineWidth=strokeW; ctx.strokeStyle=strokeCol; rr(r.x,r.y,r.w,r.h,r.h/2); ctx.stroke();
    const inw=strokeW*0.75; ctx.lineWidth=Math.max(1.5,strokeW*0.35); ctx.strokeStyle='rgba(255,255,255,0.7)';
    rr(r.x+inw,r.y+inw,r.w-inw*2,r.h-inw*2,(r.h-inw*2)/2); ctx.stroke(); }
  if(content) content(r.x+r.w/2,r.y+r.h/2,labelCol);
  ctx.restore();
}

function drawMailboxes(){
  const hint=curLevel().hint, mbSkin=equipped('mailbox'), scan=hasUp('scanner');
  const skinKey=mbSkin?'cos-'+mbSkin.replace(/_/g,'-'):null, skinReady=skinKey&&has(skinKey);
  for(const b of activeBoxes()){ const type=b.type, i=b.typeIdx;
    const hovered=hoverType===type.id;
    let glow=0;
    if(dragging && hovered && dragging.type.id===type.id) glow=1+Math.sin(time*10)*0.3;
    else if(dragging && dragging.type.id===type.id) glow=0.4+Math.sin(time*6)*0.18;
    if(scan && dragging && dragging.type.id===type.id) glow=Math.max(glow,0.7+Math.sin(time*8)*0.2);
    const bn=boxBounce[i], pop=bn>0?Math.sin((1-bn)*Math.PI)*0.14:0;
    const sx=1+pop*0.4, sy=1-pop*0.4;
    // FIX 3: replaced the big translucent colored disc (which made each box read as floating on a puck)
    // with a soft grounding contact shadow under the box, so it sits ON the floor.
    ctx.save(); ctx.globalAlpha=0.18; ctx.fillStyle='#3a2a18'; ctx.beginPath(); ctx.ellipse(b.x,b.y+b.h*0.44,b.w*0.40,b.h*0.10,0,0,7); ctx.fill(); ctx.restore();
    if(!skinReady) mailboxSkinRing(b, mbSkin);   // procedural ring is fallback-only once the real skin art has landed
    ctx.save(); ctx.translate(b.x,b.y+(glow>0.6?-6:0)); ctx.scale(sx,sy);
    if(glow>0) shadow(46*glow,type.deep);
    const s=b.w*(1+(hovered&&glow>0.6?0.05:0));
    if(skinReady){
      ctx.drawImage(IMG[skinKey].img,-s/2,-s/2,s,s);
      // the skin reskins the BODY, so overlay the type's own identity glyph on top — kids still need
      // to tell the 6 boxes apart at a glance no matter which cosmetic is equipped (never a regression).
      noShadow(); if(!uiIcon(type.icon,0,-s*0.02,s*0.28)) drawIcon(type.icon,0,-s*0.02,s*0.28,type.deep,'#5a3d24');
    } else if(has('mailbox_'+type.id)) ctx.drawImage(IMG['mailbox_'+type.id].img,-s/2,-s/2,s,s);
    else ph_mailbox(type,0,0,b.w*0.9,glow);
    noShadow(); ctx.restore();
    drawBoxTag(b,hint);
  }
}
function drawBoxTag(b,hint){
  // FIX 3: seat the label bauble ONTO the box — lowered so it rests on the roof, plus a short mounting
  // neck + base plate so it reads as a badge pinned to the mailbox, never a disc hovering above it.
  const tx=b.x, ty=b.y-b.h*0.47, r=b.w*0.17, type=b.type;
  const neckTop=ty+r*0.55, neckBot=b.y-b.h*0.30;
  if(neckBot>neckTop){ ctx.save(); shadow(6,'rgba(0,0,0,0.14)',0,3);
    ctx.fillStyle='#fffdf6'; ctx.strokeStyle=type.deep; ctx.lineWidth=r*0.13;
    const nw=r*0.5; rr(tx-nw/2,neckTop,nw,neckBot-neckTop,nw*0.4); ctx.fill(); noShadow(); ctx.stroke();
    // base plate where the neck meets the box
    ctx.fillStyle=type.deep; ctx.beginPath(); ctx.ellipse(tx,neckBot,r*0.5,r*0.16,0,0,7); ctx.fill(); ctx.restore(); }
  ctx.save(); shadow(10,'rgba(0,0,0,0.14)',0,4); ctx.fillStyle='#fffdf6'; ctx.beginPath(); ctx.arc(tx,ty,r,0,7); ctx.fill(); noShadow();
  ctx.lineWidth=r*0.16; ctx.strokeStyle=type.deep; ctx.stroke();
  if(hint==='color'){ // saturated mid→deep chip (never light-on-white, which read as an empty ring) + a soft top gloss
    const cg=ctx.createLinearGradient(tx,ty-r,tx,ty+r); cg.addColorStop(0,type.mid); cg.addColorStop(1,type.deep);
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(tx,ty,r*0.80,0,7); ctx.fill();
    ctx.lineWidth=r*0.12; ctx.strokeStyle=type.deep; ctx.stroke();
    ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle=type.light; ctx.beginPath(); ctx.ellipse(tx,ty-r*0.28,r*0.42,r*0.22,0,0,7); ctx.fill(); ctx.restore(); }
  else if(hint==='shape') glyphIcon(type.icon,tx,ty,r*1.25,type.mid,type.deep);
  else drawFaceCircle(type,tx,ty,r*0.9);
  ctx.restore();
}

function drawDailyBar(){
  // R4 #6: premium "Today's Mailbag" meter — a cozy cream pill, a raster heart badge in a soft pink
  // pocket, and a satisfying rounded fill (mint -> gold when done) with a gloss highlight + leading
  // knob. Replaces the flat thin heart + plain bar.
  const N=dailyGoal(), got=Math.min(SAVE.deliveredToday||0,N), done=SAVE.dailyGoalDone, frac=N>0?got/N:0;
  const x=40,y=36,h=74,w=452;
  ctx.save();
  // outer pill
  shadow(14,'rgba(90,61,36,0.18)',0,6); ctx.fillStyle='#FFFCF4'; rr(x,y,w,h,h/2); ctx.fill(); noShadow();
  ctx.lineWidth=3; ctx.strokeStyle='#F0DDB8'; rr(x,y,w,h,h/2); ctx.stroke();
  // heart badge in a soft pink pocket (pulses gently, bigger pop when the goal is done)
  const bx=x+h/2, by=y+h/2, br=h*0.42;
  const pulse=done?(1+0.10*Math.abs(Math.sin(time*3))):1;
  const pg=ctx.createRadialGradient(bx-br*0.3,by-br*0.3,br*0.2,bx,by,br);
  pg.addColorStop(0,'#FFE1EA'); pg.addColorStop(1,'#FFC6D6');
  ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(bx,by,br,0,7); ctx.fill();
  ctx.save(); ctx.translate(bx,by); ctx.scale(pulse,pulse);
  if(!(has('ic_heart') && (ctx.drawImage(IMG.ic_heart.img,-br*0.72,-br*0.72,br*1.44,br*1.44),true)))
    glyphIcon('heart',0,0,br*1.5,'#FF9DB6','#F06A8E');
  ctx.restore();
  // rounded track
  const tx=x+h+8, tw=w-h-96, th=28, ty=y+(h-th)/2;
  ctx.fillStyle='#EDE0C6'; rr(tx,ty,tw,th,th/2); ctx.fill();
  ctx.save(); ctx.globalAlpha=0.5; ctx.fillStyle='#dccba8'; rr(tx+3,ty+th*0.5,tw-6,th*0.42,th*0.25); ctx.fill(); ctx.restore();
  // fill (mint while working, warm gold when the daily goal is complete)
  const fw=Math.max(th, tw*frac);
  ctx.save(); rr(tx,ty,fw,th,th/2); ctx.clip();
  const g=ctx.createLinearGradient(tx,0,tx+tw,0);
  if(done){ g.addColorStop(0,'#FFDE86'); g.addColorStop(1,'#F4B14A'); } else { g.addColorStop(0,'#A6E0C0'); g.addColorStop(1,'#5FB985'); }
  ctx.fillStyle=g; ctx.fillRect(tx,ty,fw,th);
  // gloss highlight along the top of the fill
  ctx.globalAlpha=0.45; ctx.fillStyle='#ffffff'; rr(tx+4,ty+3,fw-8,th*0.34,th*0.2); ctx.fill();
  ctx.restore();
  // leading knob at the fill tip (satisfying "progress bead")
  if(frac>0.02 && frac<0.999){ const kx=tx+fw; ctx.save(); shadow(5,'rgba(0,0,0,0.15)',0,2);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(kx,ty+th/2,th*0.44,0,7); ctx.fill(); noShadow();
    ctx.fillStyle=done?'#F4B14A':'#5FB985'; ctx.beginPath(); ctx.arc(kx,ty+th/2,th*0.24,0,7); ctx.fill(); ctx.restore(); }
  // count on the track
  drawText(done?'★':got+' / '+N,tx+tw/2,ty+th/2+1,done?26:22,done?'#8a5a1a':'#6a4a2a',done?'#fff':null,'center','800');
  // streak badge at the right end (a small gold star + number)
  if((SAVE.streak||0)>0){ const sx=x+w-46, sy=y+h/2;
    glyphIcon('star',sx,sy-9,34,'#FFD15C','#E3A93E'); drawText(''+SAVE.streak,sx,sy+20,22,'#E3A93E',null,'center','800'); }
  ctx.restore();
}

function drawLevelMap(){
  // FIX 1a: the mail-room now reads at near-full strength (was a ~0.92 cream ghost wash). A light warm
  // legibility wash + soft vignette keeps the rope medallions crisp without washing the scene out.
  drawBackground();
  ctx.save();
  ctx.fillStyle='rgba(255,247,232,0.34)'; ctx.fillRect(0,0,W,H);
  const lvg=ctx.createRadialGradient(W/2,H*0.46,H*0.16,W/2,H*0.5,H*0.98);
  lvg.addColorStop(0,'rgba(255,250,240,0)'); lvg.addColorStop(1,'rgba(120,86,54,0.16)');
  ctx.fillStyle=lvg; ctx.fillRect(0,0,W,H);
  ctx.restore();
  // wordless (P0): "Choose a Level" header dropped — the level path + star/lock nodes already read
  const nodes=levelNodes();
  const curLv=Math.min(SAVE.maxLevel||1,LEVELS.length);
  // R4 #3: warmer, cozier snaking path — a soft wide honey underlay + a warm rope-dash overlay
  // (was a single flat beige dotted line).
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  const tracePath=()=>{ ctx.beginPath(); for(let i=0;i<nodes.length;i++){ const n=nodes[i]; if(i===0) ctx.moveTo(n.x,n.y); else ctx.lineTo(n.x,n.y); } };
  tracePath(); ctx.strokeStyle='rgba(227,169,62,0.20)'; ctx.lineWidth=30; ctx.stroke();
  tracePath(); ctx.strokeStyle='#E8C079'; ctx.lineWidth=15; ctx.setLineDash([3,30]); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  // R4 #3: premium raster node medallions — framed honey-rope badge (unlocked, composited with the
  // level's mechanic icon + 3 rating stars) / cute sleepy locked badge — replacing the flat circles.
  for(const nd of nodes){ const L=LEVELS[nd.n-1], unlocked=levelUnlocked(nd.n), stars=SAVE.levelStars[nd.n-1]||0;
    const isCur=unlocked && nd.n===curLv, D=nd.rad*2.34;
    // current level gets a soft pulsing golden halo so "play here next" is unmistakable
    if(isCur){ const pg=0.5+0.5*Math.sin(time*3);
      ctx.save(); shadow(30+pg*14,'rgba(244,169,62,'+(0.55+pg*0.35)+')',0,0);
      ctx.fillStyle='rgba(255,240,200,0.9)'; ctx.beginPath(); ctx.arc(nd.x,nd.y,nd.rad*1.04,0,7); ctx.fill(); ctx.restore(); }
    if(unlocked && has('node_medallion')){
      ctx.save(); shadow(16,'rgba(90,61,36,0.22)',0,9);
      ctx.drawImage(IMG.node_medallion.img,nd.x-D/2,nd.y-D/2,D,D); noShadow(); ctx.restore();
      // mechanic icon centered in the cream panel — FIX 1a: the pale ic_stamp / ic_seal rasters read
      // as faint tan-on-cream, so draw those two procedurally in FULL rich gold with a dark outline for
      // unmistakable contrast; the already-vivid rasters (star/crown/bolt) keep their art.
      { const ic=levelIcon(L);
        if(ic==='stamp'||ic==='seal') drawIcon(ic,nd.x,nd.y+D*0.03,D*0.34,'#F5B324','#7A491A');
        else glyphIcon(ic,nd.x,nd.y+D*0.03,D*0.34,'#F4CE7A','#E3A93E'); }
      // 3 rating stars arced across the upper cream panel — FIX 2: drawn PROCEDURALLY so the colours
      // actually apply (glyphIcon draws the fixed pale ic_star raster, ignoring fill → filled looked
      // identical to empty). Earned = vibrant full-gold w/ dark-gold outline; empty = muted cream.
      for(let s=0;s<3;s++){ const f=s<stars;
        if(f){ ctx.save(); shadow(6,'rgba(227,150,40,0.5)',0,1); }
        drawIcon('star',nd.x+(s-1)*D*0.17,nd.y-D*0.30,D*0.155,f?'#FFCB2E':'#ECE1CA',f?'#C67C15':'#CFC0A0');
        if(f){ noShadow(); ctx.restore(); } }
    } else if(!unlocked && has('node_locked')){
      const bob=Math.sin(time*1.6+nd.n)*2;   // gentle "sleeping" breathe, never static/broken
      ctx.save(); shadow(14,'rgba(90,61,36,0.18)',0,8);
      ctx.drawImage(IMG.node_locked.img,nd.x-D/2,nd.y-D/2+bob,D,D); noShadow(); ctx.restore();
    } else {   // procedural fallback (kept so a missing PNG never blanks the map)
      ctx.save(); shadow(16,'rgba(0,0,0,0.16)',0,8);
      ctx.fillStyle=unlocked?'#fffdf6':'#e6ddca'; ctx.beginPath(); ctx.arc(nd.x,nd.y,nd.rad,0,7); ctx.fill(); noShadow();
      ctx.lineWidth=8; ctx.strokeStyle=unlocked?(isCur?'#F4A93E':'#8ECFEC'):'#c9bda2'; ctx.stroke();
      if(unlocked){ glyphIcon(levelIcon(L),nd.x,nd.y+10,68,'#F4CE7A','#E3A93E');
        for(let s=0;s<3;s++) glyphIcon('star',nd.x-40+s*40,nd.y-64,34,s<stars?'#FFD15C':'#e3d3b4',s<stars?'#E3A93E':'#cbbd9c');
      } else if(has('ic_lock')){ ctx.drawImage(IMG.ic_lock.img,nd.x-46,nd.y-46,92,92); }
      else { ctx.fillStyle='#9a8a6a'; rr(nd.x-26,nd.y-8,52,46,10); ctx.fill(); ctx.lineWidth=9; ctx.strokeStyle='#9a8a6a';
        ctx.beginPath(); ctx.arc(nd.x,nd.y-8,20,Math.PI,0); ctx.stroke(); }
      ctx.restore();
    }
  }
  // FIX 2: a gently bobbing "play here" pointer over the current node so the next level to play is
  // unmistakable for a non-reader (on top of the existing pulsing halo).
  { const cn=nodes[curLv-1];
    if(cn && levelUnlocked(curLv)){ const bob=Math.sin(time*3)*7, py=cn.y-cn.rad*2.34*0.5-46+bob;
      ctx.save(); shadow(10,'rgba(90,61,36,0.28)',0,4); ctx.fillStyle='#F5B324'; ctx.strokeStyle='#7A491A'; ctx.lineWidth=6; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(cn.x-30,py-24); ctx.lineTo(cn.x+30,py-24); ctx.lineTo(cn.x,py+18); ctx.closePath(); ctx.fill(); noShadow(); ctx.stroke(); ctx.restore(); } }
  // FIX 2: a wordless hanging title banner (mail motif + stars) anchors the top of the map.
  drawMapBanner(W/2,108);
  // FIX 2: Poppu waves the child on from the bottom-right, breathing gently (reuses the wave pose sprite).
  if(!drawPoppuPosed('poppu_wave',1792,602,272,true)) ph_poppu('wave',1792,560,175);
  backButton();
  stampChip(STAMP_CHIP.x,STAMP_CHIP.y,'right');
}

/* ---- Shop-as-a-prop: draw each card as a real illustrated tag on a wooden shelf --------------------

const SHOP_TAG_PANEL={ shop_tag_kraft:{fx:0.525,fy:0.66,fw:0.45,fh:0.46}, shop_tag_wood:{fx:0.50,fy:0.555,fw:0.44,fh:0.54} };
function drawShopShelf(cards){
  if(!cards.length) return; const first=cards[0], last=cards[cards.length-1];
  const rowCx=(first.x+last.x+last.w)/2, rowBottom=first.y+first.h;

  } else {

    rr(px,py,pw,ph,40); ctx.fill(); noShadow(); ctx.lineWidth=6; ctx.strokeStyle='rgba(201,122,78,0.35)'; rr(px,py,pw,ph,40); ctx.stroke(); ctx.restore();
  }

/* draws the tag prop filling card c (loop poking above); returns the cream inner-panel geometry */
function drawShopTag(c,key,ownedTint){
  const cx=c.x+c.w/2, TS=c.h*1.30, tagCY=c.y+0.34*TS;
  if(has(key)){
    // owned/equipped state reads via a soft colored glow behind the tag (clean, no full-canvas tint bleed)
    if(ownedTint){ ctx.save(); ctx.globalAlpha=0.42; const gg=ctx.createRadialGradient(cx,tagCY,TS*0.16,cx,tagCY,TS*0.40);
      gg.addColorStop(0,ownedTint); gg.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle=gg;
      ctx.beginPath(); ctx.arc(cx,tagCY,TS*0.40,0,7); ctx.fill(); ctx.restore(); }
    ctx.save(); shadow(16,'rgba(90,60,30,0.20)',0,9);
    ctx.drawImage(IMG[key].img,cx-TS/2,tagCY-TS/2,TS,TS); noShadow(); ctx.restore(); }

function drawUpgradeCard(c){
  const u=c.u, owned=hasUp(u.id), afford=(SAVE.stamps||0)>=u.cost;

  const iconCy=F.py-F.ph*0.10, iconSize=F.pw*0.90*(u.sprScale||1);
  ctx.save();
  // real illustrated Poppu-world prop icon on the tag; procedural glyph only as pre-load fallback
  if(has(u.spr)) sprite(u.spr,F.cx,iconCy,iconSize,iconSize);
  else if(!glyphIcon(u.icon,F.cx,iconCy,iconSize*0.9,'#F4A93E','#E3A93E') && u.icon==='x2') drawText('2×',F.cx,iconCy,iconSize*0.8,'#E3A93E',null);
  ctx.restore();
  const bw=Math.min(c.w-150,F.pw*0.98),bh=48,bx=F.cx-bw/2,by=F.py+F.ph*0.24;
  if(owned){ ctx.save(); shadow(8,'rgba(0,0,0,0.12)',0,3); ctx.fillStyle='#5FB985'; rr(bx,by,bw,bh,bh/2); ctx.fill(); noShadow();
    glyphIcon('check',F.cx,by+bh/2,40,'#fff','#3a6a4a'); ctx.restore(); }
  else { ctx.save(); shadow(8,'rgba(0,0,0,0.12)',0,3); ctx.fillStyle=afford?'#FFD15C':'#e6ddca'; rr(bx,by,bw,bh,bh/2); ctx.fill(); noShadow();
    glyphIcon('star',bx+34,by+bh/2,34,'#fff','#E3A93E'); drawText(u.cost+'',bx+bw/2+12,by+bh/2,32,afford?'#6a4a2a':'#b8a684',null); ctx.restore(); }

function wrapText(txt,cx,y,maxw,size,col){
  ctx.save(); ctx.font='700 '+size+'px "Baloo 2",system-ui,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=col;

}

/* ------------------------------------------------------------- RENDER: STICKER */
/* which flower art a given (0-based) earned slot blooms into — a gentle "growing rarer" cadence so
   the collection reads as a garden filling in, not a flat grid: every 8th bloom is the special flower,
   every 4th (that isn't also an 8th) is the rare flower, everything else is the common flower. */
function gardenSlotFlower(i){
  const n=i+1;
  if(n%8===0) return 'flower_special';
  if(n%4===0) return 'flower_rare';
  return 'flower_common';
}
/* FIX 1b: a soft, varied "seed waiting to bloom" slot — cycles pastel tint + shape (seed / sprout /
   bud) per index so the empty garden reads colourful and alive, not 32 identical grey buds. */
const GARDEN_PASTEL=[['#FFE0AE','#F6C25E'],['#FFF0A6','#EBCF4E'],['#E6D4FF','#B79BEA'],['#FFD3E1','#F0A0BC'],['#CBEBFB','#7EC7E8'],['#D6F3D9','#8FD6A0']];
function drawEmptyGardenSlot(cx,cy,i,bob){
  const pal=GARDEN_PASTEL[i%GARDEN_PASTEL.length], shp=i%3;
  ctx.save(); ctx.translate(cx,cy+bob);
  // soft pastel pot-of-soil disc
  ctx.fillStyle=pal[0]; ctx.globalAlpha=0.55; ctx.beginPath(); ctx.arc(0,4,50,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='#8FCF9E'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.lineJoin='round';
  if(shp===0){ // seed pod
    ctx.fillStyle=pal[1]; ctx.beginPath(); ctx.ellipse(0,2,15,20,0,0,7); ctx.fill();
    ctx.strokeStyle=pal[1]; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(0,4); ctx.stroke();
  } else if(shp===1){ // little sprout, two leaves
    ctx.beginPath(); ctx.moveTo(0,22); ctx.lineTo(0,-4); ctx.stroke();
    for(const s of[-1,1]){ ctx.fillStyle='#A6DCB0'; ctx.beginPath();
      ctx.ellipse(s*14,-2,14,9,s*0.7,0,7); ctx.fill(); }
  } else { // closed bud on a stem
    ctx.beginPath(); ctx.moveTo(0,24); ctx.lineTo(0,-2); ctx.stroke();
    ctx.fillStyle=pal[1]; ctx.beginPath();
    ctx.moveTo(0,-24); ctx.bezierCurveTo(16,-18,14,2,0,4); ctx.bezierCurveTo(-14,2,-16,-18,0,-24); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}
function drawSticker(){
  // FIX 1b: SOLID warm garden-paper background (was a ~0.95 cream ghost wash over the mail-room).
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#FFF6E6'); g.addColorStop(0.6,'#FBEBD2'); g.addColorStop(1,'#F3E0C4');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.05; ctx.fillStyle='#8FCF9E';
  for(let x=110;x<W;x+=200) for(let y=120;y<H;y+=200) drawIcon('heart',x,y,54,'#8FCF9E','#8FCF9E');
  ctx.restore();
  // wordless (P0): "My Garden" header dropped — the flower grid reads on its own.
  // wordless (P0): "N blooms grown" -> a flower icon + the bare numeral (no words).
  flowerGlyph(W/2-30,190,48); drawText(''+SAVE.stickers.length,W/2+30,190,40,'#a88a5c',null,'left','800');
  const cols=8, rows=4, total=cols*rows, cw=180, ch=180, gx=(W-cols*cw)/2, gy=260;
  // sliding window: once the garden fills past 32, always show the MOST-RECENT 32 so a new bloom never
  // runs out of a slot (QA: grid used to freeze full at 32 and silently drop every later bloom). The
  // true lifetime count still reads above; the grid just slides to keep the newest bloom visible.
  const base=Math.max(0, SAVE.stickers.length-total);
  for(let i=0;i<total;i++){ const dataIdx=base+i, cx=gx+(i%cols)*cw+cw/2, cy=gy+Math.floor(i/cols)*ch+ch/2, earned=dataIdx<SAVE.stickers.length;
    ctx.save();
    if(has('ui_sticker')){ ctx.save(); if(!earned) ctx.globalAlpha=0.55; ctx.drawImage(IMG.ui_sticker.img,cx-80,cy-80,160,160); ctx.restore(); }
    else { ctx.fillStyle=earned?'rgba(0,0,0,0.05)':'rgba(255,201,138,0.16)'; ctx.strokeStyle=earned?'#d9c3a0':'#F0B87E'; ctx.lineWidth=4; ctx.setLineDash([12,10]); rr(cx-70,cy-70,140,140,20); ctx.fill(); ctx.stroke(); ctx.setLineDash([]); }
    if(earned){
      const bob=Math.sin(time*2+i)*3, key=gardenSlotFlower(dataIdx);   // key by lifetime index, not grid slot, so a bloom's species never changes when the window slides (QA)
      if(has(key)) ctx.drawImage(IMG[key].img,cx-58,cy-58+bob,116,116);
      else { const type=T[SAVE.stickers[dataIdx]]||TYPES[i%6]; if(has('pkg_'+type.id)) ctx.drawImage(IMG['pkg_'+type.id].img,cx-58,cy-58+bob,116,116); else ph_face(type,cx,cy,110); }
    } else {
      // FIX 1b: not-yet-grown slot — a VARIED soft pastel "seed / sprout / bud" (tint + shape cycle per
      // slot) with a slow bob + staggered twinkle, so the empty garden reads colourful and alive rather
      // than 32 identical grey buds.
      const lbob=Math.sin(time*1.2+i*0.7)*3;
      drawEmptyGardenSlot(cx,cy,dataIdx,lbob);
      const sp=(Math.sin(time*1.6+i*2.1)+1)/2;   // 0..1, staggered per slot so twinkles don't blink in unison
      if(sp>0.74){ ctx.save(); ctx.globalAlpha=(sp-0.74)/0.26; drawIcon('star',cx-46,cy-46+lbob,26,'#FFD15C','#fff'); ctx.restore(); }
    }
    ctx.restore();
  }
  backButton();
}

  ctx.beginPath(); ctx.moveTo(-ew/2,-eh/2); ctx.lineTo(0,3); ctx.lineTo(ew/2,-eh/2); ctx.stroke(); ctx.restore();

  drawText(shown+' / '+totalToLoad,W/2,by+bh+42,32,'#a88a5c',null,'center','700');
}

/* ---- locked-building "sleeping" tint — masked to the sprite's OWN alpha, never a hard rectangle ----
   Real art: composited once on an offscreen canvas via source-atop (tint only lands on opaque pixels),
   then cached (rebuilt only if the image finishes loading later). Procedural fallback: clipped to the
   exact body+roof silhouette path used by ph_building, not its bounding box.
   Two tint passes read as cool moonlight rather than a flat dark box: a desaturating darken, then a
   ~15% shift toward moonlight blue (#A8C5E8) — "dozing under moonlight", not "broken/blacked out". */
const _buildingTintCache={};
function tintedLockedSprite(b){
  const w=Math.ceil(b.w), h=Math.ceil(b.h), ready=has(b.key);
  let c=_buildingTintCache[b.id];
  if(!c || c.w!==w || c.h!==h || c.ready!==ready){
    const off=document.createElement('canvas'); off.width=w; off.height=h;
    const octx=off.getContext('2d');
    if(ready) octx.drawImage(IMG[b.key].img,0,0,w,h);
    octx.globalCompositeOperation='source-atop';
    octx.fillStyle='rgba(70,66,64,0.30)'; octx.fillRect(0,0,w,h);        // desaturating darken
    octx.fillStyle='rgba(168,197,232,0.16)'; octx.fillRect(0,0,w,h);     // ~15% moonlight-blue shift
    octx.globalCompositeOperation='source-over';
    c={ canvas:off, w, h, ready }; _buildingTintCache[b.id]=c;
  }
  return c.canvas;
}
function clipBuildingSilhouette(cx,groundY,w,h){
  // exact body+roof shape drawn by ph_building() — union via one non-zero-winding path, both wound CW
  const bw=w*0.86, bh=h*0.62, r=w*0.05, bx=cx-bw/2, by=groundY-bh;
  ctx.beginPath();
  ctx.moveTo(bx+r,by); ctx.arcTo(bx+bw,by,bx+bw,by+bh,r); ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
  ctx.arcTo(bx,by+bh,bx,by,r); ctx.arcTo(bx,by,bx+bw,by,r); ctx.closePath();
  ctx.moveTo(cx-w*0.52,by); ctx.lineTo(cx,groundY-h); ctx.lineTo(cx+w*0.52,by); ctx.closePath();
  ctx.clip();
}
/* pre-bake the "new" badge to a small offscreen canvas at DISPLAY size — blitting a same-size source
   (rather than downscaling the raw asset every frame while also rotating/scaling in the live 2D ctx)
   is what kills the per-frame rotate/scale mush. Prefers the v2 (text-free) art if present. */
/* FIX3 (creative/product "empty burst"): the text-free v2 burst art is a plain gold sunburst with
   NO content inside it — reads as a render error, not a "new!" tag. Bake a small centered star glyph
   into the cached canvas (icon-first, zero reading required) so every badge always carries a clear
   pictograph, at zero per-frame cost since this canvas is built once and cached. */
function drawBadgeGlyphStar(o,cx,cy,outerR,innerR){
  o.save(); o.beginPath();
  for(let i=0;i<10;i++){ const r=i%2===0?outerR:innerR, a=-Math.PI/2+i*Math.PI/5;
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; if(i===0) o.moveTo(x,y); else o.lineTo(x,y); }
  o.closePath();
  o.fillStyle='#FFFFFF'; o.fill();
  o.lineJoin='round'; o.lineWidth=outerR*0.16; o.strokeStyle='#C9791E'; o.stroke();
  o.restore();
}
let _newBadgeCache=null;
function newBadgeCanvas(){
  if(_newBadgeCache) return _newBadgeCache;
  const key=has('new_badge_v2')?'new_badge_v2':(has('new_badge')?'new_badge':null);
  if(!key) return null;
  const s=200, c=document.createElement('canvas'); c.width=c.height=s;
  const o=c.getContext('2d'); o.imageSmoothingEnabled=true; o.imageSmoothingQuality='high';
  o.drawImage(IMG[key].img,0,0,s,s);
  drawBadgeGlyphStar(o,s/2,s/2,s*0.20,s*0.085);
  _newBadgeCache=c; return c;
}
/* small drifting "zzz" — universal sleep iconography (not reading-dependent), 3 staggered z's rising
   and fading above the roof on a 3s loop. Reads "sleeping, not broken" with zero literal words. */
function drawSleepingZzz(b,groundY){
  const roofY=groundY-b.h*0.92, period=3.0;
  for(let i=0;i<3;i++){
    const ph=((time+i*period/3)%period)/period;
    const y=roofY-ph*74, x=b.cx+b.w*0.14+i*13;
    const a=Math.sin(ph*Math.PI); if(a<=0.02) continue;
    ctx.save(); ctx.globalAlpha=a*0.9;
    drawText('z',x,y,20+i*7,'#FFF6E0','#8a6a44','center','800',3.2);
    ctx.restore();
  }
}
function drawTownBuilding(b){
  const bob=Math.sin(time*2*Math.PI/b.bobPeriod+b.bobPhase)*b.bobAmp;
  const groundY=b.groundY+bob, unlocked=buildingUnlocked(b.id);
  // R4 #4: plant a grassy clearing knoll under any house that would otherwise float (peeky) — drawn
  // first so the contact shadow + house sit ON it.
  drawTownGroundPad(b.id);
  // contact shadow at the building's FIXED ground line — never the bobbed one, so it never "swims"
  const S=TOWN_BUILDING_SHADOW[b.id];
  if(S) bakedContactShadow(S.cx,S.cy,S.rw,S.rh,S.a);
  const sq=(buildingSqueeze&&buildingSqueeze.id===b.id)?squeezeScale(buildingSqueeze.t):1;
  // locked buildings get a slow 3s "breathing" scale (1.0→1.015→1.0) — sleeping, not static/broken
  const breathe=unlocked?1:(1.0075+0.0075*Math.sin(time*2*Math.PI/3));
  const totalScale=sq*breathe;
  ctx.save(); ctx.translate(b.cx,groundY); ctx.scale(totalScale,totalScale); ctx.translate(-b.cx,-groundY);
  if(unlocked){
    if(has(b.key)) ctx.drawImage(IMG[b.key].img, b.cx-b.w/2, groundY-b.h, b.w, b.h);
    else ph_building(b.id, b.cx, groundY, b.w, b.h);
  } else if(has(b.key)){
    // sprite + "sleeping" tint, pre-composited and masked to the art's own alpha — reads as the
    // building dozing, not a gray box stamped over it.
    ctx.drawImage(tintedLockedSprite(b), b.cx-b.w/2, groundY-b.h, b.w, b.h);
  } else {
    ph_building(b.id, b.cx, groundY, b.w, b.h);
    ctx.save(); clipBuildingSilhouette(b.cx, groundY, b.w, b.h);
    ctx.fillStyle='rgba(70,66,64,0.30)'; ctx.fillRect(b.cx-b.w/2, groundY-b.h, b.w, b.h);
    ctx.fillStyle='rgba(168,197,232,0.16)'; ctx.fillRect(b.cx-b.w/2, groundY-b.h, b.w, b.h);
    ctx.restore();
  }
  // wordless "happy visit" pop for an unlocked-but-teased building tap (e.g. Wrap Shop) — a bouncing
  // star above the roof, same icon-first language as the locked path's star, just upbeat (no fade-to-sad)
  if(unlocked && teasePulse && teasePulse.id===b.id){
    const p=Math.min(1,teasePulse.t/0.32), e=easeOutBack(p), fade=teasePulse.t<0.45?1:Math.max(0,1-(teasePulse.t-0.45)/0.25);
    ctx.save(); ctx.globalAlpha=Math.max(0,fade);
    glyphIcon('star', b.cx, groundY-b.h*0.92, 74*Math.max(0,e), '#FFD54A','#E3A93E');
    ctx.restore();
  }
  if(!unlocked){
    drawSleepingZzz(b, groundY);
    // heart "not-yet" badge — lowered onto the door, not floating near the roofline
    const badgeR=b.id==='wrap'?54:46, badgeX=b.cx+b.w*0.18, badgeY=groundY-b.h*0.5;
    const pulseT=(lockedPulse&&lockedPulse.id===b.id)?lockedPulse.t:null;
    const bump=pulseT!=null?1+Math.max(0,0.30-pulseT*0.55):1;   // quick tap-bounce on the heart badge
    ctx.save(); ctx.translate(badgeX,badgeY); ctx.scale(bump,bump); ctx.translate(-badgeX,-badgeY);
    shadow(12,'rgba(0,0,0,0.16)',0,4);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(badgeX,badgeY,badgeR,0,7); ctx.fill(); noShadow();
    glyphIcon('heart',badgeX,badgeY,badgeR*0.9,'#FFC2D3','#F06A8E');
    ctx.strokeStyle='#F06A8E'; ctx.lineWidth=badgeR*0.12; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(badgeX,badgeY-badgeR*0.55,badgeR*0.5,Math.PI*1.05,Math.PI*1.95); ctx.stroke();
    ctx.restore();
    // one-shot filling-star "getting closer" pop on tap — icon-first, carries the message without text
    if(pulseT!=null && pulseT<0.9){
      const p=Math.min(1,pulseT/0.4), e=easeOutBack(p), fade=pulseT<0.55?1:Math.max(0,1-(pulseT-0.55)/0.35);
      ctx.save(); ctx.globalAlpha=fade;
      glyphIcon('star', badgeX, badgeY+badgeR*1.7, badgeR*0.72*Math.max(0,e), '#FFD54A','#E3A93E');
      ctx.restore();
    }
    if(FRIEND_UNLOCK[b.id]){   // picture-meter toward unlock — generalized to every locked friend house
      const stars=houseMeterStars(b.id), size=36, gap=14, total=3*size+2*gap, x0=b.cx-total/2+size/2, sy=badgeY+70;
      for(let i=0;i<3;i++){ const filled=i<stars;
        glyphIcon('star', x0+i*(size+gap), sy, size, filled?'#FFD15C':'#fffdf6', filled?'#E3A93E':'#E3C9A0'); }
    }
  }
  ctx.restore();
  if(SAVE.newBadge[b.id]){
    // corner-of-the-roof placement (tucked onto the roofline itself, not floating in the sky above it)
    // so the badge never covers the house's own identity art; genuinely small (~80px) so it reads as a
    // tag, not a sticker over the building. Defaults to the roof's RIGHT corner; if that would land in
    // the top-right star-HUD pill's safe zone (e.g. a building placed high/right on the hillside), it
    // mirrors to the LEFT roof corner instead — still roof-pinned, just never under the HUD.
    const roofY=Math.round(groundY-b.h*0.90);
    const HUD_SAFE_X=W-300, HUD_SAFE_Y=170;
    let bx=Math.round(b.cx+b.w*0.32);
    if(bx>HUD_SAFE_X && roofY<HUD_SAFE_Y) bx=Math.round(b.cx-b.w*0.32);
    const by=roofY;
    const wiggleT=newBadgeAnimState[b.id]?newBadgeAnimState[b.id].t:null;
    // one-shot ~500ms elastic "look at me!" wiggle the first time this badge is shown this session
    const wiggle=wiggleT!=null?1+0.10*Math.sin((wiggleT/0.5)*Math.PI*2.2)*(1-wiggleT/0.5):1;
    // continuous gentle pulse (1.0→1.08, 1.2s loop) for as long as the badge is unclaimed
    const pulse=1.04+0.04*Math.sin(time*2*Math.PI/1.2);
    const bs=80*wiggle;
    groundShadow(bx,by+bs*0.42,40,12,0.14);
    ctx.save(); ctx.translate(bx,by); ctx.scale(pulse,pulse);
    const cache=newBadgeCanvas();
    if(cache) ctx.drawImage(cache,-bs/2,-bs/2,bs,bs);
    else { shadow(10,'rgba(0,0,0,0.2)',0,4); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,bs*0.5,0,7); ctx.fill(); noShadow(); drawIcon('star',0,0,bs*0.73,'#FFD15C','#E3A93E'); }
    ctx.restore();
  }
}
/* how far along Poppu's non-blocking hop-toward-the-locked-building beat we are, 0..1 (0 = not pointing) */
function poppuPointTravel(){
  if(!poppuPoint) return {travel:0,dirSign:1};
  const t=poppuPoint.t, tgt=poppuPoint.target, out=t<0.6;
  const travel=out?Math.min(1,t/0.25):Math.max(0,1-(t-0.6)/0.3);
  return { travel, dirSign:(tgt.cx>=POPPU_TOWN_HOME.x)?1:-1 };
}
/* Poppu only has wave/postal/celebrate poses (no dedicated "point" sprite), and a procedurally-grafted
   arm risks landing across her face on art we don't control the rig of. Instead: her whole body leans
   toward the target (applied by the caller) + a soft trail of chevrons drifts from beside her toward the
   locked building — a universal, safe-to-render "look that way!" cue that can never clip the character. */
function drawPoppuTownPointGesture(pp){
  const {travel,dirSign}=poppuPointTravel(); if(travel<=0.02) return;
  const t=poppuPoint?poppuPoint.t:0;
  ctx.save();
  for(let i=0;i<3;i++){
    const off=(t*260+i*74)%220, a=Math.max(0,1-off/220)*travel*0.85;
    if(a<=0.02) continue;
    const x=pp.x+dirSign*(170+off), y=pp.y-150+Math.sin(t*3+i)*6;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(x,y); if(dirSign<0) ctx.scale(-1,1);
    ctx.strokeStyle='#FFC2D3'; ctx.lineWidth=14; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(-14,-16); ctx.lineTo(10,0); ctx.lineTo(-14,16); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
function drawTown(){
  let zoomed=false, overlayA=0;
  if(townTransition){
    const t=townTransition.t;
    const zt=Math.max(0,Math.min(1,(t-0.18)/0.32));
    overlayA=zt;
    ctx.save(); ctx.translate(420,880); ctx.scale(1+0.35*zt,1+0.35*zt); ctx.translate(-420,-880); zoomed=true;
  }
  if(has('town_map')) ctx.drawImage(IMG.town_map.img,0,0,W,H); else ph_townBackground();
  drawAmbient();
  for(const id of TOWN_ORDER) drawTownBuilding(TOWN_BUILDINGS[id]);
  const pp=poppuTownPos();
  const {travel:pointTravel,dirSign:pointDir}=poppuPointTravel();
  bakedContactShadow(pp.x,1016,132,28,0.36);   // fixed ground line — doesn't rotate/hop with her lean+point
  ctx.save();
  if(pointTravel>0.02){ ctx.translate(pp.x,pp.y); ctx.rotate(pointDir*0.09*pointTravel); ctx.translate(-pp.x,-pp.y); }
  if(!drawPoppuSprite('poppu_wave',pp.x,pp.y,380,true)) ph_poppu('wave',pp.x,pp.y-60,250);
  ctx.restore();
  drawPoppuTownPointGesture(pp);
  drawParticles();
  if(zoomed) ctx.restore();
  if(townTransition){ ctx.save(); ctx.globalAlpha=overlayA; ctx.fillStyle='#FFF8E8'; ctx.fillRect(0,0,W,H); ctx.restore(); }
  drawFloatTexts();
  backButton();
  stampChip(STAMP_CHIP.x,STAMP_CHIP.y,'right');
}

/* ------------------------------------------------------------ RENDER: DRIVE */
function drawDriveBackground(){
  // per-destination biome (Phase 1): each arrival friend carries their own bg + tint wash so every
  // run reads distinct, not just "the forest drive" every time — see DRIVE_BIOMES.
  const biome=(drive&&drive.biome)||DRIVE_BIOMES.gear;
  if(has(biome.bgKey)) ctx.drawImage(IMG[biome.bgKey].img,0,0,W,H);
  else if(has('bg_forest')) ctx.drawImage(IMG.bg_forest.img,0,0,W,H);
  else { const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#CDEBFA'); g.addColorStop(1,'#BFE8C4'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  if(biome.tint){ ctx.save(); ctx.fillStyle=biome.tint; ctx.fillRect(0,0,W,H); ctx.restore(); }
}
/* painted cozy lane that blends into the forest bg — no more flat tan strip + hard white dashed edges.
   Body: real tiled texture (if the art pipeline has delivered one) else a warm dirt gradient. Edges get
   a soft grass-bleed + dirt-shadow + a thin warm-brown outline (matches the outlined-illustration style
   used everywhere else in bg-forest) instead of a hard cut. A faint center cart-track + drifting sun
   dapples finish the "painted path", not "printed strip" read. Gradients/paths are cheap per-frame
   (no shadowBlur) so this stays 60fps-safe. */
function drawRoad(){
  const D=drive; if(!D) return; const cy0=820, halfW=DRIVE_ROAD_HALFW, trackHalfW=86, step=30;
  const dLo=D.scrollY-300, dHi=D.scrollY+900;
  const left=[], right=[], trackL=[], trackR=[];
  for(let d=dLo; d<=dHi; d+=step){
    const y=cy0-(d-D.scrollY), cx=roadCenterX(d);
    const taper=roadTaperAt(d,D.scrollY), hw=halfW*taper, thw=trackHalfW*taper;
    left.push({x:cx-hw,y}); right.push({x:cx+hw,y});
    trackL.push({x:cx-thw,y}); trackR.push({x:cx+thw,y});
  }
  const tracePoly=pts=>{ ctx.beginPath(); pts.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); };
  const roadPath=()=>{ ctx.beginPath();
    left.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));
    for(let i=right.length-1;i>=0;i--) ctx.lineTo(right[i].x,right[i].y);
    ctx.closePath(); };

  ctx.save();
  const surf=(D.biome&&D.biome.roadSurface)||'dirt';
  // 1. road body — a soft pastel CLOUD-WALKWAY on the sky biome (no brown dirt floating in clouds —
  //    creative-director seam fix), else the tiled dirt path.
  if(surf==='cloud'){
    // FIX 4: deepen the sky walkway value so the road no longer reads as near-white-on-white clouds
    // (the truck + collectibles were blending in). A clearly saturated periwinkle-blue path.
    roadPath(); const g=ctx.createLinearGradient(0,cy0-500,0,H);
    g.addColorStop(0,'#C4DCF6'); g.addColorStop(1,'#93BBEA'); ctx.fillStyle=g; ctx.fill();
  } else if(has('road_tex')){
    roadPath(); ctx.save(); ctx.clip();
    const pat=ctx.createPattern(IMG.road_tex.img,'repeat');
    ctx.save(); ctx.translate(0,-(D.scrollY%512));
    ctx.globalAlpha=0.92; ctx.fillStyle=pat; ctx.fillRect(-400,-H*3,W+800,H*6);
    ctx.restore(); ctx.restore();
  } else {
    roadPath();
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#E7D3A6'); g.addColorStop(1,'#DCC084');
    ctx.globalAlpha=0.92; ctx.fillStyle=g; ctx.fill(); ctx.globalAlpha=1;
  }
  // 1a. aerial-recede grade (Priority-3 seam fix, done in-code to avoid tile banding) — a soft light
  //     haze toward the top (reads as "far / receding to a horizon") + a gentle deepening toward the
  //     bottom (reads as "near"), so the lane stops looking like a flat isotropic strip.
  ctx.save(); roadPath(); ctx.clip();
  const far=ctx.createLinearGradient(0,0,0,cy0);
  far.addColorStop(0,'rgba(250,249,242,0.5)'); far.addColorStop(0.6,'rgba(250,249,242,0)');
  ctx.fillStyle=far; ctx.fillRect(0,0,W,cy0);
  const near=ctx.createLinearGradient(0,cy0-160,0,H);
  // on the cloud path, "near" BRIGHTENS to airy white instead of browning to grey (creative note: the sky
  // lane was reading as a muddy UI gradient because a warm-brown near-grade sat over the pale blue).
  const nearC=(surf==='cloud')?'110,150,205':'70,50,30', nearA=(surf==='cloud')?0.34:0.13;
  near.addColorStop(0,'rgba('+nearC+',0)'); near.addColorStop(1,'rgba('+nearC+','+nearA+')');
  ctx.fillStyle=near; ctx.fillRect(0,cy0-160,W,H-(cy0-160));
  ctx.restore();
  // 1b. per-biome road wash — subtle color identity per arrival friend (woodland/meadow/twilight/riverside)
  if(D.biome && D.biome.roadTint){ roadPath(); ctx.fillStyle=D.biome.roadTint; ctx.fill(); }
  // 1c. de-tile dirt mottle (review-board polish) — large soft irregular dirt blotches keyed to ABSOLUTE
  //     world-depth (not the 512px tile modulo), so they never line up with the tile repeat and break the
  //     "visible tiling" read. Dirt biomes only; big, sparse, alternating lighter/darker earth.
  if(surf!=='cloud'){
    ctx.save(); roadPath(); ctx.clip();
    const mrep=263;   // coprime-ish with the 512 tile so blotches drift across every seam
    for(let k=-1;k<=8;k++){
      const base=Math.floor((D.scrollY-300)/mrep)*mrep, d=base+k*mrep;
      if(d<D.scrollY-340||d>D.scrollY+960) continue;
      const seed=Math.round(d/mrep)*13;
      const y=cy0-(d-D.scrollY), depth=Math.max(0.3,Math.min(1,(y+120)/(cy0+120)));
      const tp=roadTaperAt(d,D.scrollY);
      const x=roadCenterX(d)+(seededRand(seed)-0.5)*(halfW*1.5*tp);
      const rw=(70+seededRand(seed+1)*120)*depth;
      ctx.globalAlpha=0.05+seededRand(seed+2)*0.055;
      ctx.fillStyle=(seededRand(seed+3)>0.5)?'#EAD9B0':'#B79A6A';
      ctx.beginPath(); ctx.ellipse(x,y,rw,rw*(0.5+seededRand(seed+4)*0.35),seededRand(seed+5)*3,0,7); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.restore();
  }
  // 2. edge feather — biome-aware: soft cloud-blue rim on the sky path, warm grass+dirt rim elsewhere.
  //    (review-board polish) the dirt verge is now FEATHERED — a wide soft grass rim + a mid transition
  //    band + a thin, low-alpha SOFTENED outline, so the road/grass border no longer reads as a hard ruler.
  const cloudy = surf==='cloud';
  const edgeGrass = cloudy ? 'rgba(170,202,238,0.65)' : 'rgba(126,152,90,0.26)';
  const edgeMid   = cloudy ? 'rgba(150,186,226,0.42)' : 'rgba(150,170,104,0.22)';
  const edgeLine  = cloudy ? 'rgba(96,140,200,0.85)'  : 'rgba(107,66,38,0.42)';
  for(const edge of [left,right]){
    tracePoly(edge); ctx.lineWidth=46; ctx.strokeStyle=edgeGrass; ctx.stroke();   // wide soft grass rim
    tracePoly(edge); ctx.lineWidth=24; ctx.strokeStyle=edgeMid;   ctx.stroke();   // mid transition feather
    tracePoly(edge); ctx.lineWidth=12; ctx.strokeStyle='rgba(90,61,36,0.08)'; ctx.stroke();
    tracePoly(edge); ctx.lineWidth=cloudy?7:4; ctx.strokeStyle=edgeLine; ctx.stroke();  // thin softened outline
  }
  // 2b. organic grass-tuft verge (dirt biomes) — breaks the hard even road/grass border with small
  //     jittered blade clusters straddling the edge, so the shoulder reads as a feathered natural verge,
  //     not a ruler-straight line (review-board polish). Sparse/irregular + depth-scaled, deterministic.
  if(surf!=='cloud'){
    ctx.save(); ctx.lineCap='round';
    const tuftCols=['rgba(108,150,78,0.62)','rgba(126,168,92,0.55)','rgba(94,134,66,0.60)'];
    for(const [edge,side] of [[left,-1],[right,1]]){
      for(let i=1;i<edge.length-1;i++){ const pt=edge[i];
        const seed=Math.round((pt.y+D.scrollY)*0.37)+side*11;
        if(seededRand(seed)>0.42) continue;   // denser but still irregular spacing
        const depth=Math.max(0.3,Math.min(1,(pt.y+120)/(cy0+120)));
        // ~40% of clusters sit slightly INSIDE the dirt so blades straddle & break the border line
        const inside=seededRand(seed+7)<0.4;
        const off=inside? -side*(2+seededRand(seed+1)*7) : side*(2+seededRand(seed+1)*13);
        const tx=pt.x+off, ty=pt.y;
        const n=2+Math.floor(seededRand(seed+2)*4), h=(9+seededRand(seed+3)*17)*depth;
        ctx.strokeStyle=tuftCols[i%tuftCols.length]; ctx.lineWidth=3.0*depth;
        for(let b=0;b<n;b++){ const bx=tx+(b-n/2)*4.0*depth, lean=(seededRand(seed*1.7+b+4)-0.5)*13;
          ctx.beginPath(); ctx.moveTo(bx,ty); ctx.quadraticCurveTo(bx+lean*0.5,ty-h*0.62,bx+lean,ty-h); ctx.stroke(); }
      }
    }
    ctx.restore();
  }
  // 2c. scale-graded dirt pebbles (dirt biomes only) — dabs LARGER near the bottom (close), smaller/
  //     fainter toward the top (far). Each pebble is JITTERED in depth WITHIN its band + varied size/
  //     alpha/rotation (with an occasional bigger stone) so the scatter never reads as a repeating row.
  if(surf!=='cloud'){
    ctx.save(); roadPath(); ctx.clip();
    const prep=150;
    for(let k=-1;k<=8;k++){
      const bandD=Math.floor((D.scrollY-300)/prep)*prep+k*prep;
      for(let j=0;j<5;j++){ const seed=Math.round(bandD/prep)*17+j*29;
        const d=bandD+(seededRand(seed+5)-0.5)*prep*1.5;   // scatter each pebble off the band grid
        if(d<D.scrollY-320||d>D.scrollY+950) continue;
        const y=cy0-(d-D.scrollY), depth=Math.max(0.22,Math.min(1,(y+120)/(cy0+120)));
        const tp=roadTaperAt(d,D.scrollY);
        const x=roadCenterX(d)+(seededRand(seed)-0.5)*(halfW*1.75*tp);
        const big=seededRand(seed+3)>0.80;
        const rw=(4+seededRand(seed+1)*(big?23:11))*depth*1.7;
        ctx.globalAlpha=0.09+seededRand(seed+2)*0.10;
        ctx.fillStyle=(j&1)?'#785a36':'#A38458';
        ctx.beginPath(); ctx.ellipse(x,y,rw,rw*(0.55+seededRand(seed+4)*0.3),seededRand(seed+6)*3,0,7); ctx.fill();
      }
    }
    ctx.globalAlpha=1; ctx.restore();
  }
  // 3. faint center cart-track — two parallel ruts
  for(const track of [trackL,trackR]){ tracePoly(track); ctx.lineWidth=44; ctx.strokeStyle='rgba(120,92,54,0.10)'; ctx.stroke(); }
  // 4. drifting sun dapples, scrolling with the road (deterministic, ~6 on screen at once)
  ctx.save(); roadPath(); ctx.clip();
  const rep=200;
  for(let k=-1;k<=6;k++){
    const base=Math.floor((D.scrollY-300)/rep)*rep, d=base+k*rep;
    if(d<D.scrollY-320||d>D.scrollY+950) continue;
    const seed=Math.round(d/rep);
    const lane=(seededRand(seed)-0.5)*(halfW*1.6), rw=40+seededRand(seed+1)*50;
    const x=roadCenterX(d)+lane, y=cy0-(d-D.scrollY);
    ctx.fillStyle='rgba(255,248,220,0.10)'; ctx.beginPath(); ctx.ellipse(x,y,rw,rw*0.4,0,0,7); ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}
/* Foreground foliage shoulder — a play-lane frame of overhanging leaf clumps hugging both road edges,
   drawn as the truck's OWN top-down play-layer (not part of the side-view forest bg). This is the
   pragmatic Phase-0 fix for the top-down-road / side-view-forest perspective clash: it gives the road a
   painted "cozy lane cut through the woods" frame instead of a flat strip laid over a fighting backdrop.
   Deterministic per scroll-depth (seededRand) so clumps don't jitter frame-to-frame; cheap flat-fill
   ellipses only, no shadowBlur. */
function drawFoliageClump(x,y,side,seed){
  const s=60+seededRand(seed+2)*28;
  const surf=(drive&&drive.biome&&drive.biome.roadSurface)||'dirt';
  ctx.save(); ctx.translate(x,y);
  if(surf==='cloud'){
    // fluffy pastel cloud puffs frame the sky path (not green bushes floating in the sky)
    for(let i=0;i<3;i++){
      const a=i*2.1+seededRand(seed+i)*1.2;
      const ox=Math.cos(a)*s*0.32*side, oy=Math.sin(a)*s*0.14-s*0.04;
      ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.strokeStyle='#BCD3E8'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.ellipse(ox,oy,s*0.44,s*0.31,0,0,7); ctx.fill(); ctx.stroke();
    }
    ctx.restore(); return;
  }
  ctx.fillStyle='rgba(58,42,26,0.16)'; ctx.beginPath(); ctx.ellipse(0,s*0.26,s*0.6,s*0.2,0,0,7); ctx.fill();
  const cols=['#6FA35A','#5F8F4E','#7FA653'];
  for(let i=0;i<3;i++){
    const a=i*2.35+seededRand(seed+i)*1.4;
    const ox=Math.cos(a)*s*0.3*side, oy=Math.sin(a)*s*0.16-s*0.06;
    ctx.fillStyle=cols[i%cols.length]; ctx.strokeStyle='#3f6b38'; ctx.lineWidth=3;

function drawRoadShoulderFoliage(){

/* biome finger-toy layer — the tappable creature/prop per biome. Real illustrated sprite (has()-gated,
   never a procedural stand-in). Gentle sway + bob idle; on catch, a quick scale-up + fade "pop" of the
   sprite itself (the sparkle burst carries the rest of the juice — see catchFloater). A soft glow disc
   sits under fireflies so they read as luminous in the twilight. */
function drawDriveFloaters(){
  const D=drive; if(!D||!D.biome||!D.biome.interact) return;
  const I=D.biome.interact, mode=I.mode||'catch';
  const img=has(I.key)?IMG[I.key].img:null;
  const emitImg=(I.emit&&has(I.emit))?IMG[I.emit].img:null;
  if(D.rainbowT>0) drawDriveRainbow(D.rainbowT);      // SKY reward arc (behind)
  if(mode==='hop'){ drawHop(D,img); return; }
  for(const f of D.floaters){
    if(f.gate){ drawGate(D,f,img); continue; }
    if(f.flit){ const a=Math.max(0,1-f.life/f.maxLife);
      ctx.save(); ctx.globalAlpha=a; ctx.translate(f.x,f.y); ctx.rotate(Math.sin(f.phase*5)*0.22);
      if(emitImg) ctx.drawImage(emitImg,-f.sz/2,-f.sz/2,f.sz,f.sz);
      else { ctx.fillStyle='#C8A2F0'; ctx.beginPath(); ctx.ellipse(0,0,f.sz*0.28,f.sz*0.2,0,0,7); ctx.fill(); }
      ctx.restore(); continue; }
    if(f.bloom){ drawBloom(D,f,img); continue; }
    // fall (acorn) + catch/jar (drifting creature)
    const by=f.fall? f.y : f.y+Math.sin(f.phase)*f.bobAmp;
    let s=f.sz, a=1;
    if(!f.fall && f.maxLife<50){ if(f.life<0.4) a=f.life/0.4; else if(f.life>f.maxLife-1) a=Math.max(0,(f.maxLife-f.life)); }
    if(f.fall && by<0) a=Math.max(0,1+by/70);   // fade in as it drops into frame
    if(f.caught){ const p=Math.min(1,f.popT/0.24); s=f.sz*(1+p*0.9); a=1-p; }
    if(!f.caught && a>0.6){   // wordless "tap me!" pulsing ring — stronger for fireflies so the catchable one stands out from the ambient dusk glow
      const pr=((time*0.75)+f.phase*0.3)%1, jarBoost=(mode==='jar')?1.7:1;
      ctx.save(); ctx.globalAlpha=a*0.32*jarBoost*(1-pr); ctx.lineWidth=(mode==='jar'?6.5:5);
      ctx.strokeStyle=f.golden?'#FFD54A':(f.nearFull?'#FFD54A':I.cols[0]);
      ctx.beginPath(); ctx.arc(f.x,by,s*0.48+pr*s*0.5,0,7); ctx.stroke();
      if(f.nearFull){ ctx.globalAlpha=a*0.5*(1-pr); ctx.beginPath(); ctx.arc(f.x,by,s*0.36+pr*s*0.4,0,7); ctx.stroke(); }
      ctx.restore();
    }
    const sway=f.fall? (f.spin2||0) : Math.sin(f.phase*0.8)*0.06;
    ctx.save(); ctx.translate(f.x,by); ctx.globalAlpha=a; ctx.rotate(sway);
    if(I.key==='drive_firefly'||f.golden){ const c=f.golden?'255,213,74':'255,236,150';
      const gl=ctx.createRadialGradient(0,0,0,0,0,s*0.72);
      gl.addColorStop(0,'rgba('+c+','+((f.golden?0.5:0.55)*a)+')'); gl.addColorStop(1,'rgba('+c+',0)');
      ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(0,0,s*0.72,0,7); ctx.fill(); }
    if(f.flip) ctx.scale(-1,1);
    if(img) ctx.drawImage(img,-s/2,-s/2,s,s);
    ctx.restore();
  }
  if(mode==='jar') drawDriveJar(D);
  if(mode==='gap') drawSteerHint(D);
}

/* two reactive mid-drive beats: a bunny pops up RIGHT beside the driving lane and waves as the truck

   drawn at 1.6x scale so a child watching the center of the road can't miss it. Purely decorative — its
   footprint sits just off the truck's own path, so it can never block/hurt the truck. */
function drawOneCritter(c){
  if(c.state==='idle') return;
  const t=c.t;
  let riseP;
  if(t<0.3) riseP=easeOutBack(t/0.3);
  else if(t<1.6) riseP=1;
  else riseP=Math.max(0,1-(t-1.6)/0.4);
  if(c.state==='done' && riseP<=0.01) return;
  const D=drive, x=roadCenterX(c.d)+c.side*130, y=820-(c.d-D.scrollY);
  if(y<-180||y>H+180) return;

  // lilypad) — a soft cloud puff over the sky path, a warm sand bank by the river, grass elsewhere.
  const bsurf=(D.biome&&D.biome.roadSurface)==='cloud'?'cloud':(D.biome&&D.biome.name==='riverside'?'sand':'grass');
  if(bsurf==='cloud'){ ctx.fillStyle='#FFFFFF'; ctx.strokeStyle='#BCD3E8'; }
  else if(bsurf==='sand'){ ctx.fillStyle='#E7D3A6'; ctx.strokeStyle='#C4A15A'; }
  else { ctx.fillStyle='#6FA35A'; ctx.strokeStyle='#4d7a3c'; }
  ctx.lineWidth=3;

  // drawImage — no more procedural fillStyle/arc shapes. It rises up from behind the biome pad with
  // the same pop/squash beat, and gets a tiny body sway so its baked-in wave reads as a live greeting.
  if(has('drive_bunny')){
    const im=IMG.drive_bunny.img, bw=78, bh=bw*(im.naturalHeight/im.naturalWidth||1.35);
    ctx.save();
    ctx.translate(0, 20 + (1-riseP)*58);            // emerges upward as riseP 0->1
    ctx.scale(1, Math.max(0.12, riseP));            // squash while popping up
    ctx.rotate(wave*0.05);                          // gentle happy body sway on top of the baked wave
    ctx.drawImage(im, -bw/2, -bh+22, bw, bh);       // bottom tucked just behind the pad
    ctx.restore();

    ctx.fillStyle='#FFF3E4'; ctx.strokeStyle='#5a3d24'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(0,0,22,26,0,0,7); ctx.fill(); ctx.stroke();
    ctx.save(); ctx.rotate(-0.2+wave*0.1); ctx.beginPath(); ctx.ellipse(-10,-40,8,26,0,0,7); ctx.fill(); ctx.stroke(); ctx.restore();
    ctx.save(); ctx.rotate(0.2-wave*0.1); ctx.beginPath(); ctx.ellipse(10,-40,8,26,0,0,7); ctx.fill(); ctx.stroke(); ctx.restore();
    ctx.save(); ctx.translate(18,-6); ctx.rotate(-0.6+wave*0.5); ctx.beginPath(); ctx.ellipse(10,0,7,14,0,0,7); ctx.fill(); ctx.stroke(); ctx.restore();
    ctx.fillStyle='#3a2a1a'; ctx.beginPath(); ctx.arc(-7,-4,4.4,0,7); ctx.arc(7,-4,4.4,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-8.4,-6,1.5,0,7); ctx.arc(5.6,-6,1.5,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,150,175,0.7)'; ctx.beginPath(); ctx.arc(-12,4,3.8,0,7); ctx.arc(12,4,3.8,0,7); ctx.fill();

    ctx.strokeStyle='#5a3d24'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(0,4.5,4,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.restore();
  }

}
