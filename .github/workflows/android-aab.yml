name: Build Android AAB

# Builds the Capacitor Android app in CI (GitHub runners have Java + Android SDK):
#   - a RELEASE-signed AAB (uploadable to Google Play → Internal testing)
#   - a debug APK (sideload directly onto a phone)
#   - the upload keystore (SAVE IT — it's the key for every future update)
# Run: Actions tab → "Build Android AAB" → Run workflow (or on push to main).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'assets/**'
      - 'wrapper/**'
      - '.github/workflows/android-aab.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Capacitor Android project
        working-directory: wrapper
        run: |
          npm install
          npm run copy-web            # ../index.html + manifest + assets → www/
          npx cap add android || echo "android platform already present"
          npx cap sync android
          # Google Play requires targetSdk 35 (Android 15) for new uploads
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/' android/variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/' android/variables.gradle
          grep -E "compileSdk|targetSdk" android/variables.gradle

      # Reuse a stable upload key across builds if provided as a secret; otherwise
      # generate one so the first build is Play-uploadable. If generated, DOWNLOAD
      # the "poppu-upload-keystore" artifact and keep it safe — Play requires the
      # SAME key for every future update. To lock it in, add it as secrets later.
      - name: Provide upload keystore
        working-directory: wrapper/android
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > upload.keystore
            echo "Using keystore from repo secret."
          else
            keytool -genkeypair -v -keystore upload.keystore -alias poppu \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass poppu-internal -keypass poppu-internal \
              -dname "CN=HDRV Studio, OU=Games, O=HDRV, L=Jakarta, C=ID"
            echo "::warning::Generated a NEW upload keystore — download the 'poppu-upload-keystore' artifact and keep it safe; Play needs the same key for all future updates."
          fi

      - name: Build RELEASE AAB (signed — Play-uploadable)
        working-directory: wrapper/android
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'poppu-internal' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'poppu' }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD || 'poppu-internal' }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=$PWD/upload.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS

      - name: Build debug APK (sideload onto a phone)
        working-directory: wrapper/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload RELEASE AAB (→ Play Console → Internal testing)
        uses: actions/upload-artifact@v4
        with:
          name: poppu-mailroom-release-aab
          path: wrapper/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload the upload keystore (SAVE THIS securely)
        uses: actions/upload-artifact@v4
        with:
          name: poppu-upload-keystore
          path: wrapper/android/upload.keystore
          if-no-files-found: warn

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: poppu-mailroom-apk
          path: wrapper/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
